//                   SLIDE 27: NORMAL NORMAL DERIVATION
// ═══════════════════════════════════════════════════════════════════════

function Slide27_NormalNormalDerivation() {
  const priorDensity = "\\pi(\\mu) = \\frac{1}{\\sqrt{2\\pi\\sigma_0^2}}\\exp\\!\\left[-\\frac{(\\mu - \\mu_0)^2}{2\\sigma_0^2}\\right]";
    const likDensity = "p(y \\mid \\mu) = \\prod_{i=1}^n \\frac{1}{\\sqrt{2\\pi\\sigma^2}}\\exp\\!\\left[-\\frac{(y_i - \\mu)^2}{2\\sigma^2}\\right]";
    const postProp = "p(\\mu \\mid y) \\;\\propto\\; \\pi(\\mu) \\, p(y \\mid \\mu)";
    const postKernel = "p(\\mu \\mid y) \\;\\propto\\; \\exp\\!\\left[-\\frac{(\\mu - \\mu_0)^2}{2\\sigma_0^2}\\right] \\cdot \\exp\\!\\left[-\\frac{\\sum_i (y_i - \\mu)^2}{2\\sigma^2}\\right]";
    const step3 = "\\sum_{i=1}^n (y_i - \\mu)^2 = \\sum_i (y_i - \\bar y)^2 + n(\\bar y - \\mu)^2";
    const step5a = "\\text{exponent} = -\\tfrac{1}{2}\\Bigl[\\underbrace{(\\tfrac{1}{\\sigma_0^2} + \\tfrac{n}{\\sigma^2})}_{\\tau_n^2}\\mu^2 - 2\\bigl(\\tfrac{\\mu_0}{\\sigma_0^2} + \\tfrac{n\\bar y}{\\sigma^2}\\bigr)\\mu\\Bigr]";
    const posterior = "\\mu \\mid y \\;\\sim\\; \\mathcal{N}\\!\\left(\\mu_n,\\; 1/\\tau_n^2\\right)";
  
    const tauResult = "\\tau_n^2 = \\underbrace{\\frac{1}{\\sigma_0^2}}_{\\text{prior precision}} + \\underbrace{\\frac{n}{\\sigma^2}}_{\\text{data precision}}";
    const muResult = "\\mu_n = \\frac{\\sigma^2\\sigma_0^2}{n\\sigma_0^2 + \\sigma^2}\\left(\\frac{n\\bar y}{\\sigma^2} + \\frac{\\mu_0}{\\sigma_0^2}\\right) = \\underbrace{\\frac{n\\sigma_0^2}{n\\sigma_0^2 + \\sigma^2}}_{w_{\\text{data}}}\\,\\bar y \\;+\\; \\underbrace{\\frac{\\sigma^2}{n\\sigma_0^2 + \\sigma^2}}_{w_0}\\,\\mu_0";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">Normal-Normal: Completing the Square</h1>
            <p className="text-gray-600 text-sm">
              Precision-weighted averaging with known <Latex math="\sigma^2" />
            </p>
          </div>
    
          {/* Setup strip */}
          <div className="flex-shrink-0 bg-slate-50 border-2 border-slate-300 rounded-lg px-4 py-2 mb-2">
            <p className="text-xs text-slate-900 leading-snug">
              <strong>Setup.</strong>{' '}
              <Latex math="y_1, \ldots, y_n" /> are iid <Latex math="\mathcal{N}(\mu, \sigma^2)" />{' '}
              with <Latex math="\sigma^2" /> <em>known</em>;{' '}
              prior <Latex math="\mu \sim \mathcal{N}(\mu_0, \sigma_0^2)" />. Goal: the
              posterior for the unknown mean <Latex math="\mu" />.
            </p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-3 min-h-0">
            {/* Left: step-by-step derivation */}
            <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-3 flex flex-col gap-1.5 overflow-auto">
              <h2 className="font-bold text-slate-800 text-sm">Derivation</h2>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Prior density
                </p>
                <Latex math={priorDensity} display={true} />
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Likelihood (iid)
                </p>
                <Latex math={likDensity} display={true} />
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  1. Posterior (proportional form)
                </p>
                <Latex math={postProp} display={true} />
                <p className="text-xs text-slate-700 mt-0.5 leading-snug">
                  Drop normalizing constants. Write both factors as Gaussian kernels:
                </p>
                <Latex math={postKernel} display={true} />
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  2. Sufficient-statistic identity
                </p>
                <Latex math={step3} display={true} />
                <p className="text-xs text-slate-700 mt-0.5 leading-snug">
                  The first term does not involve the parameter and absorbs into{' '}
                  <Latex math="\propto" />:
                </p>
                <Latex
                  math="p(\mu \mid y) \;\propto\; \exp\!\left[-\frac{(\mu - \mu_0)^2}{2\sigma_0^2} - \frac{n(\bar y - \mu)^2}{2\sigma^2}\right]"
                  display={true}
                />
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  3. Expand the exponent and complete the square
                </p>
                <Latex math={step5a} display={true} />
                <p className="text-xs text-slate-700 mt-0.5 leading-snug">
                  The coefficient of the squared term defines the posterior precision{' '}
                  <Latex math="\tau_n^2" />. Completing the square gives:
                </p>
                <Latex
                  math="p(\mu \mid y) \;\propto\; \exp\!\left[-\frac{\tau_n^2}{2}(\mu - \mu_n)^2\right]"
                  display={true}
                />
                <p className="text-xs text-slate-700 mt-0.5 leading-snug">
                  with <Latex math="\mu_n = \tfrac{1}{\tau_n^2}\bigl(\tfrac{\mu_0}{\sigma_0^2} + \tfrac{n\bar y}{\sigma^2}\bigr)" />.
                </p>
              </div>
    
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded p-1.5">
                <p className="text-xs font-semibold text-emerald-700 uppercase mb-0.5">
                  4. Recognize the Normal kernel
                </p>
                <Latex math={posterior} display={true} />
              </div>
            </div>
    
            {/* Right: interpretation */}
            <div className="flex flex-col gap-3 self-start">
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-3">
                <h3 className="font-bold text-blue-900 text-sm mb-1">
                  Posterior variance
                </h3>
                <Latex math={tauResult} display={true} />
                <Latex
                  math="\sigma_n^2 = \frac{1}{\tau_n^2} = \frac{\sigma^2 \sigma_0^2}{n\sigma_0^2 + \sigma^2}"
                  display={true}
                />
                <div className="text-xs text-blue-900 leading-snug mt-1 space-y-0.5">
                  <p>
                    <strong>Large <Latex math="n" />:</strong>{' '}
                    <Latex math="\sigma_n^2 \to 0" />{'\u2014'}posterior concentrates
                    regardless of the prior.
                  </p>
                  <p>
                    <strong>Diffuse prior</strong> (<Latex math="\sigma_0^2 \to \infty" />):{' '}
                    <Latex math="\sigma_n^2 \to \sigma^2/n" />{'\u2014'}recovers the
                    sampling variance of <Latex math="\bar y" />.
                  </p>
                  <p>
                    <strong>Concentrated prior</strong> (<Latex math="\sigma_0^2 \to 0" />):{' '}
                    <Latex math="\sigma_n^2 \to 0" />{'\u2014'}prior dominates, posterior
                    locks onto <Latex math="\mu_0" />.
                  </p>
                </div>
              </div>
    
              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3">
                <h3 className="font-bold text-green-900 text-sm mb-1">
                  Posterior mean: weighted average
                </h3>
                <Latex math={muResult} display={true} />
                <div className="text-xs text-green-900 leading-snug mt-1 space-y-0.5">
                  <p>
                    <strong>Large <Latex math="n" />:</strong>{' '}
                    <Latex math="w_{\text{data}} \to 1" />{'\u2014'}posterior mean{' '}
                    <Latex math="\to \bar y" />. Prior washes out.
                  </p>
                  <p>
                    <strong>Diffuse prior</strong> (<Latex math="\sigma_0^2 \to \infty" />):{' '}
                    <Latex math="w_{\text{data}} \to 1" />{'\u2014'}same effect. A vague
                    prior defers to the data.
                  </p>
                  <p>
                    <strong>Concentrated prior</strong> (<Latex math="\sigma_0^2 \to 0" />):{' '}
                    <Latex math="w_0 \to 1" />{'\u2014'}posterior mean{' '}
                    <Latex math="\to \mu_0" />. Data cannot overcome a dogmatic prior.
                  </p>
                </div>
              </div>
    
              <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-3">
                <h3 className="font-bold text-purple-900 text-sm mb-1">
                  What the derivation teaches
                </h3>
                <ul className="text-xs text-purple-900 space-y-1 leading-snug list-disc pl-4">
                  <li>
                    Work in the <strong>proportional form</strong>: normalizing constants
                    and parameter-free terms absorb into <Latex math="\propto" />.
                  </li>
                  <li>
                    Gaussian kernels are quadratics in the exponent. The product of two
                    Gaussians is a single Gaussian whose exponent is the sum of the two
                    quadratics.
                  </li>
                  <li>
                    <strong>Complete the square</strong> on the combined quadratic to read
                    off the posterior mean and precision directly.
                  </li>
                  <li>
                    The sufficient statistic <Latex math="\bar y" /> and the sample size{' '}
                    <Latex math="n" /> are the only data summaries that enter the posterior.
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
  );
}

//                     SLIDE 29: NORMAL INVERSE GAMMA
// ═══════════════════════════════════════════════════════════════════════

function Slide29_NormalInverseGamma() {
  const priorMu = "\\mu \\mid \\sigma^2 \\sim \\mathcal{N}\\!\\left(\\mu_0,\\; \\frac{\\sigma^2}{\\kappa_0}\\right)";
    const priorSigma = "\\sigma^2 \\sim \\text{Inv-Gamma}(\\alpha_0, \\beta_0)";
    const likelihood = "y_1, \\ldots, y_n \\mid \\mu, \\sigma^2 \\overset{\\text{iid}}{\\sim} \\mathcal{N}(\\mu, \\sigma^2)";
    const posterior = "(\\mu, \\sigma^2) \\mid y \\sim \\text{NIG}(\\mu_n, \\kappa_n, \\alpha_n, \\beta_n)";
    const marginalT = "\\mu \\mid y \\;\\sim\\; t_{2\\alpha_n}\\!\\left(\\mu_n,\\; \\frac{\\beta_n}{\\alpha_n \\kappa_n}\\right)";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">Normal-Inverse-Gamma: Both Parameters Unknown</h1>
            <p className="text-gray-600 text-sm">
              Joint conjugate when both <Latex math="\mu" /> and{' '}
              <Latex math="\sigma^2" /> are unknown
            </p>
          </div>
    
          {/* Motivation strip */}
          <div className="flex-shrink-0 bg-slate-50 border-2 border-slate-300 rounded-lg px-4 py-2 mb-2">
            <p className="text-xs text-slate-900 leading-snug">
              <strong>Why a new family.</strong> The Normal-Normal result (Slide 27) assumed{' '}
              <Latex math="\sigma^2" /> known. In practice it rarely is. Placing a prior on{' '}
              <Latex math="\sigma^2" /> as well requires a <strong>joint</strong> prior on{' '}
              <Latex math="(\mu, \sigma^2)" /> with four hyperparameters. The running data are Michelson’s 100 speed-of-light runs.
            </p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-3 min-h-0">
            {/* Left: structure and derivation */}
            <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-3 flex flex-col gap-1.5 overflow-auto">
              <h2 className="font-bold text-slate-800 text-sm">Prior, likelihood, and update</h2>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Joint NIG prior
                </p>
                <Latex math={priorMu} display={true} />
                <Latex math={priorSigma} display={true} />
                <p className="text-xs text-slate-700 leading-snug mt-0.5">
                  The prior on <Latex math="\mu" /> is conditional on{' '}
                  <Latex math="\sigma^2" />: wider variance means more prior
                  uncertainty about the mean.
                </p>
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Likelihood
                </p>
                <Latex math={likelihood} display={true} />
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Posterior (conjugate update)
                </p>
                <p className="text-xs text-slate-700 leading-snug mb-1">
                  Multiply prior by likelihood in proportional form and complete the square
                  in both <Latex math="\mu" /> and <Latex math="\sigma^2" />. The posterior
                  stays in the NIG family:
                </p>
                <Latex math={posterior} display={true} />
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Update rules
                </p>
                <div className="space-y-0.5 text-xs">
                  <div><Latex math="\kappa_n = \kappa_0 + n" /></div>
                  <div><Latex math="\mu_n = \dfrac{\kappa_0\,\mu_0 + n\,\bar{y}}{\kappa_n}" /></div>
                  <div><Latex math="\alpha_n = \alpha_0 + n/2" /></div>
                  <div><Latex math="\beta_n = \beta_0 + \tfrac{1}{2}\textstyle\sum(y_i - \bar{y})^2 + \tfrac{\kappa_0\, n}{2\,\kappa_n}(\bar{y} - \mu_0)^2" /></div>
                </div>
              </div>
    
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded p-1.5">
                <p className="text-xs font-semibold text-emerald-700 uppercase mb-0.5">

                <p className="text-xs text-emerald-700 leading-snug mt-0.5">
                  Student{'\u2019'}s t, not Normal. The heavier tails reflect uncertainty

                </p>
                <p className="text-xs text-emerald-800 leading-snug mt-1 pt-1 border-t border-emerald-200">
                  <strong>Michelson, n = 100</strong> (Jeffreys <Latex math="1/\sigma^2" />, as in Slide 14): <Latex math="\mu \mid y \sim t_{n-1} = t_{99}" />,
                  mean 299,852.4 km/s, 95% [299,836.7, 299,868.1] — excluding the air-corrected truth 299,734.5 by ~15 SE.
                </p>
              </div>
            </div>
    
            {/* Right: interpretation + code */}
            <div className="flex flex-col gap-3 min-h-0 overflow-auto">
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-3">
                <h3 className="font-bold text-blue-900 text-sm mb-1">
                  Hyperparameter roles
                </h3>

                  <div className="bg-white rounded p-1.5 flex items-center gap-2">

                      <Latex math="\mu_0" />
                    </span>
                    <span>prior mean for the location</span>
                  </div>
                  <div className="bg-white rounded p-1.5 flex items-center gap-2">
                    <span className="font-mono bg-blue-100 px-1.5 py-0.5 rounded">
                      <Latex math="\kappa_0" />
                    </span>
                    <span>prior pseudo-observations for the mean</span>
                  </div>
                  <div className="bg-white rounded p-1.5 flex items-center gap-2">
                    <span className="font-mono bg-blue-100 px-1.5 py-0.5 rounded">
                      <Latex math="\alpha_0" />
                    </span>
                    <span>shape (controls tail weight of Inv-Gamma)</span>
                  </div>
                  <div className="bg-white rounded p-1.5 flex items-center gap-2">
                    <span className="font-mono bg-blue-100 px-1.5 py-0.5 rounded">
                      <Latex math="\beta_0" />
                    </span>
                    <span>scale (prior sum-of-squares for <Latex math="\sigma^2" />)</span>

              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3">

                    <Latex math="\kappa_n" />: prior + data pseudo-counts for the mean

                    <Latex math="n_0 + n" />).

                  <p>
                    <Latex math="\mu_n" />: precision-weighted average of{' '}
                    <Latex math="\mu_0" /> and <Latex math="\bar y" />, weighted by{' '}

                  </p>
                  <p>
                    <Latex math="\alpha_n" />: each observation adds{' '}
                    <Latex math="1/2" /> to the shape (one degree of freedom per two
                    variance parameters estimated).
                  </p>
                  <p>
                    <Latex math="\beta_n" />: prior scale + within-sample SS + a
                    penalty for the distance between prior mean and sample mean.
                  </p>
                </div>
              </div>
    
              <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-3">
                <h3 className="font-bold text-purple-900 text-sm mb-1">

                </h3>
                <div className="space-y-1 text-xs text-purple-900 leading-snug">
                  <p>
                    <strong>Weakly informative (default):</strong>{' '}
                    <Latex math="\mu_0" /> at a plausible value,{' '}
                    <Latex math="\kappa_0" /> small (0.01{'\u2013'}1){'\u2014'}the prior
                    contributes a fraction of a pseudo-observation for the mean.{' '}
                    <Latex math="\alpha_0 = \beta_0" /> small (0.01{'\u2013'}1) gives a

                    <Latex math="\alpha_0 = n_0/2" /> encodes <Latex math="n_0" /> prior
                    pseudo-observations. Since{' '}
                    <Latex math="\beta_n = \beta_0 + \text{SS}/2 + \ldots" />,{' '}
                    <Latex math="\beta_0" /> encodes half the prior sum of squares:{' '}
                    <Latex math="\beta_0 = n_0 \sigma_0^2 / 2" />. Quick check: the
                    ratio <Latex math="\beta_0/\alpha_0 = \sigma_0^2" /> recovers the
                    prior variance.

                    <strong>Jeffreys (reference):</strong>{' '}
                    <Latex math="\pi(\mu, \sigma^2) \propto 1/\sigma^2" />, obtained
                    in the limit <Latex math="\kappa_0 \to 0" />,{' '}
                    <Latex math="\alpha_0 \to 0" />,{' '}
                    <Latex math="\beta_0 \to 0" />. Improper prior{'\u2014'}acceptable
                    only because the posterior is proper when <Latex math="n \geq 2" />.
                    With <Latex math="n = 1" /> the posterior is also improper and
                    inference is undefined.
                  </p>
                </div>
              </div>
    
              <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-2.5">
                <p className="text-xs text-amber-900 leading-snug">

                  <Latex math="\mu_n" /> is the same weighted average from Slide 27,
                  with <Latex math="\kappa_0" /> playing the role of{' '}
                  <Latex math="1/\sigma_0^2" />. The new ingredient is the joint update
                  of <Latex math="\beta_n" />, which absorbs both the data variance and
                  the prior-data mean discrepancy.
                </p>
              </div>
            </div>
          </div>
    
          {/* PyMC: NIG from components (full model in the linked script) */}
          <div className="flex-shrink-0 mt-2 bg-green-50 border-2 border-green-300 rounded-xl p-2.5">
            <div className="grid grid-cols-5 gap-3 items-center">
              <div className="col-span-3 bg-gray-900 text-gray-100 rounded-lg p-3 font-mono text-xs leading-relaxed">
                <div className="text-green-400"># NIG = two priors, one conditional (y = Michelson)</div>
                <div>mu0, kappa0, alpha0, beta0 = <span className="text-purple-300">800.</span>, <span className="text-purple-300">1.</span>, <span className="text-purple-300">1.</span>, <span className="text-purple-300">1.</span></div>
                <div className="mt-1"><span className="text-blue-300">with</span> pm.Model() <span className="text-blue-300">as</span> m:</div>
                <div>{'    '}sigma2 = pm.InverseGamma(<span className="text-yellow-300">"sigma2"</span>, alpha0, beta0)</div>
                <div>{'    '}mu = pm.Normal(<span className="text-yellow-300">"mu"</span>, mu0, pm.math.sqrt(sigma2/kappa0))</div>
                <div>{'    '}pm.Normal(<span className="text-yellow-300">"y"</span>, mu, pm.math.sqrt(sigma2), observed=y)</div>
                <div>{'    '}idata = pm.sample(<span className="text-purple-300">2000</span>, chains=<span className="text-purple-300">4</span>)</div>
              </div>
              <div className="col-span-2 text-xs text-green-900 leading-snug">
                <p><strong>Two priors, one conditional.</strong> No NIG class in PyMC: build it from <code>InverseGamma</code> for <Latex math="\sigma^2" />, then <code>Normal</code> for <Latex math="\mu" /> whose sigma depends on <Latex math="\sigma^2" /> (the conditional structure). PyMC traces the dependency automatically.</p>
                <ScriptLink path="06_normal_michelson.py" label="06_normal_michelson.py" note="NIG marginal-t + Gibbs on Michelson" />
              </div>
            </div>
          </div>
        </div>
  );
}

function Slide30_PoissonGamma() {
  const priorDensity = "\\pi(\\lambda) = \\frac{\\beta_0^{\\alpha_0}}{\\Gamma(\\alpha_0)}\\,\\lambda^{\\alpha_0 - 1}\\,e^{-\\beta_0 \\lambda}, \\quad \\lambda > 0";
    const likDensity = "p(y \\mid \\lambda) = \\prod_{i=1}^n \\frac{\\lambda^{y_i} e^{-\\lambda}}{y_i!}";
    const postProp = "p(\\lambda \\mid y) \\;\\propto\\; \\lambda^{\\alpha_0 - 1}\\,e^{-\\beta_0 \\lambda} \\;\\cdot\\; \\lambda^{\\sum y_i}\\,e^{-n\\lambda}";
    const postKernel = "= \\lambda^{\\,(\\alpha_0 + \\sum y_i) - 1}\\;e^{-(\\beta_0 + n)\\,\\lambda}";
    const posterior = "\\lambda \\mid y \\;\\sim\\; \\text{Gamma}\\!\\left(\\alpha_0 + \\textstyle\\sum y_i,\\;\\; \\beta_0 + n\\right)";
    const postMean = "\\mathbb{E}[\\lambda \\mid y] = \\frac{\\alpha_0 + \\sum y_i}{\\beta_0 + n} = \\underbrace{\\frac{\\beta_0}{\\beta_0 + n}}_{w_0}\\,\\frac{\\alpha_0}{\\beta_0} \\;+\\; \\underbrace{\\frac{n}{\\beta_0 + n}}_{w_{\\text{data}}}\\,\\bar{y}";
    const nbPred = "\\tilde{y} \\mid y \\;\\sim\\; \\text{NegBin}\\!\\left(\\alpha_n,\\; \\frac{\\beta_n}{\\beta_n + 1}\\right)";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">Poisson-Gamma: Conjugate Derivation</h1>

          {/* Context strip */}

              <strong>Running example.</strong> A call centre receives calls at an
              unknown rate <Latex math="\lambda" /> (calls/hour). We observe{' '}
              <Latex math="\sum y_i = 15" /> calls over <Latex math="n = 3" /> hours.
              Prior belief: <Latex math="\text{Gamma}(2, 0.5)" />, encoding a prior
              mean of 4 calls/hour with moderate uncertainty.
            </p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-3 min-h-0">
            {/* Left: derivation */}
            <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-3 flex flex-col gap-1.5 overflow-auto">
              <h2 className="font-bold text-slate-800 text-sm">Derivation</h2>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Gamma prior
                </p>
                <Latex math={priorDensity} display={true} />
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Poisson likelihood (iid)
                </p>
                <Latex math={likDensity} display={true} />
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  1. Proportional form
                </p>
                <Latex math={postProp} display={true} />
                <p className="text-xs text-slate-700 leading-snug mt-0.5">
                  Drop the normalizing constants (<Latex math="\Gamma(\alpha_0)" />,{' '}
                  <Latex math="y_i!" />) into <Latex math="\propto" />.
                  Collect powers of <Latex math="\lambda" /> and exponentials:
                </p>
                <Latex math={postKernel} display={true} />
              </div>
    
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded p-1.5">
                <p className="text-xs font-semibold text-emerald-700 uppercase mb-0.5">

                </p>
                <Latex math={posterior} display={true} />
                <p className="text-xs text-emerald-700 leading-snug mt-0.5">
                  The kernel <Latex math="\lambda^{a-1} e^{-b\lambda}" /> is Gamma(a, b).

                </p>
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">

            </div>
    
            {/* Right: interpretation */}
            <div className="flex flex-col gap-3 min-h-0 overflow-auto">

                <p className="text-xs text-blue-900 leading-snug mt-1.5">
                  Ratio <Latex math="\alpha_0/\beta_0 = \lambda_0" /> is the prior

                </p>
              </div>
    
              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3">
                <h3 className="font-bold text-green-900 text-sm mb-1">
                  Call centre example
                </h3>
                <table className="w-full text-xs">
                  <tbody className="text-green-900">
                    <tr className="border-b border-green-200">
                      <td className="py-1 pr-2 font-semibold">Prior</td>

                    </tr>
                    <tr className="border-b border-green-200">
                      <td className="py-1 pr-2 font-semibold">Data</td>

                    <tr className="border-b border-green-200">

                    </tr>
                    <tr className="border-b border-green-200">
                      <td className="py-1 pr-2 font-semibold">Weights</td>
                      <td className="py-1">
                        <Latex math="w_0 = 0.14" />,{' '}

                </table>
                <p className="text-xs text-green-900 leading-snug mt-1.5">
                  The prior contributes <Latex math="\beta_0 = 0.5" /> hours of

              <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-3">
                <h3 className="font-bold text-purple-900 text-sm mb-1">

                </h3>
                <div className="space-y-1 text-xs text-purple-900 leading-snug">
                  <p>
                    <strong>Weakly informative:</strong>{' '}
                    <Latex math="\alpha_0 = \beta_0" /> small (0.01{'\u2013'}1).
                    Ratio <Latex math="\alpha_0/\beta_0 = 1" /> centers the prior
                    at 1 event per unit time; small values make it diffuse.
                  </p>
                  <p>
                    <strong>Informative:</strong> read the encoding off the update

                    <Latex math="\beta_0" /> = prior exposure time. E.g., 20 calls

                    <Latex math="\alpha_0 = 20" />,{' '}
                    <Latex math="\beta_0 = 5" />,{' '}
                    <Latex math="\alpha_0/\beta_0 = 4 = \lambda_0" />.

                  <p>
                    <strong>Jeffreys:</strong>{' '}

          {/* PyMC block */}
          <div className="flex-shrink-0 mt-3 bg-green-50 border-2 border-green-300 rounded-xl p-3">

              <div className="col-span-3 bg-gray-900 text-gray-100 rounded-lg p-3 font-mono text-sm leading-relaxed">

//                        SLIDE 31: DIRICHLET SETUP
// ═══════════════════════════════════════════════════════════════════════

function Slide31_DirichletSetup() {
  const dirichletPdf = "\\pi(\\boldsymbol{\\theta}) = \\frac{\\Gamma\\!\\left(\\sum_{k=1}^K \\alpha_k\\right)}{\\prod_{k=1}^K \\Gamma(\\alpha_k)} \\prod_{k=1}^K \\theta_k^{\\alpha_k - 1}";
    const constraint = "\\theta_k \\geq 0, \\quad \\sum_{k=1}^K \\theta_k = 1";
    const priorMean = "\\mathbb{E}[\\theta_k] = \\frac{\\alpha_k}{\\sum_j \\alpha_j} = \\frac{\\alpha_k}{n_0}";
    const priorVar = "\\text{Var}(\\theta_k) = \\frac{\\alpha_k(n_0 - \\alpha_k)}{n_0^2(n_0 + 1)}";
    const betaConnection = "\\text{Dir}(\\alpha_1, \\alpha_2) = \\text{Beta}(\\alpha_1, \\alpha_2)";
    const marginal = "\\theta_k \\sim \\text{Beta}\\!\\left(\\alpha_k,\\; \\textstyle\\sum_{j \\neq k} \\alpha_j\\right)";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">The Dirichlet Distribution</h1>
            <p className="text-gray-600 text-sm">
              A distribution over probability vectors on the simplex
            </p>
          </div>
    
          {/* Motivation strip */}
          <div className="flex-shrink-0 bg-slate-50 border-2 border-slate-300 rounded-lg px-4 py-2 mb-2">
            <p className="text-xs text-slate-900 leading-snug">
              <strong>When K {'>'} 2 categories.</strong> Many problems involve
              proportions that must sum to 1 across K categories: vote shares in a
              K-candidate election, nucleotide frequencies (K = 4), survey response
              categories, topic proportions in a document. We need a prior
              distribution whose samples are valid probability vectors{'\u2014'}that
              is, vectors on the <strong>(K{'\u2013'}1)-dimensional simplex</strong>.
              The Dirichlet distribution is exactly this.
            </p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-3 min-h-0">
            {/* Left: the distribution itself */}
            <div className="flex flex-col gap-2">
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-3">
                <h2 className="font-bold text-blue-900 text-sm mb-1">Density</h2>
                <Latex math={dirichletPdf} display={true} />
                <p className="text-xs text-blue-900 leading-snug mt-1">
                  Defined on the <strong>simplex</strong>: <Latex math={constraint} />.
                  The parameter vector{' '}
                  <Latex math="\boldsymbol{\alpha} = (\alpha_1, \ldots, \alpha_K)" />{' '}
                  with each <Latex math="\alpha_k > 0" /> controls the shape.
                </p>
              </div>
    
              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3">
                <h3 className="font-bold text-green-900 text-sm mb-1">Mean and variance</h3>
                <Latex math={priorMean} display={true} />
                <Latex math={priorVar} display={true} />
                <p className="text-xs text-green-900 leading-snug mt-1">
                  where <Latex math="n_0 = \sum_k \alpha_k" /> is the{' '}
                  <strong>concentration</strong> (total pseudo-counts). Larger{' '}
                  <Latex math="n_0" /> means tighter concentration around the mean
                  proportions. Smaller <Latex math="n_0" /> means more variability.
                </p>
              </div>
    
              <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-3">
                <h3 className="font-bold text-purple-900 text-sm mb-1">
                  How <Latex math="\alpha_k" /> controls shape
                </h3>
                <div className="space-y-1 text-xs text-purple-900 leading-snug">
                  <p>
                    <strong>All <Latex math="\alpha_k < 1" />:</strong> mass pushed
                    toward the corners and edges of the simplex{'\u2014'}favors
                    sparse probability vectors where one or two categories dominate.
                    At the extreme <Latex math="\alpha_k \to 0" />, all mass
                    concentrates at the vertices.
                  </p>
                  <p>
                    <strong>All <Latex math="\alpha_k = 1" />:</strong> uniform
                    on the simplex. Every probability vector is equally likely.
                    This is the boundary between sparse and concentrated behavior.
                  </p>
                  <p>
                    <strong>All <Latex math="\alpha_k > 1" />:</strong> peaked
                    at the center{' '}
                    <Latex math="(1/K, \ldots, 1/K)" />. The larger the{' '}
                    <Latex math="\alpha_k" />, the tighter the concentration.
                    At <Latex math="\alpha_k = 2" />, gently peaked; at{' '}
                    <Latex math="\alpha_k = 50" />, sharply concentrated.
                  </p>
                  <p>
                    <strong>Unequal <Latex math="\alpha_k" />:</strong> the mean
                    shifts toward categories with larger{' '}
                    <Latex math="\alpha_k" />. E.g., Dir(10, 2, 2) concentrates
                    near <Latex math="\theta_1 \approx 0.71" />.
                  </p>
                </div>
              </div>
            </div>
    
            {/* Right: connection to Beta + marginals + what lives where */}
            <div className="flex flex-col gap-2 self-start">
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3">
                <h3 className="font-bold text-emerald-900 text-sm mb-1">
                  Connection to Beta
                </h3>
                <div className="bg-white rounded p-2 mb-2">
                  <Latex math={betaConnection} display={true} />
                </div>
                <p className="text-xs text-emerald-900 leading-snug">
                  When <Latex math="K = 2" />, the simplex is the interval{' '}
                  <Latex math="[0, 1]" /> and the Dirichlet reduces to the Beta.
                  Everything from the Beta-Binomial slides (24{'\u2013'}26) is a
                  special case of what follows. The Dirichlet is the Beta in K
                  dimensions.
                </p>
              </div>
    
              <div className="bg-amber-50 border-2 border-amber-200 rounded-xl p-3">
                <h3 className="font-bold text-amber-900 text-sm mb-1">
                  Marginal property
                </h3>
                <div className="bg-white rounded p-2 mb-2">
                  <Latex math={marginal} display={true} />
                </div>
                <p className="text-xs text-amber-900 leading-snug">
                  Each component <Latex math="\theta_k" /> marginally follows a
                  Beta distribution. This means you can always zoom in on a
                  single category and apply the univariate Beta tools you already
                  have{'\u2014'}credible intervals, posterior means, sensitivity
                  analysis{'\u2014'}without any loss of validity.
                </p>
              </div>
    
              <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-3">
                <h3 className="font-bold text-slate-800 text-sm mb-1">
                  The simplex
                </h3>
                <p className="text-xs text-slate-800 leading-snug">
                  For <Latex math="K = 2" />: the simplex is a line segment
                  from (1, 0) to (0, 1). For <Latex math="K = 3" />: an equilateral
                  triangle with vertices (1, 0, 0), (0, 1, 0), (0, 0, 1){'\u2014'}each
                  vertex is a degenerate distribution putting all mass on one category.
                  The center <Latex math="(1/3, 1/3, 1/3)" /> is the uniform
                  distribution. For general <Latex math="K" />: a{' '}
                  <Latex math="(K{-}1)" />-dimensional polytope. The Dirichlet
                  distribution assigns densities to points on this surface.
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

//                       SLIDE 32: DIRICHLET UPDATE
// ═══════════════════════════════════════════════════════════════════════

function Slide32_DirichletUpdate() {
  const multinomLik = "p(n_1, \\ldots, n_K \\mid \\boldsymbol{\\theta}) = \\frac{n!}{\\prod_k n_k!}\\prod_{k=1}^K \\theta_k^{n_k}";
    const dirichletPdf = "\\pi(\\boldsymbol{\\theta}) = \\frac{\\Gamma(\\sum_k \\alpha_k)}{\\prod_k \\Gamma(\\alpha_k)} \\prod_{k=1}^K \\theta_k^{\\alpha_k - 1}";
    const postProp = "p(\\boldsymbol{\\theta} \\mid \\mathbf{n}) \\;\\propto\\; \\underbrace{\\prod_k \\theta_k^{\\alpha_k - 1}}_{\\text{Dirichlet kernel}} \\;\\cdot\\; \\underbrace{\\prod_k \\theta_k^{n_k}}_{\\text{Multinomial kernel}}";
    const postCollect = "= \\prod_{k=1}^K \\theta_k^{\\,(\\alpha_k + n_k) - 1}";
    const posterior = "\\boldsymbol{\\theta} \\mid \\mathbf{n} \\;\\sim\\; \\text{Dir}(\\alpha_1 + n_1,\\; \\ldots,\\; \\alpha_K + n_K)";
    const postMean = "\\mathbb{E}[\\theta_k \\mid \\mathbf{n}] = \\frac{\\alpha_k + n_k}{n_0 + n} = \\underbrace{\\frac{n_0}{n_0 + n}}_{w_0}\\,\\frac{\\alpha_k}{n_0} \\;+\\; \\underbrace{\\frac{n}{n_0 + n}}_{w_{\\text{data}}}\\,\\frac{n_k}{n}";
    const marginalPost = "\\theta_k \\mid \\mathbf{n} \\;\\sim\\; \\text{Beta}\\!\\left(\\alpha_k + n_k,\\;\\; \\textstyle\\sum_{j \\neq k}(\\alpha_j + n_j)\\right)";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">Multinomial-Dirichlet: Conjugate Derivation</h1>
            <p className="text-gray-600 text-sm">
              Element-wise addition of counts to pseudo-counts
            </p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-3 min-h-0">
            {/* Left: derivation */}
            <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-3 flex flex-col gap-1.5 overflow-auto">
              <h2 className="font-bold text-slate-800 text-sm">Derivation</h2>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Dirichlet prior
                </p>
                <Latex math={dirichletPdf} display={true} />
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Multinomial likelihood
                </p>
                <Latex math={multinomLik} display={true} />
                <p className="text-xs text-slate-700 leading-snug mt-0.5">
                  where <Latex math="n = \sum_k n_k" /> is the total count.
                </p>
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  1. Proportional form
                </p>
                <Latex math={postProp} display={true} />
                <p className="text-xs text-slate-700 leading-snug mt-0.5">
                  Drop the normalizing constants (<Latex math="\Gamma" /> terms,{' '}
                  <Latex math="n!" />, <Latex math="n_k!" />) into{' '}
                  <Latex math="\propto" />. Both kernels are products of powers of{' '}
                  <Latex math="\theta_k" />{'\u2014'}so the product is just
                  exponent addition:
                </p>
                <Latex math={postCollect} display={true} />
              </div>
    
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded p-1.5">
                <p className="text-xs font-semibold text-emerald-700 uppercase mb-0.5">
                  2. Recognize the Dirichlet kernel
                </p>
                <Latex math={posterior} display={true} />
                <p className="text-xs text-emerald-700 leading-snug mt-0.5">
                  The kernel <Latex math="\prod_k \theta_k^{a_k - 1}" /> is
                  Dirichlet with parameters <Latex math="a_k" />. Read off:
                  the posterior adds observed counts to prior pseudo-counts,
                  element by element.
                </p>
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Posterior mean: weighted average
                </p>
                <Latex math={postMean} display={true} />
                <p className="text-xs text-slate-700 leading-snug mt-0.5">
                  Same structure as every conjugate family: prior proportion{' '}
                  <Latex math="\alpha_k/n_0" /> and sample proportion{' '}
                  <Latex math="n_k/n" />, weighted by total pseudo-count{' '}
                  <Latex math="n_0 = \sum_k \alpha_k" /> vs data{' '}
                  <Latex math="n" />.
                </p>
              </div>
    
              <div className="bg-white rounded p-1.5">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Marginal posteriors
                </p>
                <Latex math={marginalPost} display={true} />
                <p className="text-xs text-slate-700 leading-snug mt-0.5">
                  Each category{'\u2019'}s posterior is marginally Beta{'\u2014'}you
                  can compute credible intervals for any single{' '}
                  <Latex math="\theta_k" /> using the univariate Beta tools from
                  Slide 25.
                </p>
              </div>
            </div>
    
            {/* Right: interpretation */}
            <div className="flex flex-col gap-3 self-start">
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-3">
                <h3 className="font-bold text-blue-900 text-sm mb-1">
                  Hyperparameter roles
                </h3>
                <div className="space-y-1 text-xs text-blue-900">
                  <div className="bg-white rounded p-1.5 flex items-center gap-2">
                    <span className="font-mono bg-blue-100 px-1.5 py-0.5 rounded">
                      <Latex math="\alpha_k" />
                    </span>
                    <span>pseudo-count for category <Latex math="k" /></span>
                  </div>
                  <div className="bg-white rounded p-1.5 flex items-center gap-2">
                    <span className="font-mono bg-blue-100 px-1.5 py-0.5 rounded">
                      <Latex math="n_0 = \textstyle\sum_k \alpha_k" />
                    </span>
                    <span>total prior strength (effective sample size)</span>
                  </div>
                  <div className="bg-white rounded p-1.5 flex items-center gap-2">
                    <span className="font-mono bg-blue-100 px-1.5 py-0.5 rounded">
                      <Latex math="\alpha_k / n_0" />
                    </span>
                    <span>prior mean proportion for category <Latex math="k" /></span>
                  </div>
                  <div className="bg-white rounded p-1.5 flex items-center gap-2">
                    <span className="font-mono bg-blue-100 px-1.5 py-0.5 rounded">
                      <Latex math="n / (n + n_0)" />
                    </span>
                    <span>data weight (approaches 1 as <Latex math="n" /> grows)</span>
                  </div>
                </div>
              </div>
    
              <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-3">
                <h3 className="font-bold text-purple-900 text-sm mb-1">
                  How to choose the hyperparameters
                </h3>
                <div className="space-y-1.5 text-xs text-purple-900 leading-snug">
                  <p>
                    <strong>Weakly informative:</strong> all{' '}
                    <Latex math="\alpha_k = 1" /> gives a uniform distribution on
                    the simplex (<Latex math="n_0 = K" />). For a more diffuse
                    prior, use <Latex math="\alpha_k = 1/K" /> (
                    <Latex math="n_0 = 1" />{'\u2014'}one pseudo-observation
                    spread across K categories).
                  </p>
                  <p>
                    <strong>Informative:</strong> set{' '}
                    <Latex math="\alpha_k" /> to prior counts from a previous
                    study or domain knowledge. E.g., last election had 42%, 38%,
                    20% and you trust this at the level of 100 pseudo-votes:{' '}
                    <Latex math="\boldsymbol{\alpha} = (42, 38, 20)" />.
                  </p>
                  <p>
                    <strong>Jeffreys:</strong> all{' '}
                    <Latex math="\alpha_k = 1/2" />. Analogous to Beta(1/2, 1/2)
                    for the univariate case. Produces the reference prior with{' '}
                    <Latex math="n_0 = K/2" />.
                  </p>
                </div>
              </div>
    
              <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-2.5">
                <p className="text-xs text-amber-900 leading-snug">
                  <strong>Pattern across conjugate families.</strong> Every family
                  has the same update logic: add sufficient statistics to prior
                  hyperparameters. Beta-Binomial adds{' '}
                  <Latex math="(k, n{-}k)" />, Poisson-Gamma adds{' '}
                  <Latex math="(\sum y_i, n)" />, and Dirichlet-Multinomial adds{' '}
                  <Latex math="(n_1, \ldots, n_K)" />. The posterior mean is always
                  a weighted average of the prior mean and the MLE, with weights
                  determined by prior strength vs data size.
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

//                       SLIDE 34: CONJUGATE CATALOG
// ═══════════════════════════════════════════════════════════════════════

function Slide34_ConjugateCatalog() {
  const families = [
      {
        lik: '\\text{Binomial}(n, \\theta)',
        param: '\\theta',
        prior: '\\text{Beta}(\\alpha_0, \\beta_0)',
        update: '\\alpha_0 + k,\\;\\; \\beta_0 + n - k',
        ess: '\\alpha_0 + \\beta_0',
        covered: true,
      },
      {
        lik: '\\text{Poisson}(\\lambda)',
        param: '\\lambda',
        prior: '\\text{Gamma}(\\alpha_0, \\beta_0)',
        update: '\\alpha_0 + \\textstyle\\sum y_i,\\;\\; \\beta_0 + n',
        ess: '\\beta_0',
        covered: true,
      },
      {
        lik: '\\text{Multinomial}(n, \\boldsymbol{\\theta})',

        ess: '\\textstyle\\sum_k \\alpha_k',
        covered: true,
      },
      {
        lik: '\\text{Normal}(\\mu, \\sigma^2_{\\text{known}})',
        param: '\\mu',
        prior: '\\text{Normal}(\\mu_0, \\sigma_0^2)',
        update: '\\text{precision-weighted mean and variance}',
        ess: '\\sigma^2 / \\sigma_0^2',
        covered: true,
      },
      {
        lik: '\\text{Normal}(\\mu, \\sigma^2)',
        param: '\\mu, \\sigma^2',
        prior: '\\text{NIG}(\\mu_0, \\kappa_0, \\alpha_0, \\beta_0)',
        update: '\\text{4 update rules (Slide 29)}',
        ess: '\\kappa_0,\\; 2\\alpha_0',
        covered: true,
      },
      {
        lik: '\\text{Exponential}(\\lambda)',
        param: '\\lambda',
        prior: '\\text{Gamma}(\\alpha_0, \\beta_0)',
        update: '\\alpha_0 + n,\\;\\; \\beta_0 + \\textstyle\\sum y_i',
        ess: '\\alpha_0',
        covered: false,
      },
      {
        lik: '\\text{Geometric}(\\theta)',
        param: '\\theta',
        prior: '\\text{Beta}(\\alpha_0, \\beta_0)',

        ess: '\\alpha_0 + \\beta_0',
        covered: false,
      },
      {

        param: '\\theta',

        ess: '\\alpha_0 + \\beta_0',
        covered: false,
      },

        update: '\\alpha_0 + n/2,\\;\\; \\beta_0 + \\textstyle\\sum(y_i - \\mu)^2/2',
        ess: '2\\alpha_0',
        covered: false,
      },
      {
        lik: '\\text{Uniform}(0, \\theta)',
        param: '\\theta',
        prior: '\\text{Pareto}(\\theta_m, \\alpha_0)',
        update: '\\max(\\theta_m, y_{(n)}),\\;\\; \\alpha_0 + n',
        ess: '\\alpha_0',
        covered: false,
      },
    ];

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">Conjugate Family Catalog</h1>
            <p className="text-gray-600 text-sm">

            </p>
          </div>
    
          {/* Table */}
          <div className="flex-1 overflow-auto min-h-0">
            <table className="w-full border-collapse text-sm">
              <thead>
                <tr className="bg-slate-700 text-white">
                  <th className="p-2 text-left border border-slate-600 font-semibold">Likelihood</th>

                      <Latex math={f.prior} />
                    </td>
                    <td className="p-2 text-center border border-slate-200 text-xs">
                      <Latex math={f.update} />
                    </td>
                    <td className="p-2 text-center border border-slate-200 text-xs">
                      <Latex math={f.ess} />
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
    
          {/* Legend + unifying pattern */}
          <div className="flex-shrink-0 mt-2 grid grid-cols-3 gap-2">
            <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-2">
              <p className="text-xs text-emerald-900">
                <span className="inline-block w-3 h-3 bg-emerald-500 rounded-sm mr-1 align-middle"></span>
                <strong>Derived in this chapter.</strong> The remaining rows are
                additional conjugate pairs that follow the same pattern.
              </p>
            </div>
    
            <div className="col-span-2 bg-blue-50 border-2 border-blue-200 rounded-lg p-2">
              <p className="text-sm text-blue-900">
                <strong>Unifying pattern:</strong>{' '}
                <Latex math="\mathbb{E}[\theta \mid y] = \dfrac{n_0}{n_0 + n}\,\mu_0 + \dfrac{n}{n_0 + n}\,\hat{\theta}_{\text{MLE}}" />
              </p>
              <p className="text-xs text-blue-900 mt-1">
                Same weighted average in every family. As{' '}
                <Latex math="n \to \infty" />, the posterior converges to the MLE
                regardless of the prior.
              </p>
            </div>
          </div>
    
          {/* Shared-prior insight */}
          <div className="flex-shrink-0 mt-2 bg-amber-50 border-2 border-amber-300 rounded-lg p-2.5">
            <p className="text-xs text-amber-900 leading-snug">
              <strong>Why do different likelihoods share the same conjugate prior?</strong>{' '}
              Binomial, Geometric, and Negative Binomial all have kernels of the form{' '}
              <Latex math="\theta^a(1-\theta)^b" />{'\u2014'}they differ in what{' '}
              <Latex math="a" /> and <Latex math="b" /> count, but the shape matches
              the Beta kernel, so all three get a Beta conjugate prior. Similarly,
              Poisson and Exponential both produce{' '}
              <Latex math="\lambda^a e^{-b\lambda}" /> kernels, matching the Gamma.
              For single-parameter exponential families ({'\u00A7'}3.1), the conjugate
              prior is simply a density with the same functional form as the likelihood
              kernel{'\u2014'}prior times likelihood stays in the family because both
              are built from the same structure. This is why likelihood-based inference
              ({'\u00A7'}3.2) is the natural bridge to Bayesian analysis: the likelihood
              extracts the sufficient statistics, and the conjugate prior absorbs them.
              For multi-parameter models like NIG, the same exponential family principle
              applies in the natural parameterization, but the resulting prior acquires
              a richer conditional structure.
            </p>
          </div>
        </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════

function Slide35_JeffreysPriors() {
  const jeffreysFormula = "\\pi(\\theta) \\propto \\sqrt{\\mathcal{I}(\\theta)}";
    const jeffreysMulti = "\\pi(\\boldsymbol{\\theta}) \\propto \\sqrt{\\det\\!\\left(\\mathcal{I}(\\boldsymbol{\\theta})\\right)}";
    const fisherDef = "\\mathcal{I}(\\theta) = -\\mathbb{E}\\!\\left[\\frac{\\partial^2 \\log p(y \\mid \\theta)}{\\partial \\theta^2}\\right]";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">Jeffreys Prior: Letting the Data Speak</h1>

              regardless of parameterization

          </div>
    
          {/* Context strip */}

            <p className="text-xs text-slate-900 leading-snug">
              <strong>The goal.</strong> Slide 23 showed that {'"'}flat{'"'} priors
              encode opposite beliefs depending on the coordinate system. Jeffreys
              (1946) asked: is there a prior that gives <strong>the same posterior
              inference regardless of how you write the model down</strong>, while
              letting the data have as much influence on the posterior as possible?
              The answer uses the Fisher information from {'\u00A7'}3.3{'\u2014'}the
              geometry of the likelihood itself determines the prior.
            </p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-3 min-h-0">
            {/* Left: definition + invariance proof */}
            <div className="flex flex-col gap-2">
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-3">
                <h2 className="font-bold text-blue-900 text-sm mb-1">Definition</h2>
                <Latex math={jeffreysFormula} display={true} />
                <p className="text-xs text-blue-900 leading-snug mt-1">
                  where the Fisher information ({'\u00A7'}3.3) is:
                </p>
                <Latex math={fisherDef} display={true} />
                <p className="text-xs text-blue-900 leading-snug mt-1">
                  For vector parameters:{' '}
                  <Latex math={jeffreysMulti} />.
                </p>
              </div>
    
              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3">
                <h3 className="font-bold text-green-900 text-sm mb-1">
                  Why this recipe is parameterization-invariant
                </h3>
                <div className="text-xs text-green-900 leading-snug space-y-1.5">
    
                  <div className="bg-white rounded p-2">
                    <p className="text-slate-500 font-semibold mb-1">
                      Researcher A defines their prior on <Latex math="\theta" /> and
                      transforms to <Latex math="\phi" />
                    </p>
                    <Latex math="\pi(\theta) \propto \sqrt{\mathcal{I}_\theta(\theta)}" display={true} />
                    <Latex math="\xRightarrow{\text{change of variables}}\; \pi(\theta) \cdot \left|\frac{d\theta}{d\phi}\right| = \sqrt{\mathcal{I}_\theta(\theta)} \cdot \left|\frac{d\theta}{d\phi}\right| = \sqrt{\mathcal{I}_\phi(\phi)}" display={true} />
                    <p className="text-slate-600 mt-0.5">
                      (using <Latex math="\mathcal{I}_\phi = \mathcal{I}_\theta \cdot (d\theta/d\phi)^2" /> from {'\u00A7'}3.3)
                    </p>
                  </div>
    
                  <div className="bg-white rounded p-2">
                    <p className="text-slate-500 font-semibold mb-1">
                      Researcher B independently defines their prior on{' '}
                      <Latex math="\phi" />
                    </p>

                  <div className="grid grid-cols-2 gap-2">

                        <Latex math="\sqrt{\mathcal{I}_\phi}" />
                      </p>
                      <p className="text-emerald-800">

                        <Latex math="\sqrt{\mathcal{I}_\phi}" />
                      </p>
                      <p className="font-bold text-emerald-900 mt-1">

                    </div>

                        {'\u2718'} Flat recipe (Slide 23)

                      </p>
                      <p className="text-red-800">

                  </div>
                  <div className="bg-emerald-50 rounded p-1.5 text-xs">

                <div className="grid grid-cols-2 gap-2">
                  <div className="bg-slate-50 rounded p-1.5 text-xs">
                    <p className="text-slate-500 font-semibold mb-0.5">Fisher info</p>

                  </div>
                  <div className="bg-emerald-50 rounded p-1.5 text-xs">

                <p className="text-xs text-slate-700 mt-1 leading-snug">
                  Flat on <Latex math="\mu" />{'\u2014'}improper, but posterior is
                  proper for any <Latex math="n \geq 1" />. Location parameters

                </p>
              </div>
    
              <div className="bg-white border-2 border-slate-200 rounded-xl p-3">
                <p className="text-xs font-bold text-slate-800 mb-1">

                </p>
                <div className="grid grid-cols-2 gap-2">
                  <div className="bg-slate-50 rounded p-1.5 text-xs">
                    <p className="text-slate-500 font-semibold mb-0.5">Fisher info</p>
                    <Latex math="\mathcal{I}(\sigma) = \frac{2}{\sigma^2}" display={true} />
                  </div>
                  <div className="bg-emerald-50 rounded p-1.5 text-xs">
                    <p className="text-emerald-700 font-semibold mb-0.5">Jeffreys prior</p>
                    <Latex math="\pi(\sigma) \propto 1/\sigma" display={true} />
                  </div>
                </div>
                <p className="text-xs text-slate-700 mt-1 leading-snug">
                  Equivalent to flat on <Latex math="\log \sigma" />{'\u2014'}scale-invariant.

              <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-2.5">
                <p className="text-xs text-amber-900 leading-snug">
                  <strong>Cautions.</strong> Jeffreys priors are often improper{'\u2014'}
                  acceptable only when the resulting posterior is proper (check before

                  Jeffreys himself recommended using independent priors (one per
                  parameter) rather than the joint determinant.
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════

function Slide36_WeaklyInformativePriors() {
  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">
              Weakly Informative Priors
            </h1>
            <p className="text-gray-600 text-sm">
              The applied default (Gelman et al., 2008; Gabry et al., 2019)
            </p>
          </div>
    
          {/* Definition */}

            <h2 className="font-bold text-blue-900 text-sm mb-1">Definition</h2>
            <p className="text-sm text-blue-900 leading-snug">
              A <strong>weakly informative prior</strong> contains enough information
              to <strong>regularize</strong> the posterior{'\u2014'}ruling out
              parameter values that are physically impossible or scientifically
              absurd{'\u2014'}while remaining <strong>vague enough</strong> that,
              with a reasonable amount of data, the likelihood dominates and the
              prior has little influence on the conclusions. It is a deliberate
              middle ground between a flat prior (which encodes unintended beliefs
              per Slide 23) and an informative prior (which requires justification
              from domain expertise or prior studies).
            </p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-3 min-h-0">
            {/* Left: Gelman tips */}
            <div className="flex flex-col gap-2">
              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3">
                <h3 className="font-bold text-green-900 text-sm mb-2">
                  Practical tips (Gelman)
                </h3>
                <div className="space-y-2 text-sm text-green-900 leading-snug">
                  <div className="bg-white rounded-lg p-2 border border-green-200">
                    <p>
                      <strong>1. Think on the scale the parameter lives on.</strong>{' '}
                      A rate <Latex math="\lambda" /> is positive. A proportion{' '}
                      <Latex math="\theta \in [0,1]" />. A regression coefficient
                      lives on <Latex math="\mathbb{R}" />. Match the prior{'\u2019'}s
                      support to the parameter{'\u2019'}s domain{'\u2014'}use
                      half-distributions for scales, Beta for proportions, Normal
                      for location parameters.
                    </p>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-green-200">
                    <p>
                      <strong>2. Set the prior width from the outcome scale.</strong>{' '}
                      Ask: what is the largest plausible value this parameter could
                      take? If rates above 100/hour are absurd, your Gamma prior
                      should put negligible mass there. If a treatment effect above
                      50 points is impossible, your Normal prior should too.
                    </p>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-green-200">
                    <p>
                      <strong>3. Use half-distributions for scale parameters.</strong>{' '}
                      Variances and standard deviations must be positive.{' '}
                      <Latex math="\text{Half-Normal}(\sigma{=}s)" /> or{' '}
                      <Latex math="\text{Half-Cauchy}(\beta{=}s)" /> with{' '}
                      <Latex math="s" /> at the expected order of magnitude.
                      Gelman (2006) showed that Inverse-Gamma priors for hierarchical
                      variance parameters are sensitive near zero{'\u2014'}small shape
                      values can artificially pull the variance estimate downward.

                      calibrate.
                    </p>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-green-200">
                    <p>
                      <strong>4. Check with prior predictive simulation.</strong>{' '}
                      Draw parameters from the prior, simulate data, ask: does it
                      look like data that could plausibly arise? Works for any
                      model{'\u2014'}regression, hierarchical, count data, survival
                      (Gabry et al., 2019).
                    </p>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-green-200">
                    <p>
                      <strong>5. Set priors independently across parameters.</strong>{' '}
                      Joint priors are harder to specify and interpret. Independent
                      priors are the convention unless the model structure demands
                      dependence (e.g., the Normal-Inverse-Gamma conditional prior
                      on Slide 29).
                    </p>
                  </div>
                </div>
              </div>
            </div>
    
            {/* Right: Regression example */}
            <div className="flex flex-col gap-2 overflow-auto">
              <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-3">
                <h3 className="font-bold text-purple-900 text-sm mb-1">
                  Applying the tips: exam score ~ study hours
                </h3>
                <p className="text-sm text-purple-900 leading-snug mb-2">
                  We observe exam scores <Latex math="y_i" /> (mean 70, SD 15) for
                  students who study <Latex math="x_i" /> hours per week (mean 10,
                  SD 5). A realistic tutoring effect is ~3 points per extra hour.
                </p>
    
                <div className="bg-white rounded-lg p-2 border border-purple-200 mb-2">
                  <p className="text-sm font-bold text-purple-900 mb-1">Model</p>
                  <p className="text-sm text-purple-900 leading-snug mb-1">
                    Standardize both the outcome and the predictor (tip 1):
                  </p>
                  <Latex math="y_i^* = \frac{y_i - 70}{15}, \qquad x_i^* = \frac{x_i - 10}{5}" display={true} />
                  <Latex math="y_i^* = \alpha^* + \beta^*\, x_i^* + \varepsilon_i, \qquad \varepsilon_i \sim \mathcal{N}(0, \sigma^{*2})" display={true} />
                  <p className="text-sm text-purple-900 leading-snug">
                    Now <Latex math="\beta^*" /> is the expected change in outcome
                    (in SD units) per one-SD increase in study hours{'\u2014'}a
                    standardized effect size. A genuine 3 pt/hr effect corresponds
                    to:
                  </p>
                  <Latex math="\beta^* = \frac{\beta_{\text{raw}} \times \text{SD}_x}{\text{SD}_y} = \frac{3\;\text{pts/hr} \times 5\;\text{hrs}}{15\;\text{pts}} = 1.0" display={true} />
                </div>
    
                <div className="bg-white rounded-lg p-2 border border-purple-200 mb-2">
                  <p className="text-sm font-bold text-purple-900 mb-1">Prior choices</p>
                  <div className="text-sm text-purple-900 leading-snug space-y-1">
                    <p>
                      <Latex math="\alpha^* \sim \mathcal{N}(\mu{=}0,\;\sigma{=}1)" />:{' '}
                      after centering, the intercept should be near zero. A prior
                      SD of 1 allows the baseline to shift by up to{' '}
                      <Latex math="\pm 2" /> SD of the outcome (tip 2).
                    </p>
                    <p>
                      <Latex math="\beta^* \sim \mathcal{N}(\mu{=}0,\;\sigma{=}2.5)" />:{' '}
                      95% of prior mass within{' '}
                      <Latex math="\pm 5" /> SD of outcome per SD of predictor.
                      Back-transforming: <Latex math="\pm 5 \times 15 / 5 = \pm 15" />{' '}
                      raw points per hour. A genuine 3 pt/hr effect
                      (<Latex math="\beta^* = 1.0" />) sits well within the prior.
                      An effect of 15 pt/hr would be at the boundary{'\u2014'}implausible
                      for tutoring, as it should be (tip 2).
                    </p>
                    <p>
                      <Latex math="\sigma^* \sim \text{Half-Normal}(\sigma{=}1)" />:{' '}
                      positive by construction. On the standardized scale, the
                      residual SD should be near 1 (most variance unexplained) or
                      less (model explains variance). The mode at zero lets the data
                      determine the noise level (tip 3).
                    </p>
                  </div>
                </div>
    
                <div className="mb-2">
                  <ScriptLink
                    path="09_weakly_informative_priors.py"
                    label="09_weakly_informative_priors.py"
                    note="standardized model + prior predictive check"
                  />
                </div>
    
                <div className="bg-amber-50 rounded-lg p-2 border border-amber-300">
                  <p className="text-sm text-amber-900 leading-snug">
                    <strong>Without standardizing:</strong> the same{' '}
                    <Latex math="\mathcal{N}(0, 2.5)" /> on a raw slope (points per
                    hour) would put 95% of mass within{' '}
                    <Latex math="\pm 5" /> points per hour{'\u2014'}a genuine 3 pt/hr
                    effect would sit in the prior{'\u2019'}s tail. The prior is the
                    same; the scale makes it appropriate or not.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
  );
}

  const ppd = "p(\\tilde{y} \\mid y) = \\int p(\\tilde{y} \\mid \\theta)\\,p(\\theta \\mid y)\\,d\\theta";
    const jointDist = "p(\\tilde{y},\\, \\theta \\mid y) = p(\\tilde{y} \\mid \\theta)\\, p(\\theta \\mid y)";
    const derivation = "\\begin{aligned} p(\\tilde{y} \\mid y) &= \\int p(\\tilde{y} \\mid \\theta)\\, p(\\theta \\mid y)\\, d\\theta \\\\ &= \\binom{m}{\\tilde{y}} \\frac{1}{B(\\alpha^*, \\beta^*)} \\int \\theta^{\\alpha^* + \\tilde{y} - 1}(1-\\theta)^{\\beta^* + m - \\tilde{y} - 1}\\, d\\theta \\\\ &= \\binom{m}{\\tilde{y}} \\frac{B(\\alpha^* + \\tilde{y},\\, \\beta^* + m - \\tilde{y})}{B(\\alpha^*, \\beta^*)} \\end{aligned}";
    const betaBinomShort = "\\tilde{y} \\mid y \\sim \\text{BetaBinom}(m,\\, \\alpha^*,\\, \\beta^*)";
    const mcAlg = "\\tilde{y}^{(s)} \\sim p(\\tilde{y} \\mid \\theta^{(s)}), \\quad \\theta^{(s)} \\sim p(\\theta \\mid y)";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">Posterior Predictive Intervals</h1>
            <p className="text-gray-600 text-sm">Intervals for future observations, not parameters</p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-4 min-h-0">
            {/* LEFT: Definition + Analytical derivation + Key Insight */}
            <div className="flex flex-col gap-2">
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-3">
                <h2 className="font-bold text-blue-900 text-sm mb-1">Posterior Predictive Distribution</h2>
                <Latex math={ppd} display={true} />
                <p className="text-sm text-blue-900 leading-snug mt-1">
                  {"Marginalises parameter uncertainty. Two paths to evaluate the integral: closed-form when conjugate, or Monte Carlo for any model."}
                </p>
              </div>
    
              <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-3">
                <h3 className="font-bold text-purple-900 text-sm mb-1">
                  Analytical: Beta-Binomial conjugate case
                </h3>
                <p className="text-sm text-purple-900 leading-snug mb-1">
                  Posterior <Latex math={"\\theta \\mid y \\sim \\text{Beta}(\\alpha^*, \\beta^*)"} /> with{" "}
                  <Latex math={"\\alpha^* = \\alpha + k"} />,{" "}
                  <Latex math={"\\beta^* = \\beta + n - k"} />. Future
                  {" "}<Latex math={"\\tilde{y} \\sim \\text{Binomial}(m, \\theta)"} />.
                </p>
                <p className="text-sm text-purple-900 leading-snug mb-1">
                  <strong>Joint</strong> (using <Latex math={"\\tilde{y} \\perp y \\mid \\theta"} />):
                </p>
                <Latex math={jointDist} display={true} />
                <p className="text-sm text-purple-900 leading-snug mt-1 mb-1">
                  <strong>Marginalise</strong> over <Latex math={"\\theta"} />, substitute Binomial
                  {" "}{"\u00D7"} Beta and combine <Latex math={"\\theta"} />-powers; the integrand is a
                  Beta kernel:
                </p>
                <Latex math={derivation} display={true} />
                <p className="text-sm text-purple-900 leading-snug mt-1">
                  i.e. <Latex math={betaBinomShort} />. Same kernel-recognition
                  pattern as {"\u00A7"}5.2{"\u2014"}available whenever posterior{" "}
                  {"\u00D7"} likelihood collapses into a known density.
                </p>
              </div>
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3">
                <h3 className="font-bold text-amber-900 text-sm mb-1">Key Insight</h3>
                <p className="text-sm text-amber-900 leading-snug">
                  {"As the observed sample size "}<Latex math={"n"} />{" grows, credible intervals shrink toward zero\u2014you learn the parameter. Predictive intervals do NOT shrink to zero: even at "}<Latex math={"n = \\infty"} />{" where "}<Latex math={"\\theta"} />{" is known perfectly, individual future observations remain random. The irreducible width reflects the aleatoric component, which no amount of observed data eliminates."}
                </p>
              </div>
            </div>
    
            {/* RIGHT: Monte Carlo + Code + Comparison */}
            <div className="flex flex-col gap-2">
              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3">
                <h3 className="font-bold text-green-900 text-sm mb-1">Monte Carlo: general case</h3>
                <Latex math={mcAlg} display={true} />
                <div className="mt-1 text-sm text-green-900 leading-snug">
                  <p>1. Draw <Latex math={"\\theta^{(s)}"} /> from the posterior</p>
                  <p>2. Simulate <Latex math={"\\tilde{y}^{(s)}"} /> from the sampling model given <Latex math={"\\theta^{(s)}"} /></p>
                  <p>3. Percentiles of <Latex math={"\\{\\tilde{y}^{(s)}\\}"} /> give the predictive interval</p>
                </div>
                <p className="text-sm text-green-900 leading-snug mt-1.5 pt-1.5 border-t border-green-200">
                  <strong>Curry</strong> <Latex math={"\\theta \\mid y \\sim \\text{Beta}(35, 3)"} />, next{" "}
                  <Latex math={"m = 20"} /> free throws: 95% predictive interval <strong>[15, 20] makes</strong>,

              <div className="bg-gray-900 text-gray-100 rounded-lg p-2.5 font-mono text-xs leading-relaxed">

                <div>y_pred  = rng.binomial(n=m, p=theta_s)</div>
                <div>pi      = np.percentile(y_pred, [<span className="text-purple-300">2.5</span>, <span className="text-purple-300">97.5</span>])</div>
              </div>
              <ScriptLink path="04_credible_intervals.py" label="04_credible_intervals.py" note="posterior predictive on Curry FT" />
    
              <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-3">
                <h3 className="font-bold text-slate-900 text-sm mb-1">Two Types of Intervals</h3>
                <table className="w-full text-sm border-collapse mb-1.5">

                    </tr>
                    <tr>
                      <td className="p-1 border border-slate-200 font-semibold">Width (same scale)</td>
                      <td className="p-1 text-center border border-slate-200">Narrower</td>

                      <td className="p-1 text-center border border-slate-200">{"Shrinks \u2192 0"}</td>
                      <td className="p-1 text-center border border-slate-200">{"Aleatoric only"}</td>
                    </tr>
                  </tbody>
                </table>
                <p className="text-xs text-slate-700 leading-snug">
                  <strong>Epistemic</strong> (Greek <em>epist{"\u0113"}m{"\u0113"}</em>, knowledge):
                  uncertainty about <Latex math={"\\theta"} />, reducible with more data. <strong>Aleatoric</strong>{" "}
                  (Latin <em>alea</em>, dice): irreducible randomness in individual
                  observations, persisting even with perfect parameter knowledge.
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

    const marginal = "p(y) = \\int p(y \\mid \\theta)\\,p(\\theta)\\,d\\theta";
    const expectation = "\\mathbb{E}[g(\\theta) \\mid y] = \\int g(\\theta)\\,p(\\theta \\mid y)\\,d\\theta";
    const mcEstimator = "\\mathbb{E}[g(\\theta) \\mid y] \\;\\approx\\; \\frac{1}{S}\\sum_{s=1}^{S} g(\\theta^{(s)})";
    const gridCost = "O(n_m^d)";
    const mcmcCost = "O(T \\times d)";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">

                <h2 className="font-bold text-blue-800 mb-2">What We Know</h2>

                  {"From \u00A75.1, we can evaluate the posterior up to a constant:"}
                </p>
                <div className="bg-white rounded-lg p-2">
                  <Latex math={unnorm} display={true} />
                </div>
                <p className="text-sm text-blue-700 mt-2">
                  {"But the normalizing constant "}<Latex math={marginal} />
                  {" is an integral we cannot compute in closed form for most models."}
                </p>
              </div>
    
              <div className="bg-red-50 border-2 border-red-200 rounded-xl p-4">
                <h3 className="font-bold text-red-800 mb-2">What We Cannot Do</h3>
                <div className="space-y-2 text-sm text-red-800">
                  <p>{"Without the normalizing constant, we cannot:"}</p>
                  <p className="pl-3">
                    {"Evaluate exact probabilities like "}<Latex math={"P(\\theta \\in A \\mid y)"} />
                  </p>
                  <p className="pl-3">
                    {"Compute expectations: "}<Latex math={expectation} />
                  </p>
                  <p className="pl-3">
                    {"Produce exact posterior quantiles, credible intervals, or ROPE decisions"}
                  </p>
                  <p className="font-semibold mt-1">

                </div>
              </div>

            <div className="flex flex-col gap-3">
