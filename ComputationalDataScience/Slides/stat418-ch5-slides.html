    .border-red-300 { border-color: var(--red-300); }
    .border-red-400 { border-color: var(--red-400); }
    .border-rose-200 { border-color: var(--rose-200); }
    .border-rose-300 { border-color: var(--rose-300); }
    .border-pink-200 { border-color: var(--pink-200); }
    .border-pink-300 { border-color: var(--pink-300); }

    /* Semi-transparent borders */
    .border-white\/10 { border-color: rgb(255 255 255 / 0.1); }
    .border-white\/20 { border-color: rgb(255 255 255 / 0.2); }
    .border-white\/30 { border-color: rgb(255 255 255 / 0.3); }
    .border-blue-400\/30 { border-color: rgb(96 165 250 / 0.3); }
    .border-purple-400\/30 { border-color: rgb(192 132 252 / 0.3); }
    .border-purple-300\/30 { border-color: rgb(216 180 254 / 0.3); }
    .border-green-400\/30 { border-color: rgb(74 222 128 / 0.3); }
    .border-green-400\/50 { border-color: rgb(74 222 128 / 0.5); }
    .border-amber-400\/30 { border-color: rgb(251 191 36 / 0.3); }
    .border-pink-400\/30 { border-color: rgb(244 114 182 / 0.3); }
    .border-emerald-400\/30 { border-color: rgb(52 211 153 / 0.3); }
    .border-red-400\/30 { border-color: rgb(248 113 113 / 0.3); }
    .border-indigo-400\/30 { border-color: rgb(129 140 248 / 0.3); }
    .border-teal-400\/30 { border-color: rgb(45 212 191 / 0.3); }
    .border-violet-400\/30 { border-color: rgb(167 139 250 / 0.3); }
    .border-cyan-400\/30 { border-color: rgb(34 211 238 / 0.3); }

    /* ═══════════════════════════════════════════════════════════════════
       BORDER RADIUS
       ═══════════════════════════════════════════════════════════════════ */
    .rounded-none { border-radius: 0; }
    .rounded-sm { border-radius: 0.125rem; }
    .rounded { border-radius: 0.25rem; }
    .rounded-md { border-radius: 0.375rem; }
    .rounded-lg { border-radius: 0.5rem; }
    .rounded-xl { border-radius: 0.75rem; }
    .rounded-2xl { border-radius: 1rem; }
    .rounded-3xl { border-radius: 1.5rem; }
    .rounded-full { border-radius: 9999px; }
    .rounded-t { border-radius: 0.25rem 0.25rem 0 0; }
    .rounded-t-lg { border-radius: 0.5rem 0.5rem 0 0; }
    .rounded-t-xl { border-radius: 0.75rem 0.75rem 0 0; }
    .rounded-b { border-radius: 0 0 0.25rem 0.25rem; }
    .rounded-b-lg { border-radius: 0 0 0.5rem 0.5rem; }
    .rounded-b-xl { border-radius: 0 0 0.75rem 0.75rem; }
    .rounded-l { border-radius: 0.25rem 0 0 0.25rem; }
    .rounded-l-lg { border-radius: 0.5rem 0 0 0.5rem; }
    .rounded-r { border-radius: 0 0.25rem 0.25rem 0; }
    .rounded-r-lg { border-radius: 0 0.5rem 0.5rem 0; }

    /* ═══════════════════════════════════════════════════════════════════
       SHADOWS
       ═══════════════════════════════════════════════════════════════════ */
    .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .shadow { box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1); }
    .shadow-md { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
    .shadow-lg { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }
    .shadow-xl { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    .shadow-2xl { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
    .shadow-inner { box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05); }
    .shadow-none { box-shadow: none; }

    /* ═══════════════════════════════════════════════════════════════════
       OPACITY
       ═══════════════════════════════════════════════════════════════════ */
    .opacity-0 { opacity: 0; }
    .opacity-5 { opacity: 0.05; }
    .opacity-10 { opacity: 0.1; }
    .opacity-20 { opacity: 0.2; }
    .opacity-25 { opacity: 0.25; }
    .opacity-30 { opacity: 0.3; }
    .opacity-40 { opacity: 0.4; }
    .opacity-50 { opacity: 0.5; }
    .opacity-60 { opacity: 0.6; }
    .opacity-70 { opacity: 0.7; }
    .opacity-75 { opacity: 0.75; }
    .opacity-80 { opacity: 0.8; }
    .opacity-90 { opacity: 0.9; }
    .opacity-95 { opacity: 0.95; }
    .opacity-100 { opacity: 1; }

    /* ═══════════════════════════════════════════════════════════════════
       TRANSFORMS
       ═══════════════════════════════════════════════════════════════════ */
    .transform { transform: var(--tw-transform); }
    .translate-x-0 { transform: translateX(0); }
    .translate-y-0 { transform: translateY(0); }
    .-translate-x-1\/2 { transform: translateX(-50%); }
    .-translate-y-1\/2 { transform: translateY(-50%); }
    .translate-x-1\/2 { transform: translateX(50%); }
    .rotate-0 { transform: rotate(0deg); }
    .rotate-45 { transform: rotate(45deg); }
    .rotate-90 { transform: rotate(90deg); }
    .rotate-180 { transform: rotate(180deg); }
    .-rotate-45 { transform: rotate(-45deg); }
    .-rotate-90 { transform: rotate(-90deg); }
    .scale-75 { transform: scale(0.75); }
    .scale-90 { transform: scale(0.9); }
    .scale-95 { transform: scale(0.95); }
    .scale-100 { transform: scale(1); }
    .scale-105 { transform: scale(1.05); }
    .scale-110 { transform: scale(1.1); }
    .scale-125 { transform: scale(1.25); }
    .scale-150 { transform: scale(1.5); }

    /* ═══════════════════════════════════════════════════════════════════
       TRANSITIONS & ANIMATIONS
       ═══════════════════════════════════════════════════════════════════ */
    .transition-none { transition-property: none; }
    .transition-all { transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .transition-colors { transition: color 150ms, background-color 150ms, border-color 150ms, fill 150ms, stroke 150ms; }
    .transition-opacity { transition: opacity 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .transition-shadow { transition: box-shadow 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .transition-transform { transition: transform 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .duration-75 { transition-duration: 75ms; }
    .duration-100 { transition-duration: 100ms; }
    .duration-150 { transition-duration: 150ms; }
    .duration-200 { transition-duration: 200ms; }
    .duration-300 { transition-duration: 300ms; }
    .duration-500 { transition-duration: 500ms; }
    .ease-in { transition-timing-function: cubic-bezier(0.4, 0, 1, 1); }
    .ease-out { transition-timing-function: cubic-bezier(0, 0, 0.2, 1); }
    .ease-in-out { transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }

    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-bounce { animation: bounce-anim 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes bounce-anim { 0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); } 50% { transform: translateY(0); animation-timing-function: cubic-bezier(0,0,0.2,1); } }

    /* ═══════════════════════════════════════════════════════════════════
       FILTERS & EFFECTS
       ═══════════════════════════════════════════════════════════════════ */
    .backdrop-blur-sm { backdrop-filter: blur(4px); }
    .backdrop-blur { backdrop-filter: blur(8px); }
    .backdrop-blur-md { backdrop-filter: blur(12px); }
    .backdrop-blur-lg { backdrop-filter: blur(16px); }
    .blur-sm { filter: blur(4px); }
    .blur { filter: blur(8px); }
    .brightness-50 { filter: brightness(0.5); }
    .brightness-75 { filter: brightness(0.75); }
    .brightness-100 { filter: brightness(1); }
    .brightness-125 { filter: brightness(1.25); }
    .grayscale { filter: grayscale(100%); }
    .grayscale-0 { filter: grayscale(0); }

    /* ═══════════════════════════════════════════════════════════════════
       MISCELLANEOUS UTILITIES
       ═══════════════════════════════════════════════════════════════════ */
    .object-contain { object-fit: contain; }
    .object-cover { object-fit: cover; }
    .object-fill { object-fit: fill; }
    .object-center { object-position: center; }
    .cursor-pointer { cursor: pointer; }
    .cursor-default { cursor: default; }
    .cursor-not-allowed { cursor: not-allowed; }
    .select-none { user-select: none; }
    .select-text { user-select: text; }
    .select-all { user-select: all; }
    .pointer-events-none { pointer-events: none; }
    .pointer-events-auto { pointer-events: auto; }
    .resize-none { resize: none; }
    .list-none { list-style-type: none; }
    .list-disc { list-style-type: disc; }
    .list-decimal { list-style-type: decimal; }
    .list-inside { list-style-position: inside; }
    .list-outside { list-style-position: outside; }
    .appearance-none { appearance: none; }
    .outline-none { outline: 2px solid transparent; outline-offset: 2px; }

    /* ═══════════════════════════════════════════════════════════════════
       BUTTONS  --  Reset
       ═══════════════════════════════════════════════════════════════════ */
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }

    /* ═══════════════════════════════════════════════════════════════════
       CODE  --  Scoped to avoid bleeding into dark code blocks
       ═══════════════════════════════════════════════════════════════════ */
    code {
      font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
      background-color: #fef3c7;
      color: #92400e;
      padding: 0.125rem 0.25rem;
      border-radius: 0.25rem;
      font-size: 0.875em;
    }

    /* Reset code styling inside dark code block containers */
    [class*="bg-gray-900"] code,
    [class*="bg-gray-800"] code,
    [class*="bg-slate-900"] code,
    [class*="bg-slate-800"] code,
    [class*="bg-slate-700"] code,
    [class*="bg-black"] code {
      background-color: transparent;
      color: inherit;
      padding: 0;
      font-size: inherit;
    }

    pre { margin: 0; white-space: pre-wrap; word-break: break-word; }

    /* -- Image containment (prevents oversized images) -- */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* Inside flex containers, images must respect parent bounds */
    .flex-1 > img,
    .flex-1 img {
      max-height: 100%;
      object-fit: contain;
    }

    /* ═══════════════════════════════════════════════════════════════════
       TABLE DEFAULTS
       ═══════════════════════════════════════════════════════════════════ */
    table { border-collapse: collapse; }
    .table-auto { table-layout: auto; }
    .table-fixed { table-layout: fixed; }
    .border-collapse { border-collapse: collapse; }
    .border-separate { border-collapse: separate; }
    .border-spacing-0 { border-spacing: 0; }
    td, th { vertical-align: middle; }

    /* ═══════════════════════════════════════════════════════════════════
       HOVER / GROUP UTILITIES
       ═══════════════════════════════════════════════════════════════════ */
    .group:hover .group-hover\:opacity-100 { opacity: 1; }
    .group:hover .group-hover\:visible { visibility: visible; }
    .group:hover .group-hover\:text-white { color: #ffffff; }
    .group:hover .group-hover\:bg-white\/20 { background-color: rgb(255 255 255 / 0.2); }
    .hover\:bg-gray-100:hover { background-color: var(--gray-100); }
    .hover\:bg-gray-200:hover { background-color: var(--gray-200); }
    .hover\:bg-gray-700:hover { background-color: var(--gray-700); }
    .hover\:bg-blue-100:hover { background-color: var(--blue-100); }
    .hover\:bg-white\/10:hover { background-color: rgb(255 255 255 / 0.1); }
    .hover\:bg-white\/20:hover { background-color: rgb(255 255 255 / 0.2); }
    .hover\:text-blue-700:hover { color: var(--blue-700); }
    .hover\:text-white:hover { color: #ffffff; }
    .hover\:shadow-lg:hover { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .hover\:shadow-xl:hover { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .hover\:scale-105:hover { transform: scale(1.05); }
    .hover\:scale-102:hover { transform: scale(1.02); }
    .hover\:opacity-80:hover { opacity: 0.8; }
    .hover\:underline:hover { text-decoration: underline; }
    .hover\:no-underline:hover { text-decoration: none; }

    /* ═══════════════════════════════════════════════════════════════════
       SLIDE CONTAINER
       ═══════════════════════════════════════════════════════════════════ */
    .slide-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--gray-100);
    }

    .slide-header {
      background: var(--purdue-black);
      color: white;
      padding: 0.5rem 1rem;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-title .purdue { font-weight: 700; font-size: 1.125rem; }
    .header-title .course { color: var(--purdue-gold); font-size: 1rem; }

    .header-slide-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .slide-counter {
      color: var(--purdue-gold);
      font-family: monospace;
      font-size: 1rem;
    }

    .current-section {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(206, 184, 136, 0.2);
      padding: 0.25rem 0.75rem;
      border-radius: 0.375rem;
    }

    .current-section .icon { font-size: 1rem; }
    .current-section .name { color: var(--purdue-gold); font-size: 0.875rem; }

    /* ═══════════════════════════════════════════════════════════════════
       PROGRESS BAR  --  ACCESSIBLE
       ═══════════════════════════════════════════════════════════════════ */
    .progress-container {
      position: relative;
      width: 100%;
      padding: 0.5rem 0;
    }

    .section-labels {
      display: flex;
      margin-bottom: 0.5rem;
    }

    .section-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: all 0.3s ease;
      cursor: pointer;
      border-radius: 0.25rem;
    }

    .section-label.active { color: #fcd34d; }
    .section-label.completed { color: #86efac; }
    .section-label.future { color: #94a3b8; }
    .section-label:hover {
      color: var(--purdue-gold);
      background: rgba(255,255,255,0.1);
    }

    .progress-sections {
      display: flex;
      gap: 4px;
      height: 20px;
      align-items: flex-end;
    }

    .section-group {
      display: flex;
      gap: 1px;
      border-radius: 3px;
      overflow: hidden;
      transition: all 0.3s ease;
      position: relative;
    }

    .section-group.active {
      box-shadow: 0 0 0 2px var(--amber-400), 0 0 12px rgba(251, 191, 36, 0.4);
    }

    .slide-bar {
      min-width: 6px;
      flex: 1;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .slide-bar.current {
      height: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #e2e8f0 100%);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 20px rgba(251, 191, 36, 0.5);
      border-radius: 2px;
      z-index: 5;
    }

    .slide-bar.active-past { height: 14px; background: linear-gradient(180deg, var(--amber-400) 0%, var(--amber-600) 100%); }
    .slide-bar.active-past:hover, .slide-bar.active-past:focus-visible { height: 16px; background: linear-gradient(180deg, #fcd34d 0%, var(--amber-500) 100%); }
    .slide-bar.active-future { height: 10px; background: linear-gradient(180deg, var(--amber-700) 0%, var(--amber-800) 100%); }
    .slide-bar.active-future:hover, .slide-bar.active-future:focus-visible { height: 14px; background: linear-gradient(180deg, var(--amber-500) 0%, var(--amber-600) 100%); }
    .slide-bar.completed { height: 12px; background: linear-gradient(180deg, var(--green-400) 0%, var(--emerald-600) 100%); }
    .slide-bar.completed:hover, .slide-bar.completed:focus-visible { height: 14px; background: linear-gradient(180deg, #86efac 0%, var(--emerald-500) 100%); }
    .slide-bar.future { height: 8px; background: linear-gradient(180deg, var(--slate-500) 0%, var(--slate-600) 100%); }
    .slide-bar.future:hover, .slide-bar.future:focus-visible { height: 12px; background: linear-gradient(180deg, var(--slate-400) 0%, var(--slate-500) 100%); }

    .slide-bar::before {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: var(--slate-900);
      color: white;
      padding: 0.375rem 0.625rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.15s ease;
      pointer-events: none;
      z-index: 30;
    }

    .slide-bar:hover::before, .slide-bar:focus-visible::before {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .current-indicator {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: var(--amber-400);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--amber-400);
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-3px); }
    }

    .section-progress-text {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 700;
      color: #fcd34d;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .section-group.active .section-progress-text { opacity: 1; }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      font-size: 0.75rem;
    }

    .progress-counter {
      font-family: monospace;
      font-weight: 700;
      color: #fcd34d;
      background: var(--slate-800);
      padding: 0.25rem 0.625rem;
      border-radius: 0.25rem;
    }

    .progress-legend {
      display: flex;
      gap: 1rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: #cbd5e1;
      font-size: 0.75rem;
    }

    .legend-bar { width: 12px; border-radius: 2px; }
    .legend-bar.completed { height: 10px; background: var(--green-400); }
    .legend-bar.active { height: 12px; background: var(--amber-400); }
    .legend-bar.current { height: 14px; background: white; box-shadow: 0 0 4px rgba(255,255,255,0.5); }
    .legend-bar.future { height: 6px; background: var(--slate-500); }

    /* ═══════════════════════════════════════════════════════════════════
       SLIDE CONTENT
       ═══════════════════════════════════════════════════════════════════ */
    .slide-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      justify-content: center;
    }

    .slide-wrapper {
      width: 100%;
      max-width: 1400px;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      padding: 2rem 2.5rem;
      min-height: calc(100vh - 180px);
      display: flex;
      flex-direction: column;
    }

    .slide-wrapper > *:first-child { background-color: white; }

    .slide-wrapper > *:first-child[class*="bg-gradient"],
    .slide-wrapper > *:first-child[class*="bg-gray-900"],
    .slide-wrapper > *:first-child[class*="bg-slate-900"],
    .slide-wrapper > *:first-child[class*="bg-slate-800"],
    .slide-wrapper > *:first-child[class*="bg-black"] {
      background-color: transparent;
    }

    /* ═══════════════════════════════════════════════════════════════════
       NAVIGATION  --  ACCESSIBLE
       ═══════════════════════════════════════════════════════════════════ */
    .slide-nav {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.95);
      padding: 0.75rem;
      border-radius: 0.75rem;
      z-index: 100;
    }

    .slide-nav button {
      width: 3rem;
      height: 3rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.25rem;
      transition: background 0.2s;
      min-width: 44px;  /* WCAG touch target */
      min-height: 44px;
    }

    .slide-nav button:hover:not(:disabled),
    .slide-nav button:focus-visible:not(:disabled) {
      background: var(--gray-700);
    }

    .nav-divider {
      width: 1px;
      height: 2.5rem;
      background: var(--gray-600);
      align-self: center;
    }

    /* ═══════════════════════════════════════════════════════════════════
       HELP MODAL
       ═══════════════════════════════════════════════════════════════════ */
    .help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .help-content {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .help-content h2 { margin-bottom: 1.5rem; }

    .help-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.75rem 1rem;
      font-size: 1rem;
      align-items: center;
    }

    .help-key {
      font-family: monospace;
      background: var(--gray-100);

    function useFocusTrap(isActive, containerRef) {
      useEffect(() => {
        if (!isActive || !containerRef.current) return;
        
        const container = containerRef.current;
        const focusableElements = container.querySelectorAll(
          'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'

        const firstElement = focusableElements[0];

            }

              firstElement?.focus();
            }
          }

function Slide04_ThreeStepWorkflow() {
  const blueSub = { text: 'text-blue-700', border: 'border-blue-200' };
    const greenSub = { text: 'text-green-700', border: 'border-green-200' };
    const purpleSub = { text: 'text-purple-700', border: 'border-purple-200' };

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">The Three-Step Bayesian Workflow</h1>
            <p className="text-gray-600">Every Bayesian analysis follows this structure (Gelman et al., 2013)</p>
          </div>
    
          {/* Three step panels with arrows */}
          <div className="flex-1 flex gap-2 items-stretch">
            {/* STEP 1: SPECIFY with two sub-boxes */}
            <StepPanel04 num="1" title="Specify" color="blue">
              <SubBox04
                label="Likelihood"
                labelColor={blueSub}
                equation="L(\theta;\, y) = p(y \mid \theta)"
                description={
                  <>
                    For <Latex math="\theta \in \Theta" /> and observed <Latex math="y" />, the density or
                    mass of <Latex math="y" /> viewed as a function of <Latex math="\theta" />. Specifies
                    the data-generating process.
                  </>
                }
              />
              <SubBox04
                label="Prior"
                labelColor={blueSub}
                equation="\theta \sim \pi(\theta)"
                description={
                  <>
                    A probability distribution on <Latex math="\Theta" /> encoding information about{' '}
                    <Latex math="\theta" /> prior to observing <Latex math="y" />. Non-informative, weakly
                    informative, or informative ({'\u00A7'}5.2).
                  </>
                }
              />
              <p className="text-[11px] text-gray-700 leading-snug mt-auto">
                Together these give the joint model <Latex math="p(y, \theta) = p(y \mid \theta)\,\pi(\theta)" />.
                All modeling assumptions live in this step and are explicit and auditable.
              </p>
            </StepPanel04>
    
            <div className="flex items-center text-gray-300 text-2xl font-bold px-1">{'\u2192'}</div>
    
            {/* STEP 2: COMPUTE */}
            <StepPanel04 num="2" title="Compute" color="green">
              <SubBox04
                label={"Bayes\u2019 Theorem"}
                labelColor={greenSub}
                equation="p(\theta \mid y) = \dfrac{p(y \mid \theta)\,\pi(\theta)}{p(y)}"
                description={
                  <>
                    The posterior <Latex math="p(\theta \mid y)" /> is the conditional distribution of{' '}
                    <Latex math="\theta" /> given <Latex math="y" />, with marginal likelihood{' '}
                    <Latex math="p(y) = \int_{\Theta} p(y \mid \theta)\,\pi(\theta)\,d\theta" />.
                  </>
                }
              />
              <p className="text-[11px] text-gray-800 leading-snug font-semibold">
                Three approaches, chosen by dimension of <Latex math="\theta" />:
              </p>
              <ol className="text-[11px] text-gray-800 leading-snug list-decimal pl-5 space-y-1">
                <li>
                  <span className="font-semibold">Conjugate analysis</span> ({'\u00A7'}5.2): prior and
                  likelihood in matched families, yielding a closed-form posterior in the same family as
                  the prior.
                </li>
                <li>
                  <span className="font-semibold">Grid approximation</span> ({'\u00A7'}5.1): evaluate{' '}
                  <Latex math="p(\theta \mid y)" /> on a discrete grid over <Latex math="\Theta" />.
                  Feasible for one or two parameters.
                </li>
                <li>
                  <span className="font-semibold">Markov chain Monte Carlo</span>{' '}
                  ({'\u00A7'}{'\u00A7'}5.4{'\u2013'}5.6): simulate a chain whose stationary distribution is{' '}
                  <Latex math="p(\theta \mid y)" />. Scales to hierarchical and high-dimensional models.
                </li>
              </ol>
              <p className="text-[11px] text-gray-700 leading-snug mt-auto">
                The normalizer <Latex math="p(y)" /> is typically intractable analytically, so the
                proportional form <Latex math="p(\theta \mid y) \propto p(y \mid \theta)\,\pi(\theta)" />{' '}
                is the practical starting point.
              </p>
            </StepPanel04>
    
            <div className="flex items-center text-gray-300 text-2xl font-bold px-1">{'\u2192'}</div>
    
            {/* STEP 3: EVALUATE */}
            <StepPanel04 num="3" title="Evaluate" color="purple">
              <SubBox04
                label="Posterior Predictive"
                labelColor={purpleSub}
                equation="p(y^{\text{rep}} \mid y) = \int_{\Theta} p(y^{\text{rep}} \mid \theta)\,p(\theta \mid y)\,d\theta"
                description={
                  <>
                    Distribution of hypothetical replications <Latex math="y^{\text{rep}}" /> under the
                    fitted model. Approximated by drawing <Latex math="\theta^{(s)} \sim p(\theta \mid y)" />{' '}
                    then <Latex math="y^{\text{rep},(s)} \sim p(y \mid \theta^{(s)})" />.
                  </>
                }
              />
              <p className="text-[11px] text-gray-800 leading-snug font-semibold">
                Three kinds of checks:
              </p>
              <ol className="text-[11px] text-gray-800 leading-snug list-decimal pl-5 space-y-1">
                <li>
                  <span className="font-semibold">Convergence diagnostics</span>:{' '}
                  <Latex math="\hat{R}" /> (potential scale reduction) and effective sample size verify
                  that the sampler reached its target distribution.
                </li>
                <li>
                  <span className="font-semibold">Posterior predictive checks</span> ({'\u00A7'}5.7):
                  draw <Latex math="y^{\text{rep}}" /> from the fitted model and compare with observed{' '}
                  <Latex math="y" /> under chosen test statistics to detect systematic misfit.
                </li>
                <li>
                  <span className="font-semibold">Model comparison</span> ({'\u00A7'}5.7):
                  cross-validation and information criteria rank candidate models by expected
                  out-of-sample predictive accuracy.
                </li>
              </ol>
              <p className="text-[11px] text-gray-700 leading-snug mt-auto">
                Failure at any stage returns you to Step 1{'\u2014'}this is a loop, not a pipeline.
              </p>
            </StepPanel04>
          </div>
    
          {/* Warning */}
          <div className="flex-shrink-0 mt-3 bg-amber-50 border-2 border-amber-300 rounded-xl p-3">
            <p className="text-amber-900 text-sm">
              <strong>{'\u26A0\uFE0F'} Step 1 is the most consequential.</strong>{' '}
              Every assumption in a Bayesian model is explicit and auditable{'\u2014'}this transparency
              is both a strength and a responsibility.
            </p>
          </div>
        </div>
  );
}

function Slide06_BayesTheorem() {
  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">

          {/* Main equation */}
          <div className="flex-shrink-0 bg-slate-50 border-2 border-slate-300 rounded-2xl p-5 mb-4 text-center">
            <Latex math="p(\theta \mid y) \;=\; \frac{p(y \mid \theta)\,\pi(\theta)}{p(y)} \;=\; \frac{p(y \mid \theta)\,\pi(\theta)}{\displaystyle\int_{\Theta} p(y \mid \theta')\,\pi(\theta')\,d\theta'}" display={true} />
          </div>
    
          {/* Four component cards */}
          <div className="flex-1 grid grid-cols-2 gap-4">
            <ComponentCard06 title="Prior Distribution" symbol={"\\pi(\\theta)"} color="blue">
              <p className="text-blue-900">

                <Latex math="\theta" /> <em>before</em> observing <Latex math="y" />. Must integrate to{' '}
                <Latex math="1" /> over <Latex math="\Theta" /> (proper prior). Ranges from non-informative
                (diffuse, lets data dominate) to weakly informative (soft regularization) to informative
                (previous studies, physical constraints). Prior predictive simulation verifies sensibility
                before fitting. Systematically developed in {'\u00A7'}5.2.
              </p>
            </ComponentCard06>
    
            <ComponentCard06 title="Likelihood" symbol={"p(y \\mid \\theta)"} color="green">
              <p className="text-green-900">
                A <em>function</em> of <Latex math="\theta" />, not a density over <Latex math="\theta" />.
                The same mathematical object from Chapter 3:{' '}
                <Latex math="L(\theta; y) = \prod_{i=1}^n f(y_i \mid \theta)" />. With <Latex math="y" />
                {' '}observed and fixed, <Latex math="\theta" /> varies over <Latex math="\Theta" />; the
                likelihood does <em>not</em> integrate to <Latex math="1" /> over <Latex math="\Theta" />,
                which is exactly why Bayes{"\u2019"} theorem needs the normalizer <Latex math="p(y)" />.
                Its relative magnitude across <Latex math="\theta" /> values quantifies how well each

            </ComponentCard06>
    
            <ComponentCard06 title="Marginal Likelihood (Evidence)" symbol={"p(y)"} color="amber">
              <p className="text-amber-900">
                Defined as <Latex math="p(y) = \int_{\Theta} p(y \mid \theta)\,\pi(\theta)\,d\theta" />

                it integrates to <Latex math="1" />. Typically intractable analytically; this is precisely
                why Markov chain Monte Carlo exists. Most posterior inference uses the proportional form{' '}
                <Latex math="p(\theta \mid y) \propto p(y \mid \theta)\,\pi(\theta)" /> and bypasses{' '}

                answer. Combines prior and likelihood additively on the log scale:{' '}
                <Latex math="\log p(\theta \mid y) = \log p(y \mid \theta) + \log \pi(\theta) + \text{const}" />.
                Likelihood-dominated as <Latex math="n \to \infty" /> (the posterior concentrates near{' '}
                <Latex math="\hat{\theta}_{\text{MLE}}" />); prior contributes meaningfully when{' '}

function Slide07_ProportionalForm() {
  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">The Proportional-To Form</h1>
            <p className="text-gray-600">The workhorse of Bayesian computation</p>
          </div>
    
          {/* Central equation box with both multiplicative and log forms */}
          <div className="flex-shrink-0 bg-emerald-50 border-2 border-emerald-400 rounded-2xl p-5 mb-4 text-center">
            <Latex math="p(\theta \mid y) \;\propto\; p(y \mid \theta)\,\pi(\theta)" display={true} />
            <Latex math="\log p(\theta \mid y) \;=\; \log p(y \mid \theta) + \log \pi(\theta) + \text{const}" display={true} />
            <p className="text-emerald-900 text-sm mt-3">
              <strong>Posterior is proportional to likelihood times prior.</strong> On the log scale, the prior
              acts as an additive penalty on the log-likelihood{'\u2014'}the direct analog of penalized
              regression in Ch. 3.
            </p>
          </div>
    
          {/* Two-column: why it works / why it's remarkable */}
          <div className="flex-1 grid grid-cols-2 gap-5">
            <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-5">
              <h2 className="font-bold text-blue-900 mb-3">Why This Works</h2>
              <div className="space-y-2.5 text-sm text-blue-900">
                <p>
                  Since <Latex math="p(y)" /> is constant in <Latex math="\theta" />, the shape of the
                  posterior is determined entirely by the unnormalized product{' '}
                  <Latex math="q(\theta) = p(y \mid \theta)\,\pi(\theta)" />. The <Latex math="\propto" />
                  {' '}symbol means equal up to the multiplicative constant <Latex math="1/p(y)" />.
                </p>
                <p className="font-semibold">Each method handles the missing normalizer differently:</p>
                <ul className="list-disc pl-5 space-y-1 text-[12.5px]">
                  <li>
                    <strong>Grid:</strong>{' '}
                    <Latex math="p(y) \approx \sum_k q(\theta_k)\,\Delta\theta" />{' '}
                    {'\u2014'} falls out of the same grid evaluations used for <Latex math="q" /> itself.
                  </li>
                  <li>
                    <strong>Conjugate:</strong> <Latex math="q(\theta)" /> matches a known distribution
                    family; the normalizer is tabulated (e.g., the Beta function).
                  </li>
                  <li>
                    <strong>MCMC:</strong> acceptance ratios <Latex math="q(\theta')/q(\theta)" /> cancel{' '}
                    <Latex math="p(y)" /> identically {'\u2014'} it never needs to be computed.
                  </li>
                </ul>
                <div className="font-semibold bg-white p-2 rounded-lg border border-blue-200">
                  <p>The integral being sidestepped:</p>
                  <div className="text-center my-1">
                    <Latex math="p(y) = \int_{\Theta} p(y \mid \theta)\,\pi(\theta)\,d\theta" display={true} />
                  </div>
                  <p>typically has no closed form.</p>
                </div>
              </div>
            </div>
    
            <div className="bg-green-50 border-2 border-green-200 rounded-xl p-5">
              <h3 className="font-bold text-green-900 mb-3">Why This Matters Computationally</h3>
              <div className="space-y-2.5 text-sm text-green-900">
                <p>
                  The proportional form asks only that you evaluate <Latex math="q(\theta)" /> at chosen
                  points{'\u2014'}a much weaker computational primitive than the sampling distribution of{' '}
                  <Latex math="\hat{\theta}" /> that frequentist inference needs. Three concrete
                  consequences:
                </p>
                <ol className="list-decimal pl-5 space-y-1.5 text-[12.5px]">
                  <li>
                    <strong>Sampling-based posterior approximation becomes possible.</strong> The methods
                    developed in {'\u00A7'}{'\u00A7'}5.4{'\u2013'}5.5 require only pointwise evaluation of{' '}
                    <Latex math="q(\theta)" />; <Latex math="p(y)" /> is never computed or integrated.
                    The proportional form is what makes them work at all.
                  </li>
                  <li>
                    <strong>Models with intractable MLEs become feasible.</strong> Hierarchical and
                    latent-variable models rarely have closed-form marginal likelihoods for{' '}
                    <Latex math="\hat{\theta}_{\text{MLE}}" />, but their joint density{' '}
                    <Latex math="q(\theta, z) = p(y \mid \theta, z)\,p(z \mid \theta)\,\pi(\theta)" /> is
                    usually evaluable pointwise{'\u2014'}enough for the sampling methods ahead.
                  </li>
                  <li>
                    <strong>Functionals of <Latex math="\theta" /> come for free.</strong> Posterior draws{' '}
                    <Latex math="\{\theta^{(s)}\}" /> push through any function{'\u2014'}smooth, non-smooth,
                    nonlinear: <Latex math="\{\varphi(\theta^{(s)})\}" /> is a valid sample from{' '}
                    <Latex math="p(\varphi \mid y)" /> with no delta method, no bootstrap, no Hadamard
                    differentiability condition on <Latex math="\varphi" />.
                  </li>
                </ol>
                <div className="font-semibold bg-white p-2.5 rounded-lg border border-green-200 space-y-1.5">
                  <p>The proportional form relocates computation{'\u2014'}it does not eliminate it.</p>
                  <p>Several frequentist advantages remain unchanged:</p>
                  <ul className="list-disc pl-5 space-y-1 text-[12px] font-normal">
                    <li>
                      <strong>Speed and determinism.</strong> MLE via optimization converges in a
                      predictable number of steps; sampling methods require ongoing convergence
                      monitoring and can fail silently.
                    </li>
                    <li>
                      <strong>Large samples with simple models.</strong> Under asymptotic regularity,
                      MLE and posterior concentrate on the same point with the same covariance; the
                      fastest tool wins, and that is usually MLE.
                    </li>
                    <li>
                      <strong>Institutional context.</strong> Regulatory review, clinical trials, and
                      most journals expect confidence intervals and p-values. The language of the
                      audience is not a technical question.
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
    
          {/* Three-pill footer matching Slide 6 pattern */}
          <div className="flex-shrink-0 mt-3 grid grid-cols-3 gap-3">
            <div className="bg-blue-600 text-white rounded-xl px-4 py-2.5 text-center shadow-md">
              <p className="text-[11px] font-bold uppercase tracking-widest opacity-80">Grid Approximation</p>
              <p className="text-sm font-semibold mt-0.5">
                <em>Evaluate <Latex math="q(\theta)" /> on a discrete grid</em>
              </p>
              <p className="text-[11px] opacity-85 mt-1">this section</p>
            </div>
            <div className="bg-green-600 text-white rounded-xl px-4 py-2.5 text-center shadow-md">
              <p className="text-[11px] font-bold uppercase tracking-widest opacity-80">Conjugate Analysis</p>
              <p className="text-sm font-semibold mt-0.5">
                <em>Closed-form posterior</em>
              </p>
              <p className="text-[11px] opacity-85 mt-1">{'\u00A7'}5.2</p>
            </div>
            <div className="bg-purple-600 text-white rounded-xl px-4 py-2.5 text-center shadow-md">
              <p className="text-[11px] font-bold uppercase tracking-widest opacity-80">MCMC</p>
              <p className="text-sm font-semibold mt-0.5">
                <em>Simulate from the posterior</em>
              </p>
              <p className="text-[11px] opacity-85 mt-1">{'\u00A7'}{'\u00A7'}5.4{'\u2013'}5.5</p>
            </div>
          </div>
        </div>
  );
}

                <em>kernel</em> of a density is whatever depends on <Latex math="\theta" />{' '}
                once all <Latex math="\theta" />-free factors have been dropped. If the product on the
                right matches the kernel of a known family, the normalizer comes for free{'\u2014'}the
                family's tabulated normalizing constant supplies whatever{' '}
                <Latex math="p(y) = \int p(y\mid\theta)\pi(\theta)\, d\theta" /> would have computed.
              </p>
    
              <div className="bg-white rounded-lg p-3 border border-indigo-200">
                <p className="text-sm font-bold text-indigo-800 mb-1.5">Pattern-matching algorithm</p>
                <ol className="list-decimal pl-5 text-sm text-indigo-900 space-y-1">
                  <li>Write <Latex math="p(y\mid\theta)\pi(\theta)" /> fully expanded</li>
                  <li>Drop every factor not involving <Latex math="\theta" /></li>
                  <li>Collect exponents; regroup terms</li>
                  <li>Match the result to a standard kernel</li>

                </ol>
              </div>
    
              <div className="bg-indigo-100 rounded-lg p-3 border border-indigo-300">
                <p className="text-sm text-indigo-900 leading-snug">
                  <strong>When this works: conjugate priors.</strong> A prior is <em>conjugate</em> to
                  a likelihood when this pattern-match always succeeds{'\u2014'}the posterior lands in
                  the same family as the prior, differing only in updated parameters. Exponential
                  families have a conjugate prior by construction ({'\u00A7'}3.1); {'\u00A7'}5.2
                  catalogs the five standard cases.
                </p>
              </div>
            </div>
    
            {/* RIGHT: The example */}
            <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-4 flex flex-col gap-2.5 overflow-auto">
              <h3 className="font-bold text-slate-800">
                Example: Poisson{'\u2013'}Gamma (general <Latex math="n" />)
              </h3>
    
              <div className="bg-white rounded-lg p-2.5 border border-slate-200">
                <p className="text-xs font-bold text-slate-700 mb-1">Setup and goal</p>
                <p className="text-xs text-slate-800 leading-snug">
                  Observations{' '}
                  <Latex math="y_1, \ldots, y_n \overset{\text{iid}}{\sim} \text{Poisson}(\lambda)" />,
                  prior <Latex math="\lambda \sim \text{Gamma}(\alpha_0, \beta_0)" />.{' '}
                  <strong>Goal:</strong> the posterior{' '}
                  <Latex math="p(\lambda \mid y_1, \ldots, y_n)" />.
                </p>
              </div>
    
              <div className="bg-indigo-50 border border-indigo-300 rounded-lg p-2.5">
                <p className="text-xs text-indigo-900 leading-snug">
                  <strong>Proportional form (Slide 7).</strong>{' '}
                  <Latex math="p(\lambda \mid \mathbf{y}) \propto p(\mathbf{y} \mid \lambda)\,\pi(\lambda)" />;{' '}
                  any factor not involving <Latex math="\lambda" /> is absorbed into the normalizer{' '}
                  <Latex math="p(\mathbf{y})" />{'\u2014'}permission to drop such factors as we go.
                </p>
              </div>
    
              <div className="bg-white rounded-lg p-2.5 border border-slate-200">
                <p className="text-xs font-bold text-slate-700 mb-1">
                  Likelihood <Latex math="\times" /> prior, written in full
                </p>
                <Latex
                  math="p(\mathbf{y} \mid \lambda)\,\pi(\lambda) \;=\; \left(\prod_{i=1}^{n} \frac{\lambda^{y_i} e^{-\lambda}}{y_i!}\right) \cdot \frac{\beta_0^{\alpha_0}}{\Gamma(\alpha_0)}\, \lambda^{\alpha_0 - 1}\, e^{-\beta_0 \lambda}"
                  display={true}
                />
              </div>
    
              <div className="bg-white rounded-lg p-2.5 border border-slate-200">
                <p className="text-xs font-bold text-slate-700 mb-1">

                </p>
                <p className="text-xs text-slate-700 leading-snug mb-1">
                  The <Latex math="y_i!" /> in the likelihood and the{' '}
                  <Latex math="\beta_0^{\alpha_0}/\Gamma(\alpha_0)" /> in the prior contain no{' '}
                  <Latex math="\lambda" /> and therefore drop by the proportional form:
                </p>
                <Latex
                  math="p(\lambda \mid \mathbf{y}) \;\propto\; \left(\lambda^{\sum y_i}\, e^{-n\lambda}\right) \cdot \left(\lambda^{\alpha_0 - 1}\, e^{-\beta_0 \lambda}\right)"
                  display={true}
                />
              </div>
    
              <div className="bg-white rounded-lg p-2.5 border border-slate-200">
                <p className="text-xs font-bold text-slate-700 mb-1">Collect exponents</p>
                <Latex
                  math="\;=\; \lambda^{\alpha_0 + \sum y_i - 1}\, e^{-(\beta_0 + n)\lambda}"
                  display={true}
                />
              </div>
    
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-2.5">
                <p className="text-xs font-bold text-emerald-900 mb-1">
                  Recognize the kernel <Latex math="\Rightarrow" /> update rule
                </p>
                <p className="text-sm text-emerald-900">
                  <Latex math="\lambda^{\alpha_0 + \sum y_i - 1} e^{-(\beta_0 + n)\lambda}" /> is the
                  kernel of
                </p>
                <Latex
                  math="\lambda \mid \mathbf{y} \;\sim\; \text{Gamma}\!\left(\alpha_0 + \textstyle\sum_{i=1}^n y_i,\; \beta_0 + n\right)."
                  display={true}
                />
                <p className="text-xs text-emerald-900 leading-snug">
                  <strong>Posterior mean as a weighted average:</strong>
                </p>
                <Latex
                  math="\mathbb{E}[\lambda \mid \mathbf{y}] \;=\; \frac{\alpha_0 + \sum y_i}{\beta_0 + n} \;=\; \underbrace{\frac{\beta_0}{\beta_0 + n}}_{\text{prior weight}}\cdot\frac{\alpha_0}{\beta_0} \;+\; \underbrace{\frac{n}{\beta_0 + n}}_{\text{data weight}}\cdot\frac{\sum y_i}{n}"
                  display={true}
                />
                <p className="text-xs text-emerald-900 leading-snug">
                  <strong>Why <Latex math="\alpha_0" /> is absent from the weights.</strong> Read{' '}
                  <Latex math="\beta_0" /> as a <em>prior sample size</em>: the prior{' '}
                  <Latex math="\text{Gamma}(\alpha_0, \beta_0)" /> has the same form as a posterior
                  would after <Latex math="\beta_0" /> imagined observations totaling{' '}
                  <Latex math="\alpha_0" /> counts. The update rule then reads as pooling:{' '}
                  <Latex math="\beta_0 + n" /> total observations,{' '}
                  <Latex math="\alpha_0 + \sum y_i" /> total counts. The weights weigh prior
                  pseudo-observations against real ones{'\u2014'}<Latex math="\beta_0" /> vs{' '}
                  <Latex math="n" />. <Latex math="\alpha_0" /> only fixes where the prior is centered{' '}
                  (<Latex math="\alpha_0/\beta_0" />), not how strongly it pulls.
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

}

              <div className="bg-green-50 border-2 border-green-300 rounded-xl p-4 flex-1">

                </h3>
                <div className="space-y-1.5 text-sm text-green-900 leading-snug">
                  <p><strong>Strategy.</strong> Construct a Markov chain whose stationary

                  <p><strong>Cost.</strong> Far better than <Latex math="O(n_g^d)" /> on

}

function Slide16_ThreePointEstimates() {

    const meanLoss = "\\arg\\min_a \\mathbb{E}[(\\theta - a)^2 \\mid y]";
    const mapFormula = "\\hat{\\theta}_{\\text{MAP}} = \\arg\\max_\\theta\\, p(\\theta \\mid y)";
    const mapAlt = "= \\arg\\max_\\theta\\, [\\log p(y \\mid \\theta) + \\log \\pi(\\theta)]";
    const medianFormula = "P(\\theta \\leq \\tilde{\\theta} \\mid y) = 0.5";
    const medianLoss = "\\arg\\min_a \\mathbb{E}[|\\theta - a| \\mid y]";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">Three Point Estimates from the Posterior</h1>
            <p className="text-gray-600">Each optimal under a different loss function</p>
          </div>
    
          <div className="flex-1 grid grid-cols-3 gap-4 mb-4">
            {/* Posterior Mean */}
            <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">
              <h2 className="font-bold text-blue-900 mb-2">Posterior Mean</h2>
              <Latex math={meanFormula} display={true} />
              <div className="mt-3 space-y-2 text-sm text-blue-900">
                <p>Minimizes <strong>squared-error loss</strong>:</p>
                <Latex math={meanLoss} display={true} />
                <p className="text-xs italic">
                  The Bayesian analog of MSE-optimal estimation. Invariant under affine
                  transforms of <Latex math="\theta" />.
                </p>
              </div>
            </div>
    
            {/* MAP / Mode */}
            <div className="bg-green-50 border-2 border-green-200 rounded-xl p-4">
              <h3 className="font-bold text-green-900 mb-2">MAP (Mode)</h3>
              <Latex math={mapFormula} display={true} />
              <div className="mt-3 space-y-2 text-sm text-green-900">
                <p>Equivalently:</p>
                <Latex math={mapAlt} display={true} />
                <p className="text-xs italic">
                  Minimizes zero-one loss (small-ball limit). When the log-prior is viewed as a

                </p>
                <p className="text-xs text-green-900 bg-amber-100 border border-amber-300 rounded px-1.5 py-1 mt-1 leading-snug">
                  <strong>Caveat:</strong> not invariant under reparametrization{'\u2014'}the
                  mode in <Latex math="\theta" />-space and <Latex math="\log\theta" />-space

                </p>
              </div>
            </div>
    
            {/* Posterior Median */}
            <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4">
              <h3 className="font-bold text-purple-900 mb-2">Posterior Median</h3>
              <Latex math={medianFormula} display={true} />
              <div className="mt-3 space-y-2 text-sm text-purple-900">
                <p>Minimizes <strong>absolute-error loss</strong>:</p>
                <Latex math={medianLoss} display={true} />
                <p className="text-xs italic">
                  Optimal under <Latex math="L^1" /> loss; does not inflate with posterior skew.
                  Invariant under monotone transforms.
                </p>
              </div>
            </div>
          </div>
    
          {/* Figure + note */}
          <div className="flex-shrink-0 grid grid-cols-2 gap-3">
            <div className="bg-white rounded-lg border overflow-hidden" style={{ maxHeight: '340px' }}>
              <img
                src="https://pqyjaywwccbnqpwgeiuv.supabase.co/storage/v1/object/public/STAT%20418%20Images/assets/PartIII/Chapter5/ch5_1_fig07_posterior_summaries.png"
                alt="Three point estimates on a skewed posterior"
                className="w-full h-full object-contain"
              />
            </div>
            <div className="bg-gray-50 rounded-lg border border-gray-200 p-3 flex items-center">
              <p className="text-sm text-gray-800 leading-snug">
                For <strong>symmetric unimodal</strong> posteriors, all three coincide. For{' '}

function Slide17_MAPBridge() {
  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">MAP = Penalized MLE</h1>
            <p className="text-gray-600 text-sm">
              The bridge between frequentist regularization and Bayesian inference
            </p>
          </div>
    
          {/* Context: what ridge and LASSO are */}
          <div className="flex-shrink-0 bg-slate-50 border-2 border-slate-300 rounded-lg px-4 py-2 mb-3">
            <p className="text-sm text-slate-900 leading-snug">
              <strong>What ridge and LASSO are.</strong> Two regularized linear-regression
              methods. Ridge (Hoerl{'\u2013'}Kennard 1970) adds an{' '}
              <Latex math="\ell_2" /> penalty{' '}
              <Latex math="\lambda \|\boldsymbol{\beta}\|_2^2" />{' '}that shrinks all
              coefficients toward zero; it stabilizes estimation when predictors are correlated
              or <Latex math="p" /> is large. LASSO (Tibshirani 1996) adds an{' '}
              <Latex math="\ell_1" /> penalty{' '}
              <Latex math="\lambda \|\boldsymbol{\beta}\|_1" />{' '}that drives many
              coefficients exactly to zero, performing feature selection. Both introduced
              without Bayesian motivation; both turn out to be MAP estimators under specific
              priors.
            </p>
          </div>
    
          {/* Central derivation */}
          <div className="flex-shrink-0 bg-white border-2 border-slate-300 rounded-xl p-3 mb-3">
            <p className="text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">
              MAP for linear regression
            </p>
            <p className="text-xs text-slate-700 leading-snug mb-2">
              In general, MAP maximizes <Latex math="\log p(y \mid \theta) + \log \pi(\theta)" />{' '}
              (the normalizer drops from <Latex math="\arg\max" />). For linear regression this
              specializes cleanly{'\u2014'}we{'\u2019'}ll see OLS emerge as a special case.
            </p>
            <div className="grid grid-cols-2 gap-3 items-start">
              <div>
                <p className="text-xs font-semibold text-slate-900 mb-1">
                  Regression likelihood
                </p>
                <p className="text-xs text-slate-700 leading-snug mb-1">
                  Assume <Latex math="y_i = \mathbf{x}_i^\top \boldsymbol{\beta} + \varepsilon_i" />,{' '}
                  <Latex math="\varepsilon_i \overset{\text{iid}}{\sim} \mathcal{N}(0, \sigma^2)" />.
                  The negative log-likelihood is
                </p>
                <Latex
                  math="-\log p(\mathbf{y} \mid \boldsymbol{\beta}) = \tfrac{1}{2\sigma^2}\|\mathbf{y} - \mathbf{X}\boldsymbol{\beta}\|_2^2 + \text{const}"
                  display={true}
                />
                <p className="text-xs text-slate-700 leading-snug mt-1">
                  This is the OLS loss (up to scale). With no prior, the{' '}
                  <Latex math="\arg\min" /> is{' '}
                  <Latex math="\hat{\boldsymbol{\beta}}_{\text{OLS}} = (\mathbf{X}^\top \mathbf{X})^{-1}\mathbf{X}^\top \mathbf{y}" />.
                </p>
              </div>
              <div>
                <p className="text-xs font-semibold text-slate-900 mb-1">
                  Adding a prior
                </p>
                <p className="text-xs text-slate-700 leading-snug mb-1">
                  Place a prior <Latex math="\pi(\boldsymbol{\beta})" /> on the coefficients.
                  Flip sign, minimize:
                </p>
                <Latex
                  math="\hat{\boldsymbol{\beta}}_{\text{MAP}} = \arg\min_{\boldsymbol{\beta}} \Bigl[\underbrace{\tfrac{1}{2\sigma^2}\|\mathbf{y} - \mathbf{X}\boldsymbol{\beta}\|_2^2}_{\text{OLS loss}} + \underbrace{(-\log \pi(\boldsymbol{\beta}))}_{\text{penalty}}\Bigr]"
                  display={true}
                />
                <p className="text-xs text-slate-700 leading-snug mt-1">
                  Flat prior <Latex math="\Rightarrow" /> no penalty{' '}
                  <Latex math="\Rightarrow" /> OLS. Other priors give other penalties{'\u2014'}the
                  three cases below.
                </p>
              </div>
            </div>
          </div>
    
          {/* Three cases */}
          <div className="flex-1 grid grid-cols-3 gap-3 min-h-0">
            <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-3 flex flex-col">
              <h2 className="font-bold text-blue-900 mb-1 text-sm">Flat prior {'\u2192'} OLS</h2>
              <Latex math="\pi(\boldsymbol{\beta}) \propto 1" display={true} />
              <p className="text-xs text-blue-900 mt-1">
                <Latex math="\log \pi(\boldsymbol{\beta}) = \text{const}" />, so the penalty
                vanishes:
              </p>
              <div className="bg-white rounded-lg p-1.5 text-center my-1">
                <p className="text-sm font-bold text-blue-900">
                  <Latex math="\hat{\boldsymbol{\beta}}_{\text{MAP}} = \hat{\boldsymbol{\beta}}_{\text{OLS}}" />
                </p>
              </div>
              <p className="text-xs text-blue-900 leading-snug">
                No regularization. Vulnerable to overfitting and unstable with correlated
                predictors or <Latex math="p > n" />.
              </p>
            </div>
    
            <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3 flex flex-col">
              <h3 className="font-bold text-green-900 mb-1 text-sm">Normal prior {'\u2192'} Ridge</h3>
              <Latex math="\beta_j \overset{\text{iid}}{\sim} \mathcal{N}(0, \tau^2)" display={true} />
              <p className="text-xs text-green-900 mt-1">
                <Latex math="-\log \pi(\boldsymbol{\beta}) \propto \|\boldsymbol{\beta}\|_2^2 / (2\tau^2)" />
              </p>
              <div className="bg-white rounded-lg p-1.5 text-center my-1">
                <p className="text-sm font-bold text-green-900">
                  MAP = Ridge, <Latex math="\lambda = 1/(2\tau^2)" />
                </p>
              </div>
              <p className="text-xs text-green-900 leading-snug">
                Tight prior (small <Latex math="\tau^2" />) <Latex math="\Rightarrow" /> strong
                shrinkage toward zero.
              </p>
            </div>
    
            <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-3 flex flex-col">
              <h3 className="font-bold text-purple-900 mb-1 text-sm">Laplace prior {'\u2192'} LASSO</h3>
              <Latex math="\beta_j \overset{\text{iid}}{\sim} \text{Laplace}(0, b)" display={true} />
              <p className="text-xs text-purple-900 mt-1">
                <Latex math="-\log \pi(\boldsymbol{\beta}) \propto \|\boldsymbol{\beta}\|_1 / b" />
              </p>
              <div className="bg-white rounded-lg p-1.5 text-center my-1">
                <p className="text-sm font-bold text-purple-900">
                  MAP = LASSO, <Latex math="\lambda = 1/b" />
                </p>
              </div>
              <p className="text-xs text-purple-900 leading-snug">
                Laplace{'\u2019'}s kink at zero induces sparsity{'\u2014'}many{' '}
                <Latex math="\hat{\beta}_j" /> are exactly 0.
              </p>
            </div>
          </div>
    
          <div className="flex-shrink-0 mt-3 bg-emerald-50 border-2 border-emerald-300 rounded-lg p-2.5 text-center">
            <p className="text-sm text-emerald-900 leading-snug">
              <strong>Regularizers in ML are Bayesian priors in disguise.</strong> But MAP is
              a bridge, not the destination{'\u2014'}a point estimate throws away the
              posterior. The full posterior ({'\u00A7'}5.3) quantifies uncertainty in{' '}
              <Latex math="\boldsymbol{\beta}" />, and hierarchical models (optional {'\u00A7'}5.8) put
              priors on the hyperparameters themselves and estimate them jointly with{' '}
              <Latex math="\boldsymbol{\beta}" />.
            </p>
          </div>
        </div>
  );
}

function Slide18_PosteriorPredictive() {
  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-3xl font-bold text-gray-800">Posterior Predictive Distribution</h1>
            <p className="text-gray-600 text-sm">
              Every future-data prediction should carry both uncertainty sources
            </p>
          </div>
    
          {/* Motivation strip with definitions */}
          <div className="flex-shrink-0 bg-slate-50 border-2 border-slate-300 rounded-lg px-4 py-2 mb-3">
            <p className="text-sm text-slate-900 leading-snug mb-2">
              <strong>The problem.</strong> Predicting a future observation{' '}
              <Latex math="\tilde y" /> requires carrying two distinct uncertainty sources.
              Both frameworks account for both{'\u2014'}the question is how. The posterior
              predictive combines them through a single integral; a frequentist prediction
              interval comes from the distribution of the <em>prediction error</em>{' '}
              <Latex math="\tilde y - \hat y" /> under repeated sampling, worked out
              method-by-method (OLS gets a closed-form pivot; most GLMs use the delta method).
            </p>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-amber-50 border border-amber-200 rounded px-2 py-1.5">
                <p className="text-xs text-amber-900 leading-snug">
                  <strong>Aleatoric uncertainty:</strong> the inherent noise or randomness
                  in a phenomenon. Irreducible even if <Latex math="\theta" /> is known
                  exactly.
                </p>
              </div>
              <div className="bg-cyan-50 border border-cyan-200 rounded px-2 py-1.5">
                <p className="text-xs text-cyan-900 leading-snug">
                  <strong>Epistemic uncertainty:</strong> incomplete knowledge about the true
                  state of the world. Shrinks as more data are collected.
                </p>
              </div>
            </div>
          </div>
    
          {/* Main two-column */}
          <div className="flex-1 grid grid-cols-2 gap-3 min-h-0">
            {/* Left: theory */}
            <div className="flex flex-col gap-3">
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-3">
                <h2 className="font-bold text-blue-900 text-sm mb-1">Definition</h2>
                <Latex
                  math="\begin{aligned} p(\tilde y \mid y) &= \int p(\tilde y, \theta \mid y)\, d\theta \\ &= \int p(\tilde y \mid \theta, y)\, p(\theta \mid y)\, d\theta \\ &= \int p(\tilde y \mid \theta)\, p(\theta \mid y)\, d\theta \end{aligned}"
                  display={true}
                />
                <p className="text-xs text-blue-900 mt-1 leading-snug">
                  Marginalize <Latex math="\theta" /> from the joint; factor via the product
                  rule; drop <Latex math="y" /> from the first factor by conditional
                  independence{' '}
                  <Latex math="\tilde y \perp y \mid \theta" /> (given <Latex math="\theta" />,
                  past data carry no further information about future data).
                </p>
              </div>
    
              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3">
                <h3 className="font-bold text-green-900 text-sm mb-1">
                  Law of total variance
                </h3>
                <Latex
                  math="\mathrm{Var}(\tilde y \mid y) = \underbrace{\mathbb{E}[\mathrm{Var}(\tilde y \mid \theta) \mid y]}_{\text{aleatoric}} + \underbrace{\mathrm{Var}[\mathbb{E}(\tilde y \mid \theta) \mid y]}_{\text{epistemic}}"
                  display={true}
                />
                <p className="text-xs text-green-900 mt-1 leading-snug">
                  Apply the conditional variance decomposition with{' '}
                  <Latex math="\theta" /> as the conditioning variable and{' '}
                  <Latex math="y" /> fixed throughout: the outer{' '}
                  <Latex math="\mathbb{E}[\cdot \mid y]" /> and{' '}
                  <Latex math="\mathrm{Var}[\cdot \mid y]" /> are taken under the posterior{' '}
                  <Latex math="\theta \mid y" />. A naive plug-in{' '}
                  <Latex math="p(\tilde y \mid \hat\theta)" /> (treat <Latex math="\hat\theta" />{' '}
                  as truth) zeroes out the second term{'\u2014'}a common mistake, not standard
                  frequentist practice.
                </p>
              </div>
            </div>
    
            {/* Right: concrete demonstration */}
            <div className="flex flex-col gap-3">
              <div className="bg-red-50 border-2 border-red-200 rounded-xl p-3">
                <h3 className="font-bold text-red-900 text-sm mb-1">
                  Frequentist prediction intervals
                </h3>
                <p className="text-xs text-red-900 leading-snug mb-1">
                  Predicting a new <Latex math="\tilde y_0" /> requires the distribution of
                  the prediction error <Latex math="\tilde y_0 - \hat y_0" />, not of{' '}
                  <Latex math="\hat y_0" /> alone (which would give a <em>confidence</em>
                  {' '}interval for the mean response). Under OLS normality:
                </p>
                <Latex
                  math="\hat y_0 \pm t_{n-p,\alpha/2}\, \hat\sigma \sqrt{1 + \mathbf{x}_0^\top (\mathbf{X}^\top\mathbf{X})^{-1} \mathbf{x}_0}"
                  display={true}
                />
                <p className="text-xs text-red-900 mt-1 leading-snug">
                  The <Latex math="1" /> is the irreducible noise in{' '}
                  <Latex math="\tilde\varepsilon_0" /> (aleatoric); the leverage term is the
                  sampling variance of <Latex math="\hat y_0" /> (epistemic). Correct, but
                  formula-specific{'\u2014'}Poisson, Weibull, logistic each need their own
                  derivation, often via the delta method.
                </p>
              </div>
    
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 flex flex-col">
                <h3 className="font-bold text-emerald-900 text-sm mb-1">
                  Vaccine trial: predicting <Latex math="\tilde y" /> = responders in next 50 volunteers
                </h3>
                <p className="text-xs text-emerald-900 mb-1 leading-snug">
                  <Latex math="k=38" />, <Latex math="n=50" />, Beta(2,2) prior{' '}
                  {'\u2192'} Beta(40, 14) posterior. The posterior predictive is{' '}
                  Beta-Binomial(50, 40, 14).
                </p>
                <div className="bg-white rounded p-1.5 text-xs font-mono border border-emerald-200">
                  <div className="grid grid-cols-8 gap-1 font-semibold border-b border-emerald-300 pb-0.5 mb-0.5">
                    <div className="col-span-3"></div>
                    <div className="col-span-1 text-right">Mean</div>
                    <div className="col-span-1 text-right">SD</div>
                    <div className="col-span-3 text-right">95% pred. int.</div>
                  </div>
                  <div className="grid grid-cols-8 gap-1">
                    <div className="col-span-3">Full predictive</div>
                    <div className="col-span-1 text-right">37.0</div>
                    <div className="col-span-1 text-right">4.3</div>
                    <div className="col-span-3 text-right">[28, 45]</div>
                  </div>
                  <div className="grid grid-cols-8 gap-1">
                    <div className="col-span-3">Naive plug-in</div>
                    <div className="col-span-1 text-right">38.0</div>
                    <div className="col-span-1 text-right">3.0</div>
                    <div className="col-span-3 text-right">[32, 44]</div>
                  </div>
                </div>
                <p className="text-xs text-emerald-900 mt-1 leading-snug">
                  <em>95% predictive interval</em> = 2.5/97.5 percentiles of{' '}
                  <Latex math="p(\tilde y \mid y)" />. Variance decomposition: 9.4
                  (aleatoric) + 8.7 (epistemic) = 18.2. The naive plug-in (treat{' '}
                  <Latex math="\hat\theta = 0.76" /> as truth) truncates 4 responders from
                  the lower tail{'\u2014'}a proper frequentist PI that accounts for the
                  sampling variability of <Latex math="\hat\theta" /> would land on
                  essentially the same interval.
                </p>
              </div>
            </div>
          </div>
    
          {/* Bottom: Monte Carlo recipe */}
          <div className="flex-shrink-0 mt-3 bg-purple-50 border-2 border-purple-300 rounded-lg p-3">
            <p className="text-xs font-bold text-purple-900 uppercase tracking-wider mb-1">
              Monte Carlo recipe {'\u2014'} works for any posterior sampler
            </p>
            <div className="grid grid-cols-5 gap-3 items-center">
              <div className="col-span-3">
                <Latex
                  math="s = 1, \ldots, S: \quad \theta^{(s)} \sim p(\theta \mid y), \quad \tilde y^{(s)} \sim p(\tilde y \mid \theta^{(s)})"
                  display={true}
                />
              </div>
              <div className="col-span-2">
                <p className="text-xs text-purple-900 leading-snug">
                  Conjugate ({'\u00A7'}5.2), grid (this section), or MCMC ({'\u00A7'}5.5){'\u2014'}the
                  histogram of <Latex math="\{\tilde y^{(s)}\}" /> <em>is</em> the posterior
                  predictive sample. Forward simulation, one extra draw per posterior sample.
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

                that discarding it loses information about the procedure. Both positions have
                serious adherents; the divergence is real, the verdict is philosophical.
              </p>
            </div>
          </div>
        </div>
  );
}

              <h3 className="font-bold text-amber-900 text-sm mb-1">
                {'\u26A0\uFE0F '}Pitfall: {'"'}flat{'"'} encodes opposite beliefs depending on the scale
              </h3>
    
              <p className="text-xs text-amber-900 leading-snug mb-1.5">
                <strong>Scenario.</strong> We want a {'"'}noninformative{'"'} prior for a
                probability <Latex math="\theta \in (0,1)" />. In logistic regression, the
                model parameterizes the <strong>log-odds</strong>{' '}
                <Latex math="\phi = \log[\theta/(1-\theta)]" /> on{' '}
                <Latex math="(-\infty, \infty)" />. Being {'"'}flat{'"'} on one scale
                implies a non-flat prior on the other, via the Jacobian{' '}
                <Latex math="d\theta/d\phi = e^\phi/(1+e^\phi)^2" />:
              </p>
    
              <div className="grid grid-cols-2 gap-2 mb-1.5">
                <div className="bg-white rounded p-1.5 border border-amber-200">
                  <p className="text-xs font-bold text-blue-800 mb-0.5">
                    Flat on <Latex math="\theta" />
                  </p>
                  <Latex math="\pi(\theta) = 1" display={true} />
                  <Latex math="\Rightarrow\; \pi(\phi) = \frac{e^\phi}{(1+e^\phi)^2}" display={true} />
                  <p className="text-xs text-blue-800 leading-snug">
                    Logistic density on log-odds: peaked at{' '}
                    <Latex math="\phi = 0" />, favors <em>moderate</em>{' '}
                    <Latex math="\theta" />.
                  </p>
                </div>
                <div className="bg-white rounded p-1.5 border border-amber-200">
                  <p className="text-xs font-bold text-orange-800 mb-0.5">
                    Flat on <Latex math="\phi" />
                  </p>
                  <Latex math="\pi(\phi) = 1" display={true} />
                  <Latex math="\Rightarrow\; \pi(\theta) \propto \frac{1}{\theta(1-\theta)}" display={true} />
                  <p className="text-xs text-orange-800 leading-snug">
                    Haldane prior: blows up at boundaries, favors <em>extreme</em>{' '}
                    <Latex math="\theta" />. Improper; posterior undefined if all
                    observations are the same class.
                  </p>
                </div>
              </div>
    
              <p className="text-xs text-amber-900 leading-snug font-semibold">
                Two {'"'}uninformative{'"'} priors, opposite beliefs. Neither is
                neutral{'\u2014'}{'"'}uniform{'"'} is always relative to a
                parameterization, never absolute.
              </p>
            </div>
          </div>
        </div>
  );
}

function Slide24_BetaBinomialDerivation() {
  const likelihood = "p(k \\mid \\theta) \\propto \\theta^k (1-\\theta)^{n-k}";
    const prior = "\\pi(\\theta) \\propto \\theta^{\\alpha_0 - 1}(1-\\theta)^{\\beta_0 - 1}";
    const product = "p(\\theta \\mid k) \\propto \\theta^k(1-\\theta)^{n-k} \\cdot \\theta^{\\alpha_0-1}(1-\\theta)^{\\beta_0-1}";
    const collected = "= \\theta^{(\\alpha_0 + k) - 1}(1-\\theta)^{(\\beta_0 + n - k) - 1}";
    const posterior = "\\theta \\mid k \\;\\sim\\; \\text{Beta}(\\alpha_0 + k,\\; \\beta_0 + n - k)";
    const postMean = "\\mathbb{E}[\\theta \\mid k] = \\frac{\\alpha_0 + k}{\\alpha_0 + \\beta_0 + n}";
    const postVar = "\\mathrm{Var}(\\theta \\mid k) = \\frac{\\mathbb{E}[\\theta \\mid k]\\bigl(1 - \\mathbb{E}[\\theta \\mid k]\\bigr)}{\\alpha_0 + \\beta_0 + n + 1}";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">

              <Latex math="k = 34" /> made. The parameter is <Latex math="\theta" />, his true
              free-throw probability. Free throws give genuinely exchangeable iid trials (fixed
              distance, no defender, identical routine){'\u2014'}the constant-<Latex math="\theta" />{' '}
              the Beta-Binomial assumes. At this small <Latex math="n = 36" />, a prior whose
              strength <Latex math="n_0" /> is comparable to <Latex math="n" /> can still move the
              posterior{'\u2014'}which sets up the prior-sensitivity study two slides on.
            </p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-4 min-h-0">
            {/* Left: Derivation */}
            <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-3 flex flex-col gap-2">

              <div className="bg-white rounded-lg p-2">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">

              </div>
    
              <div className="bg-white rounded-lg p-2">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Beta(<Latex math="\alpha_0" />, <Latex math="\beta_0" />) prior
                </p>
                <Latex math={prior} display={true} />
              </div>
    
              <div className="bg-white rounded-lg p-2">
                <p className="text-xs font-semibold text-slate-500 uppercase mb-0.5">
                  Multiply kernels (posterior <Latex math="\propto" /> likelihood <Latex math="\times" /> prior)
                </p>
                <Latex math={product} display={true} />

              <div className="bg-white rounded-lg p-2">

              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-2">

            {/* Right: Interpretation and summaries */}
            <div className="flex flex-col gap-3">
              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-3">

                  <Latex math="w(n) = n_0/(n_0 + n)" />.

                  Scales as <Latex math="1/(n_0 + n + 1)" />, so each real and prior

                </p>

              <div className="grid grid-cols-5 gap-2">
                <div className="col-span-3 bg-amber-50 border border-amber-300 rounded-lg p-2.5">
                  <p className="text-xs text-amber-900 leading-snug">
                    <strong>Update rule.</strong> Add observed counts to the hyperparameters:{' '}
