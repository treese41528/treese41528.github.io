                <p className="text-sm text-green-700 mb-2">
                  {"If we had draws "}<Latex math={"\\theta^{(1)}, \\ldots, \\theta^{(S)} \\sim p(\\theta \\mid y)"} />
                  {", Chapter 2 tells us:"}
                </p>
                <div className="bg-white rounded-lg p-2">
                  <Latex math={mcEstimator} display={true} />
                </div>
                <div className="mt-2 space-y-1.5 text-sm text-green-700">
                  <p>{"Posterior mean \u2192 sample average"}</p>
                  <p>{"Credible intervals \u2192 sample quantiles (\u00A75.3)"}</p>
                  <p>{"ROPE \u2192 sample proportions (\u00A75.3)"}</p>
                  <p>{"Posterior predictive checks \u2192 simulate from "}<Latex math={"p(\\tilde{y} \\mid \\theta^{(s)})"} /></p>

}

function Slide50_MarkovChains() {

function Slide51_StructuralProperties() {
  const periodicP = "\\mathbf{P} = \\begin{array}{c|cc} & \\text{A} & \\text{B} \\\\ \\hline \\text{A} & 0 & 1 \\\\ \\text{B} & 1 & 0 \\end{array}";

                <p className="font-semibold text-blue-800 text-sm mb-1">Purpose:</p>
                <p className="text-sm text-blue-700">
                  {"The chain must be able to reach every region where the posterior has mass. A chain that gets trapped in one mode of a multimodal posterior will "}

                </p>
              </div>
              <div className="bg-white rounded-lg p-3">
                <p className="font-semibold text-blue-800 text-sm mb-1">Definition:</p>

              <div className="bg-red-50 rounded-lg p-2.5 border border-red-200">
                <p className="text-xs text-red-700">
                  <strong>Failure:</strong>

                <p className="font-semibold text-green-800 text-sm mb-1">Purpose:</p>
                <p className="text-sm text-green-700">

                </p>
              </div>
              <div className="bg-white rounded-lg p-3">
                <p className="font-semibold text-green-800 text-sm mb-1">Concrete failure:</p>

}

//                SLIDE 52: TRANSITION KERNELS AND BALANCE
// ═══════════════════════════════════════════════════════════════════════

function Slide52_TransitionKernelsAndBalance() {
  const kernelDef = "K(x, A) = P(X_{t+1} \\in A \\mid X_t = x)";
    const kernelDensity = "K(x, A) = \\int_A k(x, y)\\,dy";
    const globalBalance = "\\int_{\\Omega} \\pi(x)\\,k(x, y)\\,dx = \\pi(y) \\quad \\text{for all } y";
    const detailedBalance = "\\pi(x)\\,k(x, y) = \\pi(y)\\,k(y, x) \\quad \\text{for all } x, y";

  return (
    <div className="flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">Transition Kernels and Balance</h1>
            <p className="text-gray-600">The design recipe for targeting the posterior</p>
          </div>
    
          {/* Row 1: Transition Kernel — what and why */}
          <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4 mb-4">
            <h2 className="font-bold text-blue-800 mb-2">Step 1: From Matrices to Kernels</h2>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <p className="text-sm text-blue-700 mb-2">
                  <strong>Why we need this:</strong>
                  {" The weather chain (Slide 50) used a transition matrix "}<Latex math={"\\mathbf{P}"} />
                  {" where entry "}<Latex math={"P_{ij}"} />
                  {" gave the probability of jumping from discrete state i to discrete state j. But our parameters "}<Latex math={"\\theta"} />
                  {" are continuous \u2014 there are uncountably many possible values, so a matrix cannot list them all. We need the continuous analogue: a "}
                  <strong>transition kernel</strong>{"."}
                </p>
                <div className="bg-white rounded-lg p-2">
                  <Latex math={kernelDef} display={true} />
                </div>
                <p className="text-xs text-blue-600 mt-2">
                  <Latex math={"K(x, A)"} />
                  {" answers: \"if the chain is currently at point x, what is the probability it lands in region A on the next step?\""}
                </p>
              </div>
              <div>
                <p className="text-sm text-blue-700 mb-2">
                  <strong>When the kernel has a density:</strong>
                  {" In most MCMC algorithms, the kernel has a density function "}<Latex math={"k(x, y)"} />
                  {" such that:"}
                </p>
                <div className="bg-white rounded-lg p-2">
                  <Latex math={kernelDensity} display={true} />
                </div>
                <p className="text-sm text-blue-700 mt-2">
                  {"Think of "}<Latex math={"k(x, y)"} />
                  {" as the continuous version of "}<Latex math={"P_{ij}"} />
                  {": the density of transitioning from point x to point y. Every MCMC algorithm specifies a particular kernel \u2014 the algorithm IS the kernel. Different algorithms (Metropolis-Hastings, Gibbs, Hamiltonian Monte Carlo) are different choices of k."}
                </p>
              </div>
            </div>
          </div>
    
          {/* Row 2: Balance equations — global then detailed */}
          <div className="grid grid-cols-2 gap-5 mb-4">
            <div className="bg-green-50 border-2 border-green-200 rounded-xl p-4">
              <h3 className="font-bold text-green-800 mb-2">Step 2: Global Balance (Stationarity)</h3>
              <p className="text-sm text-green-700 mb-2">
                <strong>Purpose:</strong>
                {" We want the posterior "}<Latex math={"\\pi(\\theta) = p(\\theta \\mid y)"} />
                {" to be the stationary distribution of our chain. For discrete chains, stationarity meant "}
                <Latex math={"\\boldsymbol{\\pi}\\mathbf{P} = \\boldsymbol{\\pi}"} />
                {". The continuous analogue is the global balance equation:"}
              </p>
              <div className="bg-white rounded-lg p-2">
                <Latex math={globalBalance} display={true} />
              </div>
              <p className="text-sm text-green-700 mt-2">
                {"This says: if the chain is currently distributed as "}<Latex math={"\\pi"} />
                {", then after one step of the kernel, it is still distributed as "}<Latex math={"\\pi"} />
                {". The posterior is preserved \u2014 once the chain reaches equilibrium, it stays there."}
              </p>
              <div className="bg-amber-50 rounded-lg p-2 mt-2 border border-amber-200">
                <p className="text-xs text-amber-700">
                  <strong>Problem:</strong>
                  {" verifying global balance requires evaluating an integral over the entire parameter space. For complex posteriors, this integral is just as intractable as the normalizing constant we are trying to avoid. We need a condition that is easier to check."}
                </p>
              </div>
            </div>
    
            <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-4">
              <h3 className="font-bold text-emerald-800 mb-2">Step 3: Detailed Balance (Reversibility)</h3>
              <p className="text-sm text-emerald-700 mb-2">
                <strong>Purpose:</strong>
                {" A stronger condition that is paradoxically "}
                <strong>easier to verify</strong>
                {" because it is a pointwise equality \u2014 no integration needed:"}
              </p>
              <div className="bg-white rounded-lg p-2">
                <Latex math={detailedBalance} display={true} />
              </div>
              <p className="text-sm text-emerald-700 mt-2">
                {"The product "}<Latex math={"\\pi(x) \\cdot k(x, y)"} />
                {" is the "}
                <strong>probability flux</strong>
                {" from x to y: the rate at which probability mass flows from x to y at equilibrium. Detailed balance says the flux from x to y equals the flux from y to x \u2014 the chain is microscopically reversible."}
              </p>
              <p className="text-sm text-emerald-700 mt-2">
                {"Detailed balance implies global balance (integrate both sides over x in the continuous case, or sum in the discrete case). It is sufficient but not necessary \u2014 and because it is a pointwise condition, we can use it as a "}
                <strong>design criterion</strong>
                {": construct k so that this equation holds for every pair (x, y)."}
              </p>
            </div>
          </div>
    
          {/* Row 3: The Punchline */}
          <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-4">
            <h3 className="font-bold text-purple-800 mb-2">The Punchline: Why MCMC Does Not Need the Normalizing Constant</h3>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <p className="text-sm text-purple-700 mb-2">
                  {"Set "}<Latex math={"\\pi(\\theta) = p(\\theta \\mid y)"} />
                  {" and write detailed balance:"}
                </p>
                <div className="bg-white rounded-lg p-2">
                  <Latex math={"p(\\theta \\mid y)\\,k(\\theta, \\theta') = p(\\theta' \\mid y)\\,k(\\theta', \\theta)"} display={true} />
                </div>
                <p className="text-sm text-purple-700 mt-2">
                  {"Expand each side using "}<Latex math={"p(\\theta \\mid y) = p(y \\mid \\theta)\\,p(\\theta)\\,/\\,p(y)"} />
                  {". The constant "}<Latex math={"p(y)"} />{" appears identically on both sides and "}
                  <strong>cancels</strong>{":"}
                </p>
                <div className="bg-white rounded-lg p-2 text-center mt-2">
                  <p className="text-sm text-purple-800">
                    <Latex math={"p(y \\mid \\theta)\\,p(\\theta)"} />{" "}<Latex math={"\\cdot"} />{" "}<Latex math={"k(\\theta, \\theta')"} />
                  </p>
                  <p className="text-sm text-purple-800">{"="}</p>
                  <p className="text-sm text-purple-800">
                    <Latex math={"p(y \\mid \\theta')\\,p(\\theta')"} />{" "}<Latex math={"\\cdot"} />{" "}<Latex math={"k(\\theta', \\theta)"} />
                  </p>
                </div>
              </div>
              <div className="flex flex-col gap-3">
                <div className="bg-purple-100 rounded-lg p-3 border border-purple-300">
                  <p className="text-sm text-purple-900 font-semibold">
                    {"This cancellation is THE mathematical reason MCMC works without computing "}<Latex math={"p(y)"} />
                    {". To verify that our kernel targets the posterior, we only need the unnormalized posterior \u2014 the likelihood times the prior \u2014 which we can always evaluate pointwise."}
                  </p>
                </div>
                <div className="bg-blue-50 rounded-lg p-3 border border-blue-200">
                  <p className="text-xs text-blue-800">
                    <strong>{"Looking ahead to \u00A75.5:"}</strong>
                    {" We now have the design criterion: build a kernel k satisfying detailed balance using only the unnormalized posterior. The Metropolis-Hastings algorithm does this by decomposing k into a proposal step (\"suggest a candidate\") and an acceptance step (\"decide whether to move\"), then solving for the acceptance probability that makes detailed balance hold. The ergodic theorem (\u00A75.4) then guarantees the chain converges."}
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
  );
}

//                        SLIDE 53: ERGODIC THEOREM
// ═══════════════════════════════════════════════════════════════════════

function Slide53_ErgodicTheorem() {
  const slln = "\\frac{1}{S}\\sum_{s=1}^{S} g(\\theta^{(s)}) \\;\\xrightarrow{\\text{a.s.}}\\; \\mathbb{E}_{\\pi}[g(\\theta)] \\quad \\text{as } S \\to \\infty";
    const tauSq = "\\text{Var}\\!\\left(\\frac{1}{S}\\sum g(\\theta^{(s)})\\right) \\approx \\frac{\\sigma^2}{S}\\left(1 + 2\\sum_{k=1}^{\\infty} \\rho_k\\right)";
    const essFormula = "\\text{ESS} = \\frac{S}{1 + 2\\sum_{k=1}^{\\infty} \\rho_k} \\;\\leq\\; S";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">The Ergodic Theorem</h1>
            <p className="text-gray-600">THE theoretical guarantee that makes MCMC valid inference</p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-5">
            {/* Left: Statement and Power */}
            <div className="flex flex-col gap-3">
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">
                <h2 className="font-bold text-blue-800 mb-2">The Statement</h2>
                <p className="text-sm text-blue-700 mb-2">
                  {"For an ergodic chain with stationary distribution "}<Latex math={"\\pi"} />
                  {", for any integrable function g:"}
                </p>
                <div className="bg-white rounded-lg p-2.5">
                  <Latex math={slln} display={true} />
                </div>
                <p className="text-sm text-blue-700 mt-2">
                  {"Time averages along a single chain converge to expectations under "}<Latex math={"\\pi"} />
                  {" almost surely, regardless of the starting point "}<Latex math={"\\theta^{(0)}"} />
                  {". This is the Markov chain analogue of the strong law of large numbers from Chapter 2."}
                </p>
              </div>
    
              <div className="bg-emerald-50 border-2 border-emerald-400 rounded-xl p-4">
                <h3 className="font-bold text-emerald-800 mb-2">Why This Is Powerful</h3>
                <p className="text-sm text-emerald-700 mb-2">
                  {"Every posterior summary is an expectation \u2014 an integral over "}<Latex math={"p(\\theta \\mid y)"} />
                  {" that we cannot compute analytically. The ergodic theorem says we can replace each intractable integral with a sample average that converges to the correct answer:"}
                </p>
                <div className="bg-white rounded-lg p-2 mb-2">
                  <Latex math={"\\underbrace{\\int g(\\theta)\\,p(\\theta \\mid y)\\,d\\theta}_{\\text{intractable integral}} \\;\\approx\\; \\underbrace{\\frac{1}{S}\\sum_{s=1}^{S} g(\\theta^{(s)})}_{\\text{sample average from chain}}"} display={true} />
                </div>
                <div className="space-y-1.5 text-sm text-emerald-700">
                  <p>{"Posterior mean: set "}<Latex math={"g(\\theta) = \\theta"} />{" \u2014 the integral becomes the mean, the sample average is just the chain\u2019s arithmetic mean"}</p>
                  <p>{"Posterior variance: set "}<Latex math={"g(\\theta) = (\\theta - \\mathbb{E}[\\theta])^2"} />{" \u2014 compute the sample variance of the draws"}</p>
                  <p>{"Posterior probability: set "}<Latex math={"g(\\theta) = \\mathbf{1}(\\theta \\in A)"} />{" \u2014 the proportion of draws falling in region A converges to "}<Latex math={"P(\\theta \\in A \\mid y)"} /></p>
                  <p>{"Credible intervals, ROPE, directional probabilities \u2014 all are expectations of indicator functions"}</p>
                </div>
                <p className="text-sm text-emerald-800 font-semibold mt-2">
                  {"Every column of az.summary(), every credible interval, every posterior predictive check is valid because of this theorem. Without it, the draws are just correlated numbers with no inferential meaning."}
                </p>
              </div>
            </div>
    
            {/* Right: Cost of Correlation */}
            <div className="flex flex-col gap-3">
              <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4">
                <h3 className="font-bold text-purple-800 mb-2">The Correlation Cost</h3>
                <p className="text-sm text-purple-700 mb-2">
                  {"Chapter 2 Monte Carlo used independent samples: variance = "}<Latex math={"\\sigma^2/S"} />
                  {". MCMC samples are correlated \u2014 each proposal depends on the current state \u2014 so the variance is inflated."}
                </p>
                <p className="text-sm text-purple-700 mb-2">
                  {"To quantify this, define the "}
                  <strong>lag-k autocorrelation</strong>
                  {" of the chain:"}
                </p>
                <div className="bg-white rounded-lg p-2">
                  <Latex math={"\\rho_k = \\text{Corr}\\!\\left(g(\\theta^{(s)}),\\; g(\\theta^{(s+k)})\\right)"} display={true} />
                </div>
                <p className="text-sm text-purple-700 mt-2">
                  {"This measures how similar sample s is to sample s+k. You do not know "}<Latex math={"\\rho_k"} />
                  {" in advance \u2014 it is estimated from the chain output after sampling, the same way you would compute a sample autocorrelation from any time series. At lag 0, "}<Latex math={"\\rho_0 = 1"} />
                  {" (a sample is perfectly correlated with itself). For a well-mixing chain, "}<Latex math={"\\hat{\\rho}_k"} />
                  {" decays toward zero quickly \u2014 distant samples become approximately independent. For a slowly mixing chain, "}<Latex math={"\\hat{\\rho}_k"} />
                  {" stays positive for many lags, meaning consecutive samples carry redundant information. The variance of the MCMC estimator depends on the sum of all these autocorrelations:"}
                </p>
                <div className="bg-white rounded-lg p-2 mt-2">
                  <Latex math={tauSq} display={true} />
                </div>
                <p className="text-xs text-purple-600 mt-1">
                  {"The factor "}<Latex math={"1 + 2\\sum \\rho_k \\geq 1"} />
                  {" is always at least 1. When autocorrelation is high, the variance can be many times larger than the independent-sample variance "}<Latex math={"\\sigma^2/S"} />{"."}
                </p>
              </div>
    
              <div className="bg-amber-50 border-2 border-amber-200 rounded-xl p-4">
                <h3 className="font-bold text-amber-800 mb-2">Effective Sample Size</h3>
                <div className="bg-white rounded-lg p-2">
                  <Latex math={essFormula} display={true} />
                </div>
                <p className="text-sm text-amber-700 mt-2">
                  {"Effective sample size = number of independent samples carrying the same information as S correlated samples. High autocorrelation "}<Latex math={"\\Rightarrow"} />
                  {" low effective sample size "}<Latex math={"\\Rightarrow"} />{" poor mixing. This is the key diagnostic."}
                </p>
              </div>
    
              <div className="bg-slate-50 border-2 border-slate-200 rounded-lg p-3 flex-1">
                <h3 className="font-bold text-slate-800 mb-2 text-sm">Ch2 vs. MCMC</h3>
                <div className="space-y-1.5">
                  <div className="bg-white rounded p-2 flex items-start gap-2">
                    <span className="text-sm font-bold text-blue-600 flex-shrink-0">Ch2:</span>
                    <p className="text-xs text-slate-700">{"Independent samples. Variance = "}<Latex math={"\\sigma^2/S"} />{". All S samples are useful."}</p>
                  </div>
                  <div className="bg-white rounded p-2 flex items-start gap-2">
                    <span className="text-sm font-bold text-green-600 flex-shrink-0">MCMC:</span>
                    <p className="text-xs text-slate-700">{"Correlated samples. Variance = "}<Latex math={"\\sigma^2/\\text{ESS}"} />{". Only the effective sample size of S samples are useful."}</p>
                  </div>
                  <div className="bg-white rounded p-2 flex items-start gap-2">
                    <span className="text-sm font-bold text-purple-600 flex-shrink-0">{"\u00A75.5:"}</span>
                    <p className="text-xs text-slate-700">{"Hamiltonian Monte Carlo / No-U-Turn Sampler minimise autocorrelation so effective sample size "}<Latex math={"\\approx S"} />{". This is why PyMC uses the No-U-Turn Sampler."}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//                     SLIDE 54: WARM UP AND ESTIMATOR
// ═══════════════════════════════════════════════════════════════════════

function Slide54_WarmUpAndEstimator() {
  const estimator = "\\hat{\\mu}_S = \\frac{1}{S - B}\\sum_{s=B+1}^{S} g(\\theta^{(s)})";
    const se = "\\text{MCSE} = \\frac{\\hat{\\sigma}}{\\sqrt{\\text{ESS}}}";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">Warm-Up and the MCMC Estimator</h1>
            <p className="text-gray-600">Discarding transient samples, computing posterior summaries</p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-6">
            {/* Left: Warm-up */}
            <div className="flex flex-col gap-3">
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-4">
                <h2 className="font-bold text-amber-800 mb-2">Warm-Up (Burn-In)</h2>
                <div className="space-y-2 text-sm text-amber-800">
                  <p>{"The ergodic theorem is asymptotic. Early samples are influenced by the (arbitrary) starting point and do NOT represent the posterior."}</p>
                  <p><strong>Solution:</strong>{" Discard the first B samples."}</p>
                  <div className="bg-white rounded-lg p-2">
                    <p className="text-xs"><strong>PyMC default:</strong>{" tune=1000 (discarded automatically)"}</p>
                    <p className="text-xs"><strong>Stan default:</strong>{" warmup = draws/2"}</p>
                  </div>
                  <p className="text-xs italic">{"\"Warm-up\" (PyMC/Stan) is preferred over \"burn-in\" (older literature) because NUTS also adapts step size during this phase."}</p>
                </div>
              </div>
    
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4 flex-1">
                <h3 className="font-bold text-blue-800 mb-2">Multiple Chains</h3>
                <div className="space-y-2 text-sm text-blue-800">
                  <p>{"Run 4 independent chains from different starting points."}</p>
                  <p><strong>{"If they agree:"}</strong>{" convergence is likely."}</p>
                  <p><strong>{"If they disagree:"}</strong>{" warm-up was too short or the chain is not mixing."}</p>
                  <p className="font-semibold">{"PyMC default: chains=4, draws=1000 post-warmup per chain = 4000 total samples."}</p>
                </div>
              </div>
            </div>
    
            {/* Right: Estimator */}
            <div className="flex flex-col gap-3">
              <div className="bg-green-50 border-2 border-green-200 rounded-xl p-4">
                <h3 className="font-bold text-green-800 mb-2">The MCMC Estimator</h3>
                <Latex math={estimator} display={true} />
                <p className="text-sm text-green-700 mt-2">
                  {"where B = number of warm-up samples discarded. Same as the MC estimator from Ch2, but applied to correlated posterior samples."}
                </p>
              </div>
    
              <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4">
                <h3 className="font-bold text-purple-800 mb-2">Monte Carlo Standard Error</h3>
                <Latex math={se} display={true} />
                <p className="text-sm text-purple-700 mt-2">
                  {"Uses ESS (not raw S) in the denominator because samples are correlated. MCSE measures how precisely we have estimated the posterior mean \u2014 distinct from the posterior SD itself."}
                </p>
              </div>
    
              <div className="bg-gray-900 text-gray-100 rounded-lg p-3 font-mono text-xs flex-1 overflow-auto">
                <div className="text-green-400"># PyMC: warm-up is automatic</div>
                <div>idata = pm.sample(</div>
                <div>{"    "}draws=<span className="text-purple-300">1000</span>,   <span className="text-green-400"># post-warmup</span></div>
                <div>{"    "}tune=<span className="text-purple-300">1000</span>,    <span className="text-green-400"># warm-up (discarded)</span></div>
                <div>{"    "}chains=<span className="text-purple-300">4</span>,     <span className="text-green-400"># independent chains</span></div>
                <div>)</div>
                <div className="mt-1 text-green-400"># Total samples: 4 x 1000 = 4000</div>
                <div className="text-green-400"># MCSE reported in az.summary()</div>
              </div>
            </div>
          </div>
        </div>
  );
}

//                         SLIDE 55: ESS AND RHAT
// ═══════════════════════════════════════════════════════════════════════

function Slide55_ESSAndRhat() {
  const essFormula = "\\text{ESS} = \\frac{S}{1 + 2\\sum_{k=1}^{K} \\hat{\\rho}_k}";
    const rhatFormula = "\\hat{R} = \\sqrt{\\frac{\\hat{V}}{W}}, \\quad \\hat{V} = \\frac{S-1}{S}W + \\frac{1}{S}B";
    const mcse = "\\text{MCSE} = \\frac{\\hat{\\sigma}}{\\sqrt{\\text{ESS}}}";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">
              {"Convergence Diagnostics: Effective Sample Size and "}<Latex math={"\\hat{R}"} />
            </h1>
            <p className="text-gray-600">{"ArviZ \u2014 the standard Python library for Bayesian diagnostics"}</p>
          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-5">
            {/* Left: ESS */}
            <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4 flex flex-col gap-3">
              <h2 className="font-bold text-blue-800 text-lg">Effective Sample Size</h2>
              <div className="bg-white rounded-lg p-2">
                <Latex math={essFormula} display={true} />
              </div>
              <div className="space-y-2 text-sm text-blue-800">
                <p>
                  <strong>Intuition:</strong>{" How many independent samples would carry the same information as your S correlated MCMC samples? High autocorrelation "}<Latex math={"\\Rightarrow"} />{" low effective sample size "}<Latex math={"\\Rightarrow"} />{" poor mixing."}
                </p>
                <p>
                  <strong>Monte Carlo standard error:</strong>{" "}<Latex math={mcse} />{" \u2014 uses effective sample size (not raw S) because correlated samples carry less information."}
                </p>
                <p>
                  {"ArviZ reports two variants: "}<strong>ess_bulk</strong>{" (for means and central quantiles) and "}<strong>ess_tail</strong>{" (for tail quantiles and credible interval endpoints). Both should exceed 400."}
                </p>
              </div>
            </div>
    
            {/* Right: R-hat */}
            <div className="bg-green-50 border-2 border-green-200 rounded-xl p-4 flex flex-col gap-3">
              <h3 className="font-bold text-green-800 text-lg"><Latex math={"\\hat{R}"} />{" (Gelman-Rubin)"}</h3>
              <div className="bg-white rounded-lg p-2">
                <Latex math={rhatFormula} display={true} />
              </div>
              <div className="space-y-2 text-sm text-green-800">
                <p>
                  <strong>Intuition:</strong>{" A variance ratio comparing between-chain variation (B) to within-chain variation (W) \u2014 the same idea as the F-statistic in analysis of variance. If chains agree, "}<Latex math={"B \\approx 0"} />{" and "}<Latex math={"\\hat{R} \\approx 1"} />{". If chains explore different regions, "}<Latex math={"B \\gg W"} />{" and "}<Latex math={"\\hat{R} \\gg 1"} />{"."}
                </p>
                <p>
                  <strong>Why multiple chains:</strong>{" A single chain can appear converged while stuck in one mode. Multiple chains from dispersed starts make this failure visible."}
                </p>
                <p>
                  {"ArviZ uses rank-normalised split-"}<Latex math={"\\hat{R}"} />{": splits each chain in half to catch within-chain non-stationarity, then rank-normalises for robustness to skewness."}
                </p>
              </div>
            </div>
          </div>
    
          {/* Footer: az.summary mapping */}
          <div className="flex-shrink-0 mt-3 bg-slate-50 border-2 border-slate-300 rounded-xl p-3">
            <p className="text-xs font-semibold text-slate-700 mb-1.5">
              {"Every column of az.summary() is a concept from this section:"}
            </p>
            <div className="grid grid-cols-9 gap-1 text-center">
              {[
                { col: 'mean', desc: 'MCMC est.' },
                { col: 'sd', desc: 'Posterior std dev' },
                { col: 'hdi_3%', desc: 'Interval low' },
                { col: 'hdi_97%', desc: 'Interval high' },
                { col: 'mcse_mean', desc: 'MC std err' },
                { col: 'mcse_sd', desc: 'MC err of sd' },
                { col: 'ess_bulk', desc: 'Centre' },
                { col: 'ess_tail', desc: 'Tails' },
                { col: 'r_hat', desc: 'B vs W' },
              ].map((item, i) => (
                <div key={i} className="bg-white rounded p-1 border border-slate-200">
                  <p className="text-xs font-mono font-bold text-slate-800">{item.col}</p>
                  <p className="text-[10px] text-slate-500">{item.desc}</p>
                </div>
              ))}
            </div>
            <p className="text-xs text-amber-700 mt-2 font-semibold text-center">
              {"Both must pass: effective sample size > 400 AND "}<Latex math={"\\hat{R} < 1.01"} />
              {". If either fails, do NOT trust the posterior summaries in that row."}
            </p>
          </div>
        </div>
  );
}

                  <p className="text-xs text-amber-800">
                    <strong>{"Why dispersed starts?"}</strong>
                    {" If the posterior is multimodal, a single chain may get trapped in one mode and never discover the others. Running at least 4 chains from widely separated starting points makes this visible: chains that converge to different regions reveal multiple modes. In practice, find a central estimate (MLE or posterior mode), then perturb it by 2\u20133 posterior standard deviations in each coordinate. PyMC automates this."}
                  </p>
                </div>
                <div className="bg-emerald-50 border border-emerald-300 rounded-lg p-3">
                  <p className="text-xs text-emerald-800">
                    <strong>Why record the current value on rejection?</strong>
                    {" The duplicate is the sample. If we only kept accepted proposals, we would oversample regions where the acceptance probability is high and undersample regions where it is low \u2014 distorting the stationary distribution. Recording the current value again preserves the correct frequency at every point. The cost is autocorrelation: consecutive samples are identical, so effective sample size is lower than the nominal sample count."}
                  </p>
                </div>
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                  <p className="text-xs text-blue-800">
                    <strong>Why log scale in step 2b?</strong>
                    {" Likelihoods are products of many terms, each less than 1. Multiplying hundreds of small numbers causes underflow to 0.0 in floating point. On the log scale, products become sums and small probabilities become manageable negative numbers. The accept condition "}<Latex math={"u < \\min(1, R)"} />{" becomes simply "}<Latex math={"\\log u < \\log R"} />{": since "}<Latex math={"u \\in (0,1)"} />{", "}<Latex math={"\\log u < 0"} />{", so when "}<Latex math={"R \\geq 1"} />{" the inequality holds automatically and we always accept. The min is handled implicitly."}
                  </p>
                </div>
                <div className="bg-purple-50 border border-purple-200 rounded-lg p-3">
                  <p className="text-xs text-purple-800">
                    <strong>Why does it converge to the posterior?</strong>
                    {" We chose "}<Latex math={"\\alpha"} />{" so that the kernel satisfies detailed balance with the posterior as its stationary distribution. The ergodic theorem (\u00a75.4) then guarantees that time averages of the chain converge to the corresponding expectations under the posterior."}
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
  );
}

function Slide62_RandomWalkMH() {
  const proposal = "\\theta' = \\theta^{(s)} + \\epsilon, \\quad \\epsilon \\sim \\mathcal{N}(0, \\sigma^2_{\\text{prop}})";
    const mvProposal = "\\boldsymbol{\\theta}' = \\boldsymbol{\\theta}^{(s)} + \\boldsymbol{\\epsilon}, \\quad \\boldsymbol{\\epsilon} \\sim \\mathcal{N}_d(\\mathbf{0},\\, \\boldsymbol{\\Sigma}_{\\text{prop}})";
    const symProof = "q(\\theta' \\mid \\theta) = \\phi\\!\\left(\\frac{\\theta' - \\theta}{\\sigma_{\\text{prop}}}\\right) = \\phi\\!\\left(\\frac{\\theta - \\theta'}{\\sigma_{\\text{prop}}}\\right) = q(\\theta \\mid \\theta')";
    const generalAlpha = "\\alpha = \\min\\!\\left(1,\\; \\frac{\\pi(\\theta')\\; \\cancel{q(\\theta \\mid \\theta')}}{\\pi(\\theta)\\; \\cancel{q(\\theta' \\mid \\theta)}}\\right)";
    const simpleAlpha = "= \\min\\!\\left(1,\\; \\frac{\\pi(\\theta')}{\\pi(\\theta)}\\right) = \\min\\!\\left(1,\\; \\frac{p(y \\mid \\theta')\\,p(\\theta')}{p(y \\mid \\theta)\\,p(\\theta)}\\right)";
    const logAlpha = "\\log \\alpha = \\log p(y \\mid \\theta') + \\log p(\\theta') - \\log p(y \\mid \\theta) - \\log p(\\theta)";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">Random-Walk Metropolis-Hastings</h1>
            <p className="text-gray-600">The simplest and most common Metropolis-Hastings variant</p>
          </div>
    
          {/* Row 1: Proposal and symmetry argument */}
          <div className="grid grid-cols-2 gap-5 mb-4">
            <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">
              <h2 className="font-bold text-blue-800 mb-2">The Random-Walk Proposal</h2>
              <p className="text-sm text-blue-700 mb-1">
                {"Add random noise to the current position. In one dimension:"}
              </p>
              <div className="bg-white rounded-lg p-2">
                <Latex math={proposal} display={true} />
              </div>
              <p className="text-sm text-blue-700 mt-2 mb-1">
                {"In "}<Latex math={"d"} />{" dimensions, the noise is a multivariate Gaussian:"}

              <div className="bg-white rounded-lg p-2">
                <Latex math={mvProposal} display={true} />
              </div>
              <p className="text-sm text-blue-700 mt-2">
                {"The covariance matrix "}<Latex math={"\\boldsymbol{\\Sigma}_{\\text{prop}}"} />{" controls both the step size and the correlation structure of proposals. A diagonal "}<Latex math={"\\boldsymbol{\\Sigma}_{\\text{prop}}"} />{" proposes independently in each coordinate. If the posterior has correlated parameters but the proposal ignores this, most candidates land in low-density regions and get rejected \u2014 the chain records the same value repeatedly."}
              </p>
            </div>
    
            <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4">
              <h3 className="font-bold text-purple-800 mb-2">Why the Proposal Cancels</h3>
              <p className="text-sm text-purple-700 mb-2">
                {"The Gaussian density "}<Latex math={"\\phi"} />{" is symmetric around zero, so the probability of proposing "}<Latex math={"\\theta'"} />{" from "}<Latex math={"\\theta"} />{" equals the probability of proposing "}<Latex math={"\\theta"} />{" from "}<Latex math={"\\theta'"} />{":"}
              </p>
              <div className="bg-white rounded-lg p-2 text-sm">
                <Latex math={symProof} display={true} />
              </div>
              <p className="text-sm text-purple-700 mt-2">
                {"This holds because "}<Latex math={"(\\theta' - \\theta)^2 = (\\theta - \\theta')^2"} />
                {". In the multivariate case, the same argument applies: the exponent "}<Latex math={"(\\boldsymbol{\\theta}' - \\boldsymbol{\\theta})^\\top \\boldsymbol{\\Sigma}^{-1} (\\boldsymbol{\\theta}' - \\boldsymbol{\\theta})"} />
                {" is invariant to swapping "}<Latex math={"\\boldsymbol{\\theta}"} />{" and "}<Latex math={"\\boldsymbol{\\theta}'"} />{". Any distribution whose density depends only on "}<Latex math={"\\|\\boldsymbol{\\theta}' - \\boldsymbol{\\theta}\\|"} />{" is symmetric."}
              </p>

          </div>
    
          {/* Row 2: Simplified acceptance ratio */}
          <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-4 mb-4">
            <h3 className="font-bold text-amber-800 mb-2">Simplified Acceptance Ratio (Original Metropolis Algorithm)</h3>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <p className="text-sm text-amber-700 mb-2">
                  {"Since "}<Latex math={"q(\\theta' \\mid \\theta) = q(\\theta \\mid \\theta')"} />{", the proposal terms cancel in the general Metropolis-Hastings ratio:"}
                </p>

//                        SLIDE 63: PROPOSAL TUNING
// ═══════════════════════════════════════════════════════════════════════

function Slide63_ProposalTuning() {
  const esjd = "\\text{ESJD} = \\mathbb{E}\\!\\left[\\|\\boldsymbol{\\theta}^{(s+1)} - \\boldsymbol{\\theta}^{(s)}\\|^2\\right]";
    const optScale = "\\sigma_{\\text{opt}} = \\frac{2.38}{\\sqrt{d}} \\cdot \\hat{\\sigma}_{\\text{post}}";
    const optRate = "\\alpha^* \\approx \\begin{cases} 0.44 & d = 1 \\\\ 0.234 & d \\geq 5 \\end{cases}";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">Proposal Tuning: The Goldilocks Problem</h1>
            <p className="text-gray-600">Neither acceptance rate nor step size alone determines efficiency</p>
          </div>
    
          {/* Row 1: The tradeoff */}
          <div className="grid grid-cols-3 gap-4 mb-4">
            <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">
              <h2 className="font-bold text-blue-800 mb-2"><Latex math={"\\sigma_{\\text{prop}}"} />{" Too Small"}</h2>
              <p className="text-sm text-blue-700 mb-1">
                {"Proposals stay close to the current state. The acceptance probability "}<Latex math={"\\alpha(\\theta', \\theta) \\approx 1"} />{" because the candidate is barely different from the current value."}
              </p>
              <p className="text-sm text-blue-700">
                <strong>{"Acceptance: "}</strong>{"~99%"}
              </p>
              <p className="text-sm text-blue-700">
                <strong>{"Step size: "}</strong>{"tiny"}
              </p>
              <p className="text-sm text-red-700 font-semibold mt-1">
                {"High acceptance "}<Latex math={"\\times"} />{" tiny steps = slow exploration."}
              </p>
            </div>
    
            <div className="bg-green-50 border-2 border-green-300 rounded-xl p-4">
              <h3 className="font-bold text-green-800 mb-2"><Latex math={"\\sigma_{\\text{prop}}"} />{" Optimal"}</h3>
              <p className="text-sm text-green-700 mb-1">
                {"Proposals are large enough to explore, but not so large that they waste most steps in low-density regions."}
              </p>
              <p className="text-sm text-green-700">
                <strong>{"Acceptance: "}</strong>{"~23\u201344%"}
              </p>
              <p className="text-sm text-green-700">
                <strong>{"Step size: "}</strong>{"moderate"}
              </p>
              <p className="text-sm text-green-700 font-semibold mt-1">
                {"Moderate acceptance "}<Latex math={"\\times"} />{" moderate steps = maximum distance per iteration."}
              </p>
            </div>
    
            <div className="bg-red-50 border-2 border-red-200 rounded-xl p-4">
              <h3 className="font-bold text-red-800 mb-2"><Latex math={"\\sigma_{\\text{prop}}"} />{" Too Large"}</h3>
              <p className="text-sm text-red-700 mb-1">
                {"Proposals land far from the current state, where the acceptance probability "}<Latex math={"\\alpha(\\theta', \\theta)"} />{" is small. Nearly all are rejected."}
              </p>
              <p className="text-sm text-red-700">
                <strong>{"Acceptance: "}</strong>{"~1\u20135%"}
              </p>
              <p className="text-sm text-red-700">
                <strong>{"Step size: "}</strong>{"large (when accepted)"}
              </p>
              <p className="text-sm text-red-700 font-semibold mt-1">
                {"Low acceptance "}<Latex math={"\\times"} />{" large steps = chain stuck, same value repeated."}
              </p>
            </div>
          </div>
    
          {/* Row 2: ESJD and optimal rate */}
          <div className="grid grid-cols-2 gap-5 mb-4">
            <div className="bg-slate-50 border-2 border-slate-300 rounded-xl p-4">
              <h3 className="font-bold text-slate-800 mb-2">Expected Squared Jumping Distance</h3>
              <p className="text-sm text-slate-700 mb-2">
                {"The efficiency of the chain is determined by how far it moves per iteration. We want to maximise:"}
              </p>
              <div className="bg-white rounded-lg p-2">
                <Latex math={esjd} display={true} />
              </div>
              <p className="text-sm text-slate-700 mt-2">
                {"ESJD depends on "}<Latex math={"\\sigma"} />{" implicitly: the proposal scale determines both how far candidates land and how often they are accepted. On acceptance the chain jumps to the proposed state; on rejection it stays put and the distance is zero. Larger jumps are more likely to be rejected because they land farther from the current state. As "}<Latex math={"\\sigma"} />{" increases, proposed jumps grow but fewer are accepted. ESJD rises, peaks, then falls. The "}<Latex math={"\\sigma"} />{" that maximises ESJD is the optimal proposal scale."}
              </p>
            </div>
    
            <div className="flex flex-col gap-3">
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-4">

                <p className="text-sm text-amber-700 mb-2">

                  <Latex math={optRate} display={true} />
                </div>
                <p className="text-xs text-amber-600 mt-1 italic">
                  {"Derived for Gaussian targets with independent components, but widely applied as a rule of thumb for general posteriors."}
                </p>
              </div>
    
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-4">
                <h3 className="font-bold text-purple-800 mb-2">Practical Upshot</h3>

                  {"We cannot compute "}<Latex math={"\\sigma_{\\text{opt}}"} />{", but we can observe the acceptance rate. During warm-up, adjust "}<Latex math={"\\sigma_{\\text{prop}}"} />
                  {" until the acceptance rate falls between 20\u201350%. Too high \u2192 increase "}<Latex math={"\\sigma"} />
                  {". Too low \u2192 decrease "}<Latex math={"\\sigma"} />
                  {". PyMC does this automatically during the tuning phase."}
                </p>
              </div>
            </div>
          </div>
    
          {/* Row 3: The curse of dimensionality */}
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4">
            <h3 className="font-bold text-red-800 mb-2">The Fundamental Limitation of Random-Walk Proposals</h3>
            <div className="grid grid-cols-3 gap-4">
              <div>
                <p className="text-xs font-bold text-red-800 mb-1">Isotropic proposal (<Latex math={"\\sigma I_d"} />)</p>
                <p className="text-sm text-red-700">
                  {"The "}<Latex math={"O(d^2)"} />{" result above assumes an isotropic proposal that ignores posterior correlations. When parameters are correlated, proposals along high-correlation directions are almost always rejected, making performance even worse."}
                </p>
              </div>
              <div>
                <p className="text-xs font-bold text-red-800 mb-1">{"Adaptive covariance ("}<Latex math={"\\boldsymbol{\\Sigma}_{\\text{prop}} \\propto \\boldsymbol{\\Sigma}_{\\text{post}}"} />{")"}</p>
                <p className="text-sm text-red-700">
                  {"Matching the proposal covariance to the posterior (Haario et al., 2001) eliminates the correlation penalty and substantially improves the constant. But the chain is still a random walk \u2014 each step is a small random perturbation. Diffusion scaling persists."}
                </p>
              </div>
              <div>
                <p className="text-xs font-bold text-red-800 mb-1">{"Hamiltonian Monte Carlo (\u00a75.5)"}</p>
                <p className="text-sm text-red-700">
                  {"HMC is different in kind: it replaces the random walk with deterministic trajectories that follow the posterior\u2019s curvature using gradient information. Proposals travel much farther per step, scaling as "}<Latex math={"O(d^{5/4})"} />{" instead of "}<Latex math={"O(d^2)"} />{". The No-U-Turn Sampler automates HMC\u2019s trajectory length, which is why PyMC defaults to it."}
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

function Slide64_LogisticRegressionMH() {
  const logistic = "P(y_i = 1 \\mid \\mathbf{x}_i, \\boldsymbol{\\beta}) = \\frac{1}{1 + e^{-\\mathbf{x}_i^\\top \\boldsymbol{\\beta}}}";
    const prior = "\\beta_j \\stackrel{\\text{iid}}{\\sim} \\mathcal{N}(0, \\tau^2), \\quad \\tau = 10";
    const logPost1 = "\\log \\tilde{p}(\\boldsymbol{\\beta} \\mid \\mathbf{y}) = \\sum_{i=1}^n \\bigl[y_i \\eta_i - \\log(1 + e^{\\eta_i})\\bigr]";
    const logPost2 = "\\qquad\\qquad\\qquad\\;\\; - \\frac{1}{2\\tau^2}\\|\\boldsymbol{\\beta}\\|^2";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">Example: Logistic Regression via Metropolis-Hastings</h1>

                <Latex math={logistic} display={true} />
              </div>
              <p className="text-sm text-blue-700 mt-2">
                {"where "}<Latex math={"\\eta_i = \\mathbf{x}_i^\\top \\boldsymbol{\\beta}"} />{" is the linear predictor and "}<Latex math={"\\boldsymbol{\\beta} \\in \\mathbb{R}^d"} />{" is the coefficient vector."}
              </p>
            </div>
    
            <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4">
              <h3 className="font-bold text-purple-800 mb-2">Prior</h3>
              <div className="bg-white rounded-lg p-2">
                <Latex math={prior} display={true} />
              </div>
              <p className="text-sm text-purple-700 mt-2">
                {"Weakly informative: centred at zero, wide enough to let the data dominate but regularising extreme coefficients."}
              </p>
            </div>
    
            <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-4">
              <h3 className="font-bold text-slate-800 mb-2">Log Unnormalized Posterior</h3>

// ═══════════════════════════════════════════════════════════════════════
//                          SLIDE 65: MH SUMMARY
// ═══════════════════════════════════════════════════════════════════════

function Slide65_MHSummary() {
  const generalAlpha = "\\alpha(\\theta', \\theta) = \\min\\!\\left(1,\\; \\frac{\\pi(\\theta')\\,q(\\theta \\mid \\theta')}{\\pi(\\theta)\\,q(\\theta' \\mid \\theta)}\\right)";
    const scalarRW = "\\theta' = \\theta^{(s)} + \\epsilon, \\quad \\epsilon \\sim \\mathcal{N}(0, \\sigma^2_{\\text{prop}})";
    const mvRW = "\\boldsymbol{\\theta}' = \\boldsymbol{\\theta}^{(s)} + \\boldsymbol{\\epsilon}, \\quad \\boldsymbol{\\epsilon} \\sim \\mathcal{N}_d(\\mathbf{0},\\, \\boldsymbol{\\Sigma}_{\\text{prop}})";
    const symAlpha = "\\alpha = \\min\\!\\left(1,\\; \\frac{\\pi(\\theta')}{\\pi(\\theta)}\\right)";
    const logImpl = "\\text{Accept if } \\log u < \\log \\tilde{\\pi}(\\theta') - \\log \\tilde{\\pi}(\\theta)";

  return (

            </div>
    
            <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4">
              <h3 className="font-bold text-purple-800 mb-2">Scalar Random Walk</h3>

            <div className="bg-indigo-50 border-2 border-indigo-200 rounded-xl p-4">

              </div>
              <p className="text-sm text-indigo-700 mb-2">

              <p className="text-sm text-indigo-700">
                {"Diagonal "}<Latex math={"\\boldsymbol{\\Sigma}_{\\text{prop}}"} />{" ignores posterior correlations and wastes proposals. Adaptive MCMC (Haario et al., 2001) estimates the posterior covariance from the chain during warm-up and updates the proposal automatically \u2014 this improves the constant but not the fundamental diffusion scaling."}

                  <p><strong>{"Scales poorly with dimension: "}</strong><Latex math={"O(d^2)"} />{" iterations to traverse the posterior. The optimal proposal scale shrinks as "}<Latex math={"O(1/\\sqrt{d})"} />{" (Slide 63), so the chain must take progressively smaller steps as dimension grows. Impractical beyond d "}<Latex math={"\\approx"} />{" 20."}</p>

}

//                        SLIDE 66: GIBBS ALGORITHM
// ═══════════════════════════════════════════════════════════════════════

function Slide66_GibbsAlgorithm() {
  const mhStart = "\\alpha = \\min\\!\\left(1,\\; \\frac{p(\\theta'_j, \\boldsymbol{\\theta}_{-j} \\mid \\mathbf{y})\\; q(\\theta_j \\mid \\boldsymbol{\\theta}_{-j})}{p(\\theta_j, \\boldsymbol{\\theta}_{-j} \\mid \\mathbf{y})\\; q(\\theta'_j \\mid \\boldsymbol{\\theta}_{-j})}\\right)";
    const mhFactor = "= \\min\\!\\left(1,\\; \\frac{p(\\theta'_j \\mid \\boldsymbol{\\theta}_{-j}, \\mathbf{y})\\;\\cancel{p(\\boldsymbol{\\theta}_{-j} \\mid \\mathbf{y})}\\; q(\\theta_j \\mid \\boldsymbol{\\theta}_{-j})}{p(\\theta_j \\mid \\boldsymbol{\\theta}_{-j}, \\mathbf{y})\\;\\cancel{p(\\boldsymbol{\\theta}_{-j} \\mid \\mathbf{y})}\\; q(\\theta'_j \\mid \\boldsymbol{\\theta}_{-j})}\\right)";
    const mhSetQ = "\\text{Set } q(\\theta'_j \\mid \\boldsymbol{\\theta}_{-j}) = p(\\theta'_j \\mid \\boldsymbol{\\theta}_{-j}, \\mathbf{y})";
    const mhFinal = "= \\min\\!\\left(1,\\; \\frac{\\cancel{p(\\theta'_j \\mid \\boldsymbol{\\theta}_{-j}, \\mathbf{y})}\\; \\cancel{p(\\theta_j \\mid \\boldsymbol{\\theta}_{-j}, \\mathbf{y})}}{\\cancel{p(\\theta_j \\mid \\boldsymbol{\\theta}_{-j}, \\mathbf{y})}\\; \\cancel{p(\\theta'_j \\mid \\boldsymbol{\\theta}_{-j}, \\mathbf{y})}}\\right) = 1";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">The Gibbs Sampler</h1>
            <p className="text-gray-600">Component-wise updates from full conditional distributions</p>
          </div>
    
          {/* Row 1: Motivation + derivation */}
          <div className="grid grid-cols-2 gap-5 mb-4">
            <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">
              <h2 className="font-bold text-blue-800 mb-2">The Problem with Joint Proposals</h2>
              <p className="text-sm text-blue-700 mb-2">
                {"In multivariate MH, the proposal must get all d coordinates right simultaneously. As d grows, most proposals miss the typical set and get rejected."}
              </p>
              <p className="text-sm text-blue-700">
                <strong>{"Gibbs\u2019s insight:"}</strong>
                {" update one coordinate at a time, drawing from the exact conditional of that parameter given all others. Every proposal is accepted \u2014 no rejection, no tuning."}
              </p>
            </div>
    
            <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4">
              <h3 className="font-bold text-purple-800 mb-2">Gibbs as a Special Case of MH</h3>
              <p className="text-xs text-purple-700 mb-1">
                {"Start from the general MH ratio (Slide 61). The target is the joint posterior. Only coordinate j changes:"}
              </p>
              <div className="bg-white rounded-lg p-2 mb-1 text-sm overflow-x-auto">
                <Latex math={mhStart} display={true} />
              </div>
              <p className="text-xs text-purple-700 mb-1">
                {"Factor the joint as conditional "}<Latex math={"\\times"} />{" marginal. The marginal "}<Latex math={"p(\\boldsymbol{\\theta}_{-j} \\mid \\mathbf{y})"} />{" cancels (identical in numerator and denominator):"}
              </p>
              <div className="bg-white rounded-lg p-2 mb-1 text-sm overflow-x-auto">
                <Latex math={mhFactor} display={true} />
              </div>
              <p className="text-xs text-purple-700 mb-1">
                {"Now set the proposal equal to the full conditional:"}
              </p>
              <div className="bg-white rounded-lg p-2 mb-1 text-sm overflow-x-auto">
                <Latex math={mhSetQ} display={true} />
                <Latex math={mhFinal} display={true} />
              </div>
            </div>
          </div>
    
          {/* Row 2: Sequential form */}
          <div className="grid grid-cols-3 gap-3 mb-3">
            <div className="bg-white rounded-lg p-3 border-l-4 border-blue-400 border border-slate-200">
              <p className="text-xs font-bold text-blue-800 mb-1">{"Sweep step 1"}</p>
              <Latex math={"\\theta_1^{(s)} \\sim p(\\theta_1 \\mid \\theta_2^{(s-1)}, \\theta_3^{(s-1)}, \\mathbf{y})"} display={true} />
              <p className="text-xs text-blue-700 mt-1">{"Both others from previous iteration."}</p>
            </div>
            <div className="bg-white rounded-lg p-3 border-l-4 border-green-400 border border-slate-200">
              <p className="text-xs font-bold text-green-800 mb-1">{"Sweep step 2"}</p>
              <Latex math={"\\theta_2^{(s)} \\sim p(\\theta_2 \\mid \\textcolor{blue}{\\theta_1^{(s)}}, \\theta_3^{(s-1)}, \\mathbf{y})"} display={true} />
              <p className="text-xs text-green-700 mt-1">{"Uses just-updated "}<Latex math={"\\theta_1^{(s)}"} />{"."}
              </p>
            </div>
            <div className="bg-white rounded-lg p-3 border-l-4 border-purple-400 border border-slate-200">
              <p className="text-xs font-bold text-purple-800 mb-1">{"Sweep step 3"}</p>
              <Latex math={"\\theta_3^{(s)} \\sim p(\\theta_3 \\mid \\textcolor{blue}{\\theta_1^{(s)}}, \\textcolor{blue}{\\theta_2^{(s)}}, \\mathbf{y})"} display={true} />
              <p className="text-xs text-purple-700 mt-1">{"Both updated values from this sweep."}</p>
            </div>
          </div>
    
          {/* Row 3: Algorithm + notes */}
          <div className="grid grid-cols-2 gap-5 mb-4">
            <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-4">
              <h3 className="font-bold text-slate-800 mb-2">Algorithm: Gibbs Sampler</h3>
              <div className="bg-white rounded-lg p-3">
                <pre className="font-mono text-xs leading-relaxed">{
    `Input:  theta_0, full conditionals, S iterations
    Output: {theta^(1), ..., theta^(S)}
    
    1. Initialise (theta_1, ..., theta_d) = theta_0
    2. For s = 1, ..., S:
         Draw a random permutation pi of {1,...,d}
         For k = 1, ..., d:
           j = pi(k)
           Draw theta_j^(s) from
             p(theta_j | all others at most
               recent values, y)
         Record theta^(s)
    3. Discard warm-up; return post-warmup draws`}
                </pre>
              </div>
            </div>
    
            <div className="flex flex-col gap-3">
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-4">
                <h3 className="font-bold text-amber-800 mb-1">Why It Works + Why Random Scan</h3>
                <p className="text-sm text-amber-700 mb-2">
                  {"The full conditionals are not a factorization of the joint \u2014 their product does not equal "}<Latex math={"p(\\boldsymbol{\\theta} \\mid \\mathbf{y})"} />
                  {". The justification is the derivation above: each coordinate update is a valid MH transition (acceptance = 1) that preserves the posterior. Composing d such transitions preserves the posterior. Under positivity, the chain is ergodic."}
                </p>
                <p className="text-sm text-amber-700">
                  <strong>{"Why randomise the scan order?"}</strong>
                  {" A fixed ordering produces a composite kernel that does not satisfy detailed balance. "}<a href="https://arxiv.org/abs/1606.03432" target="_blank" rel="noopener noreferrer" className="underline text-amber-900 hover:text-amber-700">{"He et al. (2016)"}</a>{" showed that the choice of permutation can cause polynomial differences in mixing time: a bad permutation can mix polynomially slower than random scan, and a good permutation can mix polynomially faster. Since you typically cannot know which permutation is good for your model, random scan is the safer default \u2014 it produces a mixture kernel "}<Latex math={"T = \\frac{1}{d}\\sum_j T_j"} />{" that satisfies detailed balance and avoids worst-case permutations."}
                </p>
              </div>
    
              <div className="bg-green-50 border-2 border-green-300 rounded-xl p-4">
                <h3 className="font-bold text-green-800 mb-1">Requirements and Variants</h3>
                <p className="text-sm text-green-700 mb-1">
                  {"Each conditional must be a standard distribution you can sample from (conjugate conditionals). When one is not, embed an MH step for that block (Metropolis-within-Gibbs)."}
                </p>
                <p className="text-sm text-green-700">
                  <a href="https://www.jstor.org/stable/2290921" target="_blank" rel="noopener noreferrer" className="underline text-green-900 hover:text-green-700">{"Collapsed Gibbs"}</a>{" (Liu, 1994) integrates out some parameters analytically, reducing variance (Rao-Blackwell theorem). "}<a href="https://doi.org/10.1093/biomet/81.1.27" target="_blank" rel="noopener noreferrer" className="underline text-green-900 hover:text-green-700">{"Block Gibbs"}</a>{" (Liu, Wong, and Kong, 1994) draws correlated parameters jointly. Bayesian inference Using Gibbs Sampling (BUGS) and Just Another Gibbs Sampler (JAGS) detect conjugate structure automatically."}
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

function Slide67_GibbsNIG() {
  const model = "y_i \\mid \\mu, \\sigma^2 \\stackrel{\\text{iid}}{\\sim} \\mathcal{N}(\\mu, \\sigma^2)";
    const priorMu = "\\mu \\mid \\sigma^2 \\sim \\mathcal{N}\\!\\left(\\mu_0,\\; \\frac{\\sigma^2}{\\kappa_0}\\right)";
    const priorSig = "\\sigma^2 \\sim \\text{Inv-Gamma}(\\alpha_0, \\beta_0)";
    const condMu = "\\mu \\mid \\sigma^2, \\mathbf{y} \\;\\sim\\; \\mathcal{N}\\!\\left(\\frac{\\kappa_0 \\mu_0 + n\\bar{y}}{\\kappa_0 + n},\\; \\frac{\\sigma^2}{\\kappa_0 + n}\\right)";
    const condSig = "\\sigma^2 \\mid \\mu, \\mathbf{y} \\;\\sim\\; \\text{Inv-Gamma}(\\alpha_n,\\; \\beta_n)";
    const condSigParams1 = "\\alpha_n = \\alpha_0 + \\frac{n+1}{2}";
    const condSigParams2 = "\\beta_n = \\beta_0 + \\frac{1}{2}\\sum_{i=1}^n(y_i - \\mu)^2 + \\frac{\\kappa_0}{2}(\\mu - \\mu_0)^2";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">Gibbs for Normal-Inverse-Gamma</h1>
            <p className="text-gray-600">Alternating between conjugate conditional draws, on Michelson's speed of light</p>
          </div>
    
          {/* Row 1: Model and conditionals */}
          <div className="grid grid-cols-3 gap-4 mb-4">
            <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">

              <div className="bg-white rounded-lg p-2 space-y-1">
                <Latex math={model} display={true} />
                <Latex math={priorMu} display={true} />
                <Latex math={priorSig} display={true} />
              </div>
              <p className="text-xs text-blue-700 mt-2">
                {"Note: the prior on "}<Latex math={"\\mu"} />{" depends on "}<Latex math={"\\sigma^2"} />{". This couples the two parameters in the joint posterior."}
              </p>
            </div>
    
            <div className="bg-green-50 border-2 border-green-200 rounded-xl p-4">
              <h3 className="font-bold text-green-800 mb-2">

              <div className="bg-white rounded-lg p-2">
                <Latex math={condMu} display={true} />
              </div>
              <p className="text-xs text-green-700 mt-2">
                {"Normal-Normal conjugacy: treat "}<Latex math={"\\sigma^2"} />{" as a known constant. The posterior mean is a precision-weighted average of the prior mean "}<Latex math={"\\mu_0"} />{" and the data mean "}<Latex math={"\\bar{y}"} />{"."}
              </p>

            <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4">
              <h3 className="font-bold text-purple-800 mb-2">
                {"Conditional for "}<Latex math={"\\sigma^2"} />
              </h3>
              <div className="bg-white rounded-lg p-2">
                <Latex math={condSig} display={true} />
                <Latex math={condSigParams1} display={true} />
                <Latex math={condSigParams2} display={true} />
              </div>
              <div className="bg-purple-100 rounded-lg p-2 mt-2 border border-purple-300">
                <p className="text-xs text-purple-800">
                  <strong>{"Common mistake:"}</strong>
                  {" the "}<Latex math={"\\frac{\\kappa_0}{2}(\\mu - \\mu_0)^2"} />{" term and the extra "}<Latex math={"\\frac{1}{2}"} />{" in the shape come from "}<Latex math={"p(\\mu \\mid \\sigma^2)"} />{". Since this prior depends on "}<Latex math={"\\sigma^2"} />{", it contributes to the conditional. Omitting it gives biased samples."}
                </p>
              </div>
            </div>
          </div>
    
          {/* Row 2: Driver (sampler extracted to the linked script) */}
          <div className="grid grid-cols-3 gap-4 mb-3">
            <div className="col-span-2 bg-gray-900 text-gray-100 rounded-xl p-4 font-mono text-xs leading-relaxed">

function Slide69_HMCNUTS() {

    const acceptance = "\\alpha = \\min\\!\\left(1,\\; \\exp\\!\\bigl(-H(\\boldsymbol{\\theta}', \\mathbf{p}') + H(\\boldsymbol{\\theta}, \\mathbf{p})\\bigr)\\right)";

  return (
    <div className="h-full flex flex-col p-6">

                {"Random-walk MH proposes blindly \u2014 it does not know which direction leads to higher density. The gradient "}<Latex math={"\\nabla \\log \\tilde{p}"} />{" tells us the uphill direction, but simply following the gradient would climb to the mode and stop. We need to explore, not optimise."}
              </p>
              <p className="text-sm text-blue-700 mb-2">
                {"The solution is borrowed from physics: give the parameter a momentum "}<Latex math={"\\mathbf{p}"} />{" and let it move like a ball rolling on a surface. The surface\u2019s elevation at "}<Latex math={"\\boldsymbol{\\theta}"} />{" is "}<Latex math={"-\\log \\tilde{p}(\\boldsymbol{\\theta} \\mid \\mathbf{y})"} />
                {" \u2014 high posterior density corresponds to low elevation on this surface. The momentum carries the ball along the surface, past the mode, around curves, and across ridges, producing a distant proposal that stays in high-density regions."}
              </p>
              <p className="text-sm text-blue-700 font-semibold">

                </p>

                  <strong>{"Conservation:"}</strong>

function Slide84_WAICAndLOO() {
  const elpd = "\\widehat{\\text{elpd}}_{\\text{LOO}} = \\sum_{i=1}^n \\log \\hat{p}(y_i \\mid y_{-i})";
    const psisWeight = "\\hat{p}(y_i \\mid y_{-i}) \\approx \\frac{1}{\\sum_s w_s^{(i)}} \\sum_{s=1}^S w_s^{(i)}\\, p(y_i \\mid \\theta^{(s)})";
    const waic = "\\text{WAIC} = -2\\left(\\text{lppd} - p_{\\text{WAIC}}\\right)";

  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-3">
            <h1 className="text-3xl font-bold text-gray-800">WAIC and PSIS-LOO Cross-Validation</h1>

          </div>
    
          <div className="flex-1 grid grid-cols-2 gap-5">
            {/* Left: PSIS-LOO */}
            <div className="flex flex-col gap-3">
              <div className="bg-green-50 border-2 border-green-300 rounded-xl p-4">
                <h2 className="font-bold text-green-800 mb-2">PSIS-LOO (Preferred)</h2>
                <Latex math={elpd} display={true} />
                <p className="text-sm text-green-700 mt-2">
                  {"Approximate LOO-CV without refitting n models. Uses Pareto-smoothed importance sampling to reweight posterior draws:"}
                </p>
                <div className="bg-white rounded-lg p-2 mt-2 text-xs overflow-x-auto">
                  <Latex math={psisWeight} display={true} />
                </div>
              </div>
    
              <div className="bg-gray-900 text-gray-100 rounded-lg p-3 font-mono text-xs">
                <div className="text-green-400"># PSIS-LOO in ArviZ</div>
                <div><span className="text-blue-300">with</span> model:</div>
                <div>{"    "}idata.extend(</div>
                <div>{"        "}pm.compute_log_likelihood(idata))</div>
                <div>loo = az.loo(idata)</div>
                <div><span className="text-blue-300">print</span>(loo)</div>
              </div>
            </div>
    
            {/* Right: WAIC */}
            <div className="flex flex-col gap-3">
              <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">

    const savageDickey = "\\text{BF}_{01} = \\frac{p(\\theta_0 \\mid y, M_1)}{p(\\theta_0 \\mid M_1)}";

  return (
    <div className="h-full flex flex-col p-6">

    const getSectionForSlide = (slideIndex) => {
      const slideId = slideIndex + 1;
      const sortedSections = [...sections].sort((a, b) => b.startSlide - a.startSlide);
      return sortedSections.find(s => slideId >= s.startSlide);
    };
