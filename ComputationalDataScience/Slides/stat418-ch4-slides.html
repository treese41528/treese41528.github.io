    .border-red-300 { border-color: var(--red-300); }
    .border-red-400 { border-color: var(--red-400); }
    .border-rose-200 { border-color: var(--rose-200); }
    .border-rose-300 { border-color: var(--rose-300); }
    .border-pink-200 { border-color: var(--pink-200); }
    .border-pink-300 { border-color: var(--pink-300); }

    /* Semi-transparent borders */
    .border-white\/10 { border-color: rgb(255 255 255 / 0.1); }
    .border-white\/20 { border-color: rgb(255 255 255 / 0.2); }
    .border-white\/30 { border-color: rgb(255 255 255 / 0.3); }
    .border-blue-400\/30 { border-color: rgb(96 165 250 / 0.3); }
    .border-purple-400\/30 { border-color: rgb(192 132 252 / 0.3); }
    .border-purple-300\/30 { border-color: rgb(216 180 254 / 0.3); }
    .border-green-400\/30 { border-color: rgb(74 222 128 / 0.3); }
    .border-green-400\/50 { border-color: rgb(74 222 128 / 0.5); }
    .border-amber-400\/30 { border-color: rgb(251 191 36 / 0.3); }
    .border-pink-400\/30 { border-color: rgb(244 114 182 / 0.3); }
    .border-emerald-400\/30 { border-color: rgb(52 211 153 / 0.3); }
    .border-red-400\/30 { border-color: rgb(248 113 113 / 0.3); }
    .border-indigo-400\/30 { border-color: rgb(129 140 248 / 0.3); }
    .border-teal-400\/30 { border-color: rgb(45 212 191 / 0.3); }
    .border-violet-400\/30 { border-color: rgb(167 139 250 / 0.3); }
    .border-cyan-400\/30 { border-color: rgb(34 211 238 / 0.3); }

    /* ═══════════════════════════════════════════════════════════════════
       BORDER RADIUS
       ═══════════════════════════════════════════════════════════════════ */
    .rounded-none { border-radius: 0; }
    .rounded-sm { border-radius: 0.125rem; }
    .rounded { border-radius: 0.25rem; }
    .rounded-md { border-radius: 0.375rem; }
    .rounded-lg { border-radius: 0.5rem; }
    .rounded-xl { border-radius: 0.75rem; }
    .rounded-2xl { border-radius: 1rem; }
    .rounded-3xl { border-radius: 1.5rem; }
    .rounded-full { border-radius: 9999px; }
    .rounded-t { border-radius: 0.25rem 0.25rem 0 0; }
    .rounded-t-lg { border-radius: 0.5rem 0.5rem 0 0; }
    .rounded-t-xl { border-radius: 0.75rem 0.75rem 0 0; }
    .rounded-b { border-radius: 0 0 0.25rem 0.25rem; }
    .rounded-b-lg { border-radius: 0 0 0.5rem 0.5rem; }
    .rounded-b-xl { border-radius: 0 0 0.75rem 0.75rem; }
    .rounded-l { border-radius: 0.25rem 0 0 0.25rem; }
    .rounded-l-lg { border-radius: 0.5rem 0 0 0.5rem; }
    .rounded-r { border-radius: 0 0.25rem 0.25rem 0; }
    .rounded-r-lg { border-radius: 0 0.5rem 0.5rem 0; }

    /* ═══════════════════════════════════════════════════════════════════
       SHADOWS
       ═══════════════════════════════════════════════════════════════════ */
    .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .shadow { box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1); }
    .shadow-md { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
    .shadow-lg { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }
    .shadow-xl { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    .shadow-2xl { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
    .shadow-inner { box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05); }
    .shadow-none { box-shadow: none; }

    /* ═══════════════════════════════════════════════════════════════════
       OPACITY
       ═══════════════════════════════════════════════════════════════════ */
    .opacity-0 { opacity: 0; }
    .opacity-5 { opacity: 0.05; }
    .opacity-10 { opacity: 0.1; }
    .opacity-20 { opacity: 0.2; }
    .opacity-25 { opacity: 0.25; }
    .opacity-30 { opacity: 0.3; }
    .opacity-40 { opacity: 0.4; }
    .opacity-50 { opacity: 0.5; }
    .opacity-60 { opacity: 0.6; }
    .opacity-70 { opacity: 0.7; }
    .opacity-75 { opacity: 0.75; }
    .opacity-80 { opacity: 0.8; }
    .opacity-90 { opacity: 0.9; }
    .opacity-95 { opacity: 0.95; }
    .opacity-100 { opacity: 1; }

    /* ═══════════════════════════════════════════════════════════════════
       TRANSFORMS
       ═══════════════════════════════════════════════════════════════════ */
    .transform { transform: var(--tw-transform); }
    .translate-x-0 { transform: translateX(0); }
    .translate-y-0 { transform: translateY(0); }
    .-translate-x-1\/2 { transform: translateX(-50%); }
    .-translate-y-1\/2 { transform: translateY(-50%); }
    .translate-x-1\/2 { transform: translateX(50%); }
    .rotate-0 { transform: rotate(0deg); }
    .rotate-45 { transform: rotate(45deg); }
    .rotate-90 { transform: rotate(90deg); }
    .rotate-180 { transform: rotate(180deg); }
    .-rotate-45 { transform: rotate(-45deg); }
    .-rotate-90 { transform: rotate(-90deg); }
    .scale-75 { transform: scale(0.75); }
    .scale-90 { transform: scale(0.9); }
    .scale-95 { transform: scale(0.95); }
    .scale-100 { transform: scale(1); }
    .scale-105 { transform: scale(1.05); }
    .scale-110 { transform: scale(1.1); }
    .scale-125 { transform: scale(1.25); }
    .scale-150 { transform: scale(1.5); }

    /* ═══════════════════════════════════════════════════════════════════
       TRANSITIONS & ANIMATIONS
       ═══════════════════════════════════════════════════════════════════ */
    .transition-none { transition-property: none; }
    .transition-all { transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .transition-colors { transition: color 150ms, background-color 150ms, border-color 150ms, fill 150ms, stroke 150ms; }
    .transition-opacity { transition: opacity 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .transition-shadow { transition: box-shadow 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .transition-transform { transition: transform 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .duration-75 { transition-duration: 75ms; }
    .duration-100 { transition-duration: 100ms; }
    .duration-150 { transition-duration: 150ms; }
    .duration-200 { transition-duration: 200ms; }
    .duration-300 { transition-duration: 300ms; }
    .duration-500 { transition-duration: 500ms; }
    .ease-in { transition-timing-function: cubic-bezier(0.4, 0, 1, 1); }
    .ease-out { transition-timing-function: cubic-bezier(0, 0, 0.2, 1); }
    .ease-in-out { transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }

    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-bounce { animation: bounce-anim 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes bounce-anim { 0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); } 50% { transform: translateY(0); animation-timing-function: cubic-bezier(0,0,0.2,1); } }

    /* ═══════════════════════════════════════════════════════════════════
       FILTERS & EFFECTS
       ═══════════════════════════════════════════════════════════════════ */
    .backdrop-blur-sm { backdrop-filter: blur(4px); }
    .backdrop-blur { backdrop-filter: blur(8px); }
    .backdrop-blur-md { backdrop-filter: blur(12px); }
    .backdrop-blur-lg { backdrop-filter: blur(16px); }
    .blur-sm { filter: blur(4px); }
    .blur { filter: blur(8px); }
    .brightness-50 { filter: brightness(0.5); }
    .brightness-75 { filter: brightness(0.75); }
    .brightness-100 { filter: brightness(1); }
    .brightness-125 { filter: brightness(1.25); }
    .grayscale { filter: grayscale(100%); }
    .grayscale-0 { filter: grayscale(0); }

    /* ═══════════════════════════════════════════════════════════════════
       MISCELLANEOUS UTILITIES
       ═══════════════════════════════════════════════════════════════════ */
    .object-contain { object-fit: contain; }
    .object-cover { object-fit: cover; }
    .object-fill { object-fit: fill; }
    .object-center { object-position: center; }
    .cursor-pointer { cursor: pointer; }
    .cursor-default { cursor: default; }
    .cursor-not-allowed { cursor: not-allowed; }
    .select-none { user-select: none; }
    .select-text { user-select: text; }
    .select-all { user-select: all; }
    .pointer-events-none { pointer-events: none; }
    .pointer-events-auto { pointer-events: auto; }
    .resize-none { resize: none; }
    .list-none { list-style-type: none; }
    .list-disc { list-style-type: disc; }
    .list-decimal { list-style-type: decimal; }
    .list-inside { list-style-position: inside; }
    .list-outside { list-style-position: outside; }
    .appearance-none { appearance: none; }
    .outline-none { outline: 2px solid transparent; outline-offset: 2px; }

    /* ═══════════════════════════════════════════════════════════════════
       BUTTONS  --  Reset
       ═══════════════════════════════════════════════════════════════════ */
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }

    /* ═══════════════════════════════════════════════════════════════════
       CODE  --  Scoped to avoid bleeding into dark code blocks
       ═══════════════════════════════════════════════════════════════════ */
    code {
      font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
      background-color: #fef3c7;
      color: #92400e;
      padding: 0.125rem 0.25rem;
      border-radius: 0.25rem;
      font-size: 0.875em;
    }

    /* Reset code styling inside dark code block containers */
    [class*="bg-gray-900"] code,
    [class*="bg-gray-800"] code,
    [class*="bg-slate-900"] code,
    [class*="bg-slate-800"] code,
    [class*="bg-slate-700"] code,
    [class*="bg-black"] code {
      background-color: transparent;
      color: inherit;
      padding: 0;
      font-size: inherit;
    }

    pre { margin: 0; white-space: pre-wrap; word-break: break-word; }

    /* -- Image containment (prevents oversized images) -- */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* Inside flex containers, images must respect parent bounds */
    .flex-1 > img,
    .flex-1 img {
      max-height: 100%;
      object-fit: contain;
    }

    /* ═══════════════════════════════════════════════════════════════════
       TABLE DEFAULTS
       ═══════════════════════════════════════════════════════════════════ */
    table { border-collapse: collapse; }
    .table-auto { table-layout: auto; }
    .table-fixed { table-layout: fixed; }
    .border-collapse { border-collapse: collapse; }
    .border-separate { border-collapse: separate; }
    .border-spacing-0 { border-spacing: 0; }
    td, th { vertical-align: middle; }

    /* ═══════════════════════════════════════════════════════════════════
       HOVER / GROUP UTILITIES
       ═══════════════════════════════════════════════════════════════════ */
    .group:hover .group-hover\:opacity-100 { opacity: 1; }
    .group:hover .group-hover\:visible { visibility: visible; }
    .group:hover .group-hover\:text-white { color: #ffffff; }
    .group:hover .group-hover\:bg-white\/20 { background-color: rgb(255 255 255 / 0.2); }
    .hover\:bg-gray-100:hover { background-color: var(--gray-100); }
    .hover\:bg-gray-200:hover { background-color: var(--gray-200); }
    .hover\:bg-gray-700:hover { background-color: var(--gray-700); }
    .hover\:bg-blue-100:hover { background-color: var(--blue-100); }
    .hover\:bg-white\/10:hover { background-color: rgb(255 255 255 / 0.1); }
    .hover\:bg-white\/20:hover { background-color: rgb(255 255 255 / 0.2); }
    .hover\:text-blue-700:hover { color: var(--blue-700); }
    .hover\:text-white:hover { color: #ffffff; }
    .hover\:shadow-lg:hover { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .hover\:shadow-xl:hover { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .hover\:scale-105:hover { transform: scale(1.05); }
    .hover\:scale-102:hover { transform: scale(1.02); }
    .hover\:opacity-80:hover { opacity: 0.8; }
    .hover\:underline:hover { text-decoration: underline; }
    .hover\:no-underline:hover { text-decoration: none; }

    /* ═══════════════════════════════════════════════════════════════════
       SLIDE CONTAINER
       ═══════════════════════════════════════════════════════════════════ */
    .slide-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--gray-100);
    }

    .slide-header {
      background: var(--purdue-black);
      color: white;
      padding: 0.5rem 1rem;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-title .purdue { font-weight: 700; font-size: 1.125rem; }
    .header-title .course { color: var(--purdue-gold); font-size: 1rem; }

    .header-slide-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .slide-counter {
      color: var(--purdue-gold);
      font-family: monospace;
      font-size: 1rem;
    }

    .current-section {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(206, 184, 136, 0.2);
      padding: 0.25rem 0.75rem;
      border-radius: 0.375rem;
    }

    .current-section .icon { font-size: 1rem; }
    .current-section .name { color: var(--purdue-gold); font-size: 0.875rem; }

    /* ═══════════════════════════════════════════════════════════════════
       PROGRESS BAR  --  ACCESSIBLE
       ═══════════════════════════════════════════════════════════════════ */
    .progress-container {
      position: relative;
      width: 100%;
      padding: 0.5rem 0;
    }

    .section-labels {
      display: flex;
      margin-bottom: 0.5rem;
    }

    .section-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: all 0.3s ease;
      cursor: pointer;
      border-radius: 0.25rem;
    }

    .section-label.active { color: #fcd34d; }
    .section-label.completed { color: #86efac; }
    .section-label.future { color: #94a3b8; }
    .section-label:hover {
      color: var(--purdue-gold);
      background: rgba(255,255,255,0.1);
    }

    .progress-sections {
      display: flex;
      gap: 4px;
      height: 20px;
      align-items: flex-end;
    }

    .section-group {
      display: flex;
      gap: 1px;
      border-radius: 3px;
      overflow: hidden;
      transition: all 0.3s ease;
      position: relative;
    }

    .section-group.active {
      box-shadow: 0 0 0 2px var(--amber-400), 0 0 12px rgba(251, 191, 36, 0.4);
    }

    .slide-bar {
      min-width: 6px;
      flex: 1;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .slide-bar.current {
      height: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #e2e8f0 100%);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 20px rgba(251, 191, 36, 0.5);
      border-radius: 2px;
      z-index: 5;
    }

    .slide-bar.active-past { height: 14px; background: linear-gradient(180deg, var(--amber-400) 0%, var(--amber-600) 100%); }
    .slide-bar.active-past:hover, .slide-bar.active-past:focus-visible { height: 16px; background: linear-gradient(180deg, #fcd34d 0%, var(--amber-500) 100%); }
    .slide-bar.active-future { height: 10px; background: linear-gradient(180deg, var(--amber-700) 0%, var(--amber-800) 100%); }
    .slide-bar.active-future:hover, .slide-bar.active-future:focus-visible { height: 14px; background: linear-gradient(180deg, var(--amber-500) 0%, var(--amber-600) 100%); }
    .slide-bar.completed { height: 12px; background: linear-gradient(180deg, var(--green-400) 0%, var(--emerald-600) 100%); }
    .slide-bar.completed:hover, .slide-bar.completed:focus-visible { height: 14px; background: linear-gradient(180deg, #86efac 0%, var(--emerald-500) 100%); }
    .slide-bar.future { height: 8px; background: linear-gradient(180deg, var(--slate-500) 0%, var(--slate-600) 100%); }
    .slide-bar.future:hover, .slide-bar.future:focus-visible { height: 12px; background: linear-gradient(180deg, var(--slate-400) 0%, var(--slate-500) 100%); }

    .slide-bar::before {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: var(--slate-900);
      color: white;
      padding: 0.375rem 0.625rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.15s ease;
      pointer-events: none;
      z-index: 30;
    }

    .slide-bar:hover::before, .slide-bar:focus-visible::before {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .current-indicator {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: var(--amber-400);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--amber-400);
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-3px); }
    }

    .section-progress-text {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 700;
      color: #fcd34d;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .section-group.active .section-progress-text { opacity: 1; }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      font-size: 0.75rem;
    }

    .progress-counter {
      font-family: monospace;
      font-weight: 700;
      color: #fcd34d;
      background: var(--slate-800);
      padding: 0.25rem 0.625rem;
      border-radius: 0.25rem;
    }

    .progress-legend {
      display: flex;
      gap: 1rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: #cbd5e1;
      font-size: 0.75rem;
    }

    .legend-bar { width: 12px; border-radius: 2px; }
    .legend-bar.completed { height: 10px; background: var(--green-400); }
    .legend-bar.active { height: 12px; background: var(--amber-400); }
    .legend-bar.current { height: 14px; background: white; box-shadow: 0 0 4px rgba(255,255,255,0.5); }
    .legend-bar.future { height: 6px; background: var(--slate-500); }

    /* ═══════════════════════════════════════════════════════════════════
       SLIDE CONTENT
       ═══════════════════════════════════════════════════════════════════ */
    .slide-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      justify-content: center;
    }

    .slide-wrapper {
      width: 100%;
      max-width: 1400px;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      padding: 2rem 2.5rem;
      min-height: calc(100vh - 180px);
      display: flex;
      flex-direction: column;
    }

    .slide-wrapper > *:first-child { background-color: white; }

    .slide-wrapper > *:first-child[class*="bg-gradient"],
    .slide-wrapper > *:first-child[class*="bg-gray-900"],
    .slide-wrapper > *:first-child[class*="bg-slate-900"],
    .slide-wrapper > *:first-child[class*="bg-slate-800"],
    .slide-wrapper > *:first-child[class*="bg-black"] {
      background-color: transparent;
    }

    /* ═══════════════════════════════════════════════════════════════════
       NAVIGATION  --  ACCESSIBLE
       ═══════════════════════════════════════════════════════════════════ */
    .slide-nav {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.95);
      padding: 0.75rem;
      border-radius: 0.75rem;
      z-index: 100;
    }

    .slide-nav button {
      width: 3rem;
      height: 3rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.25rem;
      transition: background 0.2s;
      min-width: 44px;  /* WCAG touch target */
      min-height: 44px;
    }

    .slide-nav button:hover:not(:disabled),
    .slide-nav button:focus-visible:not(:disabled) {
      background: var(--gray-700);
    }

    .nav-divider {
      width: 1px;
      height: 2.5rem;
      background: var(--gray-600);
      align-self: center;
    }

    /* ═══════════════════════════════════════════════════════════════════
       HELP MODAL
       ═══════════════════════════════════════════════════════════════════ */
    .help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .help-content {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .help-content h2 { margin-bottom: 1.5rem; }

    .help-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.75rem 1rem;
      font-size: 1rem;
      align-items: center;
    }

    .help-key {
      font-family: monospace;
      background: var(--gray-100);

    function LiveAnnouncer({ message, priority = 'polite' }) {
      return (
        <div

    // ACCESSIBILITY: FOCUS TRAP FOR MODALS
    // ═══════════════════════════════════════════════════════════════════
    function useFocusTrap(isActive, containerRef) {
      useEffect(() => {
        if (!isActive || !containerRef.current) return;
        
        const container = containerRef.current;
        const focusableElements = container.querySelectorAll(
          'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
        );
        const firstElement = focusableElements[0];
        const lastElement = focusableElements[focusableElements.length - 1];
        
        firstElement?.focus();
        
        const handleKeyDown = (e) => {
          if (e.key !== 'Tab') return;
          
          if (e.shiftKey) {
            if (document.activeElement === firstElement) {
              e.preventDefault();
              lastElement?.focus();
            }
          } else {
            if (document.activeElement === lastElement) {
              e.preventDefault();
              firstElement?.focus();
            }
          }
        };
        
        container.addEventListener('keydown', handleKeyDown);
        return () => container.removeEventListener('keydown', handleKeyDown);
      }, [isActive, containerRef]);
    }

                    <td className="p-2.5">Delta method; linear approximation breaks down when <Latex math="\bar{Y} \approx 0" /></td>
                    <td className="p-2.5">Same formula: <Latex math="\text{sd}(\hat{\theta}^*_b)" /></td>

                the same regardless of the statistic. Each row in the analytical column requires a

              </p>
            </div>
          </div>
        </div>
  );
}

function Slide32_BootstrapBias() {
  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-2xl font-bold text-gray-800">Bootstrap Bias Estimation</h1>

          </div>
    
          <div className="flex-1 flex flex-col gap-3 min-h-0">
    
            {/* Row 1: What is bias + bootstrap estimate */}
            <div className="grid grid-cols-2 gap-3">
              {/* What is bias */}
              <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-4">
                <h3 className="font-bold text-blue-800 text-sm mb-2">What is Bias?</h3>
                <p className="text-sm text-blue-700 mb-2">
                  An estimator <Latex math="\hat{\theta}" /> is biased if, on average across repeated
                  samples, it systematically over- or under-shoots the true parameter:
                </p>
                <div className="bg-white/70 rounded p-2">
                  <Latex math="\text{Bias}_F(\hat{\theta}) = \mathbb{E}_F[\hat{\theta}] - \theta" display={true} />
                </div>
                <p className="text-xs text-blue-600 mt-2">
                  We rarely know this exactly -- it depends on the unknown <Latex math="F" />.
                </p>
              </div>
    
              {/* Bootstrap estimate */}
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-4">
                <h3 className="font-bold text-emerald-800 text-sm mb-2">Bootstrap Estimate of Bias</h3>
                <p className="text-sm text-emerald-700 mb-2">
                  Apply the plug-in principle: replace <Latex math="F" /> with <Latex math="\hat{F}_n" />,
                  <Latex math="\theta" /> with <Latex math="\hat{\theta}" />, and <Latex math="\mathbb{E}_F" /> with the bootstrap mean:
                </p>
                <div className="bg-white/70 rounded p-2">
                  <Latex math="\widehat{\text{Bias}}_{\text{boot}} = \bar{\theta}^* - \hat{\theta}" display={true} />
                </div>
                <p className="text-xs text-emerald-600 mt-2">
                  If <Latex math="\bar{\theta}^* > \hat{\theta}" />: overshoots on average.
                  If <Latex math="\bar{\theta}^* < \hat{\theta}" />: undershoots.
                </p>
              </div>
            </div>
    
            {/* Row 2: Correction + When to correct */}
            <div className="grid grid-cols-2 gap-3">
              {/* Bias-corrected estimator */}
              <div className="bg-purple-50 border border-purple-200 rounded-lg p-4">
                <h3 className="font-bold text-purple-800 text-sm mb-2">Bias-Corrected Estimator</h3>
                <p className="text-sm text-purple-700 mb-2">
                  Subtract the estimated bias to reduce the systematic error (note: the correction is itself approximate since <Latex math="\widehat{\text{Bias}}" /> estimates, not equals, the true bias):
                </p>
                <div className="bg-white/70 rounded p-2 mb-2">
                  <Latex math="\hat{\theta}^{\,bc} = \hat{\theta} - \widehat{\text{Bias}} = 2\hat{\theta} - \bar{\theta}^*" display={true} />
                </div>
                <div className="bg-amber-50 border border-amber-200 rounded p-2">
                  <p className="text-xs text-amber-800">
                    <strong>{"⚠️"} Tradeoff:</strong> correction reduces bias but adds variance
                    (since <Latex math="\bar{\theta}^*" /> is itself noisy). Only correct when
                    the reduction in bias outweighs the increase in variance.
                  </p>
                  <p className="text-xs text-red-700 mt-1.5">
                    <strong>Scope:</strong> this corrects the mathematical bias of a <em>statistic</em> (e.g.,
                    plug-in variance dividing by <Latex math="n" /> instead of <Latex math="n{-}1" />).
                    It cannot fix biases in study design -- selection bias, confounding, or measurement error
                    are problems no amount of resampling can address.
                  </p>
                </div>
              </div>
    
              {/* When to correct */}
              <div className="bg-gray-50 border border-gray-200 rounded-lg p-4">
                <h3 className="font-bold text-gray-800 text-sm mb-2">When to Correct: the Ratio Test</h3>
                <p className="text-sm text-gray-700 mb-2">

                </p>
                <div className="bg-white/70 rounded p-2 mb-3">
                  <Latex math="R = \frac{|\widehat{\text{Bias}}_{\text{boot}}|}{\widehat{\text{SE}}_{\text{boot}}}" display={true} />
                </div>
                <div className="space-y-1.5 text-sm text-gray-700">
                  <div className="flex items-center gap-3 bg-green-50 rounded p-2">
                    <span className="font-mono text-green-700 font-bold w-24 flex-shrink-0"><Latex math="R < 0.25" /></span>
                    <span>Bias negligible -- do not correct</span>
                  </div>
                  <div className="flex items-center gap-3 bg-amber-50 rounded p-2">
                    <span className="font-mono text-amber-700 font-bold w-24 flex-shrink-0"><Latex math="R \approx 0.5" /></span>
                    <span>Borderline -- report both estimates</span>
                  </div>
                  <div className="flex items-center gap-3 bg-red-50 rounded p-2">
                    <span className="font-mono text-red-700 font-bold w-24 flex-shrink-0"><Latex math="R > 1" /></span>
                    <span>Substantial bias -- correction likely helps</span>
                  </div>
                </div>
              </div>
            </div>
    
            {/* Row 3: Examples with clear targets */}
            <div className="flex-1 min-h-0 bg-white border-2 border-gray-200 rounded-lg overflow-hidden">
              <table className="w-full text-sm h-full">
                <thead>
                  <tr>
                    <th className="bg-gray-700 text-white p-2.5 text-left font-bold" style={{ width: '20%' }}>Estimator</th>
                    <th className="bg-gray-700 text-white p-2.5 text-left font-bold" style={{ width: '20%' }}>Target</th>
                    <th className="bg-gray-700 text-white p-2.5 text-left font-bold" style={{ width: '35%' }}>Why biased</th>
                    <th className="bg-gray-700 text-white p-2.5 text-left font-bold" style={{ width: '25%' }}>Bias</th>
                  </tr>
                </thead>
                <tbody>
                  <tr className="border-b border-gray-200">
                    <td className="p-2.5 font-semibold"><Latex math="\frac{1}{n}\sum(x_i - \bar{x})^2" /></td>
                    <td className="p-2.5"><Latex math="\sigma^2" /></td>
                    <td className="p-2.5">Plug-in uses <Latex math="n" /> not <Latex math="n{-}1" />; nonlinear functional (Slide 19)</td>
                    <td className="p-2.5"><Latex math="-\sigma^2/n" /> (exact); Michelson: <Latex math="-61.8" /></td>
                  </tr>
                  <tr className="border-b border-gray-200 bg-gray-50">
                    <td className="p-2.5 font-semibold"><Latex math="\bar{X}/\bar{Y}" /></td>
                    <td className="p-2.5"><Latex math="\mu_X / \mu_Y" /></td>
                    <td className="p-2.5">Ratio of random variables: <Latex math="\mathbb{E}[\bar{X}/\bar{Y}] \neq \mu_X/\mu_Y" /> by Jensen's inequality</td>
                    <td className="p-2.5"><Latex math="O(1/n)" />, worst when <Latex math="\text{CV}(\bar{Y})" /> is large</td>
                  </tr>
                  <tr>
                    <td className="p-2.5 font-semibold"><Latex math="e^{\bar{X}}" /></td>
                    <td className="p-2.5"><Latex math="e^{\mu}" /></td>
                    <td className="p-2.5">Convex transform: Jensen gives <Latex math="\mathbb{E}[e^{\bar{X}}] > e^{\mu}" /></td>
                    <td className="p-2.5">Upward; <Latex math="\approx e^{\mu}\sigma^2/(2n)" /></td>
                  </tr>
                </tbody>
              </table>
            </div>
    
            {/* Real-data check (morley) */}
            <p className="flex-shrink-0 text-[11px] text-gray-600 leading-snug">
              <strong>Real-data check (Michelson speed-of-light, <Latex math="n=100" />):</strong> plug-in
              variance <Latex math="= 6180" />, so the bias is <Latex math="-\sigma^2/n = -61.8" /> (known
              exactly); the bootstrap (<Latex math="B=10{,}000" />) recovers it with <Latex math="\widehat{\text{SE}} \approx 917" />,
              giving <Latex math="R = |\widehat{\text{Bias}}|/\widehat{\text{SE}} \approx 0.07" /> — negligible, so do <em>not</em> correct.
            </p>
          </div>
        </div>
  );
}

function Slide33_BootstrapCIs() {
  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-2xl font-bold text-gray-800">Bootstrap Confidence Intervals</h1>

          </div>
    
          <div className="flex-1 flex flex-col gap-3 min-h-0">

                <strong>Computing quantiles from bootstrap replicates:</strong> Sort the <Latex math="B" /> values{' '}
                <Latex math="\hat{\theta}^*_{(1)} \leq \cdots \leq \hat{\theta}^*_{(B)}" />. The{' '}
                <Latex math="p" />-quantile is <Latex math="Q_p = \hat{\theta}^*_{(\lceil pB \rceil)}" />.{' '}
                For a 95% CI with <Latex math="B = 5{,}000" />: <Latex math="Q_{0.025} = \hat{\theta}^*_{(125)}" /> and{' '}
                <Latex math="Q_{0.975} = \hat{\theta}^*_{(4875)}" />.{' '}
                In Python: <code className="bg-gray-200 px-1 rounded text-xs">np.percentile(theta_star, [2.5, 97.5])</code>.
              </p>
            </div>
    
            {/* Three method cards */}
            <div className="grid grid-cols-3 gap-3">
              {/* Percentile */}
              <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-3">
                <div className="flex items-center gap-2 mb-2">
                  <div className="bg-blue-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold">1</div>
                  <h3 className="font-bold text-blue-800 text-sm">Percentile</h3>
                </div>
                <p className="text-xs text-blue-700 mb-2">
                  Cut off the tails of the bootstrap distribution. The middle <Latex math="(1{-}\alpha)" />{' '}
                  of bootstrap replicates defines the interval:
                </p>
                <div className="bg-white/70 rounded p-2 text-center">
                  <Latex math="\bigl[Q_{\alpha/2},\;\; Q_{1-\alpha/2}\bigr]" display={true} />
                </div>
                <div className="mt-2 space-y-1 text-xs">
                  <p className="text-green-700">{"✓"} Simplest; respects skewness</p>
                  <p className="text-green-700">{"✓"} Transformation invariant</p>
                  <p className="text-red-600">{"✗"} Can drift with bias</p>
                </div>
              </div>
    
              {/* Basic */}
              <div className="bg-purple-50 border-2 border-purple-300 rounded-lg p-3">
                <div className="flex items-center gap-2 mb-2">
                  <div className="bg-purple-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold">2</div>
                  <h3 className="font-bold text-purple-800 text-sm">Basic (Pivotal)</h3>
                </div>
                <p className="text-xs text-purple-700 mb-2">
                  Use the bootstrap to approximate the distribution of <Latex math="\hat{\theta} - \theta" />,{' '}
                  then invert. Endpoints are <em>reflected</em> around <Latex math="\hat{\theta}" />:
                </p>
                <div className="bg-white/70 rounded p-2 text-center">

              <div className="bg-teal-50 border-2 border-teal-300 rounded-lg p-3">

              </p>

                <div className="bg-gray-50 rounded p-3 mb-3">

                <div className="text-sm text-gray-700 space-y-2">
                  <p>
                    <Latex math="\hat{Y}_i = \mathbf{x}_i^\top\hat{\boldsymbol{\beta}}" />: the model's prediction
                    at observation <Latex math="i" />. This stays fixed across resamples.
                  </p>
                  <p>
                    <Latex math="\tilde{e}_i" />: the centred residual at observation <Latex math="i" />.{' '}
                    It estimates how large the error was at this specific X value.
                  </p>
                  <p>
                    <Latex math="v_i" />: a random sign flip. With probability <Latex math="1/2" />,{' '}
                    the residual is added as-is; with probability <Latex math="1/2" />, it is negated.
                  </p>
                  <p className="text-xs text-gray-500 italic">

                    direction is randomized (creating a new dataset).

                <pre className="text-xs leading-relaxed text-gray-200">{`import numpy as np
    import statsmodels.api as sm
    
    # Fit original model
    model = sm.OLS(Y, X).fit()
    Y_hat = model.fittedvalues
    e_tilde = model.resid - model.resid.mean()
    
    rng = np.random.default_rng(42)
    B = 5000
    beta_star = np.empty((B, X.shape[1]))
    
    for b in range(B):
        # Rademacher: +1 or -1 with prob 1/2
        v = rng.choice([-1, 1], size=n)
    
        # New response: fitted + flipped residual
        Y_star = Y_hat + v * e_tilde
    
        # Refit with SAME X
        beta_star[b] = sm.OLS(Y_star, X).fit().params
    
    se_wild = np.std(beta_star, ddof=1, axis=0)`}</pre>

                      <strong>Rademacher</strong> distribution:
                    </p>
                    <div className="bg-white/70 rounded p-2 my-1">

                    </div>
                    <p>

                    </p>
                  </div>
                </div>

                  <p><span className="text-cyan-300">for</span> b = 1, ..., B:</p>
                  <p className="pl-5"><span className="text-yellow-300">a.</span>{' '}
                    <span className="text-green-300">Simulate</span>{' '}
                    <Latex math="x^*_{1:n} \stackrel{\text{iid}}{\sim} F_{\hat{\theta}}" />{' '}
                    <span className="text-gray-500"># fresh data from model</span></p>
                  <p className="pl-5"><span className="text-yellow-300">b.</span>{' '}
                    <Latex math="\hat{T}^*_b = T(x^*_{1:n})" /></p>
                  <p><span className="text-yellow-300">3.</span> Return <Latex math="\{\hat{T}^*_1, \ldots, \hat{T}^*_B\}" /></p>
                </div>

                    <p className="text-blue-700"><strong>NP:</strong>{' '}
                      <code className="bg-blue-100 px-1 rounded">rng.integers(0, n, n)</code></p>
                    <p className="text-indigo-700"><strong>P:</strong>{' '}
                      <code className="bg-indigo-100 px-1 rounded">rng.lognormal(mu, sig, n)</code></p>

                  <h3 className="font-bold text-amber-800 text-xs mb-1">Simulation cost</h3>
                  <p className="text-xs text-amber-700">
                    Standard distributions: as fast as resampling. Complex models (mixed effects,
                    copulas): generating one dataset can itself be expensive.
                  </p>
                </div>
              </div>
            </div>
    
            {/* Row 2: The real example */}
            <div className="grid grid-cols-2 gap-3 flex-1 min-h-0">

                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                  <h3 className="font-semibold text-blue-800 text-sm mb-1">
                    Simulated example: 99th percentile of a lognormal
                  </h3>
                  <p className="text-xs text-blue-700">
                    A simulated pollutant-monitoring setting: <Latex math="n = 40" /> draws from a{' '}
                    <strong>known</strong> lognormal (ppm) -- lognormals are well-established for
                    concentrations. Simulating from a known model is what lets us check which bootstrap
                    actually covers the true 99th percentile, the kind of upper-percentile that drives
                    regulatory limits.
                  </p>
                  <p className="text-xs text-blue-700 mt-1">
                    <strong>The problem:</strong> sample max = 41.0 ppm, but the true 99th percentile may
                    be higher. The nonparametric bootstrap <em>cannot produce values above 41.0</em>.
                  </p>

                <div className="bg-slate-800 text-white rounded-xl p-3 font-mono text-xs flex-1 overflow-hidden">

    x = rng.lognormal(2.0, 0.8, size=40) # ppm
    
    # Fit lognormal by MLE
    from scipy import stats
    sig_hat, _, scale_hat = stats.lognorm.fit(
        x, floc=0)  # floc=0: no location shift
    mu_hat = np.log(scale_hat)
    # sig_hat=0.652 (shape), mu_hat=2.031
    
    # Parametric bootstrap for 99th percentile
    B = 5000
    q99_star = np.empty(B)
    for b in range(B):
        xs = rng.lognormal(mu_hat, sig_hat, 40)
        s_b, _, sc_b = stats.lognorm.fit(xs, floc=0)
        q99_star[b] = stats.lognorm.ppf(0.99,
                          s=s_b, scale=sc_b)
    
    ci = np.quantile(q99_star, [0.025, 0.975])`}</pre>
                </div>

                        <th className="text-left p-1.5 text-emerald-700">Percentile CI for <Latex math="Q_{0.99}" /></th>
                        <th className="text-left p-1.5 text-emerald-700">Covers truth?</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr className="border-t border-emerald-200">
                        <td className="p-1.5 font-semibold text-indigo-700">Parametric</td>
                        <td className="p-1.5 font-mono">[23.1, 50.6]</td>
                        <td className="p-1.5 text-green-600 font-bold">Yes</td>
                      </tr>
                      <tr className="border-t border-emerald-200">
                        <td className="p-1.5 font-semibold text-blue-700">Nonparametric</td>
                        <td className="p-1.5 font-mono">[17.2, <span className="text-red-600 font-bold">41.0</span>]</td>
                        <td className="p-1.5 text-red-600 font-bold">No (capped)</td>
                      </tr>
                    </tbody>
                  </table>
                  <p className="text-[10px] text-emerald-600 mt-1">
                    True <Latex math="Q_{0.99} = 47.5" /> ppm. Sample max = 41.0 ppm.
                  </p>
                </div>
    
                <div className="bg-red-50 border-2 border-red-300 rounded-lg p-3">
                  <h3 className="font-bold text-red-800 text-sm mb-2">Why nonparametric fails here</h3>
                  <p className="text-sm text-red-700">
                    The nonparametric bootstrap resamples from the <Latex math="n = 40" /> observed values.{' '}
                    The 99th percentile of any resample is bounded by the sample maximum (41.0 ppm).{' '}
                    The true 99th percentile (47.5 ppm) is above the sample max -- the nonparametric
                    CI <strong>cannot contain the true value</strong>.
                  </p>
                </div>
    
                <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 flex-1">
                  <h3 className="font-bold text-indigo-800 text-sm mb-2">Why parametric works</h3>
                  <p className="text-sm text-indigo-700">
                    The fitted lognormal has a tail that extends beyond the observed data.{' '}
                    Each parametric resample draws fresh values from this tail, producing 99th
                    percentiles that can exceed 41.0.{' '}
                    This is exactly the extrapolation the nonparametric bootstrap cannot do --
                    and exactly the reason to trust a parametric model when domain knowledge supports it.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
  );
}

                  <p className="font-semibold text-blue-800">Independence: <Latex math="H_0\!: X \perp Y" /></p>
                  <p>
                    Permute <Latex math="Y" /> while keeping <Latex math="X" /> fixed (permutation test).
                    This breaks any association while preserving the marginal distributions.
                  </p>
                </div>
              </div>
              <p className="text-xs text-blue-600 mt-2">
                <strong>Common thread:</strong> make <Latex math="H_0" /> true of the transformed
                data while preserving everything else (spread, shape, dependence structure not
                constrained by <Latex math="H_0" />).
              </p>
            </div>
          </div>
        </div>
  );
}

              <Latex math="Y_1, \ldots, Y_n \sim F_Y" />, consider

                  statistic</strong> is the maximum vertical gap between the two empirical CDFs:
                </p>
                <div className="bg-white/80 rounded-lg p-2">

                </p>
                <div className="bg-white/80 rounded-lg p-2">
                  <Latex math="H_0\!: F_X = F_Y \quad \text{vs} \quad H_1\!: F_X \neq F_Y" display={true} />

                <p className="mt-2">

                </p>
              </div>
              <div className="text-sm text-amber-700">
                <p className="font-semibold mb-1">So why use KS?</p>
                <p>
                  Running a t-test + Levene test is two tests on the same data. Even in this
                  case, where the tests are nearly independent (one targets means, the other
                  variances), the family-wise error rate increases. In general, multiple tests
                  require corrections (Bonferroni or similar), and the number of tests grows
                  if you also check skewness, tails, or modality.
                  The KS test is a single omnibus test at one <Latex math="\alpha" />,
                  no correction needed, at the cost of less power for any specific alternative.
                </p>
                <p className="mt-2">
                  In practice: use targeted tests (t, Levene) when you have a specific hypothesis;
                  use KS as an omnibus check when you do not.
                </p>
              </div>
            </div>
          </div>
    
          {/* KS test */}
          <div className="bg-green-50 border-2 border-green-300 rounded-lg p-3">
            <h3 className="font-bold text-green-800 text-sm mb-2">
              Permutation KS test
              (<Latex math="H_0\!: F_X = F_Y" /> vs <Latex math="H_1\!: F_X \neq F_Y" />)
            </h3>
            <div className="grid grid-cols-2 gap-4">
              <div className="text-sm text-green-700">
                <p className="mb-2">
                  Pool all 120 observations, permute group labels <Latex math="B = 10{,}000" />{' '}
                  times, compute <Latex math="D^*_b = \sup_x|\hat{F}^*_m(x) - \hat{F}^*_n(x)|" />{' '}
                  for each permutation:
                </p>
                <p>
                  <Latex math="D_{\text{obs}} = 0.317" />. The different spreads push the ECDFs
                  apart -- Y's ECDF rises more slowly in the center (spread out) while X's ECDF
                  rises steeply (concentrated).
                </p>
              </div>
              <div className="bg-slate-900 text-white rounded-lg p-2 font-mono text-xs">
                <p className="text-gray-400 not-italic text-[10px] mb-1">
                  Permutation null distribution of <Latex math="D^*" />:
                </p>
                <div className="space-y-0.5 leading-snug">
                  <p><span className="text-gray-500">P25  = </span>0.117</p>
                  <p><span className="text-gray-500">P50  = </span>0.150</p>
                  <p><span className="text-gray-500">P75  = </span>0.183</p>
                  <p><span className="text-gray-500">P90  = </span>0.217</p>
                  <p><span className="text-gray-500">P95  = </span>0.233</p>
                  <p><span className="text-gray-500">P99  = </span>0.283</p>
                  <p className="text-yellow-300 font-bold">P99.6 = 0.317  {"<-- D_obs"}</p>
                  <p><span className="text-gray-500">Max  = </span>0.417</p>
                </div>
                <div className="mt-1.5 pt-1.5 border-t border-gray-700">
                  <p><span className="text-gray-400"># with </span><Latex math="D^* \geq 0.317" /><span className="text-gray-400">: </span><span className="text-green-300 font-bold">38</span><span className="text-gray-500"> of 10,000</span></p>
                  <p className="text-green-300 font-bold mt-0.5">p = (38+1)/(10000+1) = 0.004</p>
                </div>
              </div>
            </div>
          </div>
    
          {/* Lesson */}
          <div className="bg-purple-50 border-2 border-purple-300 rounded-lg p-3">
            <p className="text-sm text-purple-700">
              <strong>Lesson:</strong> the t-test and KS test answer different questions.
              The t-test correctly finds no mean difference. The KS test correctly finds a
              distributional difference. Neither test is wrong -- they are testing different
              hypotheses. The question "are these distributions the same?" cannot be answered
              by any test that only examines means.
            </p>
          </div>
    
          {/* Alternative statistics + power caveat */}
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
            <h3 className="font-bold text-blue-800 text-sm mb-2">Alternative distributional test statistics</h3>
            <p className="text-sm text-blue-700 mb-2">
              All use the same permutation procedure -- only the statistic changes.
              The choice matters because "omnibus" does not mean "equally powerful against
              all alternatives":
            </p>
            <div className="grid grid-cols-3 gap-3 text-sm text-blue-700">
              <div className="bg-white/70 rounded p-2">
                <p className="font-semibold">KS (<Latex math="\sup" /> norm)</p>
                <p>
                  Maximum gap between ECDFs. Strong for location and spread shifts where ECDFs
                  separate over a wide range. <strong>Weak for pure tail/kurtosis differences</strong>{' '}
                  -- few observations in the tails make the gap small and noisy
                  (needs <Latex math="n \approx 1{,}000" /> to detect a 3:1 kurtosis ratio).
                </p>
              </div>
              <div className="bg-white/70 rounded p-2">
                <p className="font-semibold">Cramer-von Mises (<Latex math="L^2" /> norm)</p>
                <p>
                  <Latex math="\int(\hat{F}_m - \hat{F}_n)^2" />. Integrates the squared gap
                  over the entire range, so small consistent differences accumulate. More powerful
                  than KS when ECDFs differ slightly everywhere rather than strongly at one point.
                </p>
              </div>
              <div className="bg-white/70 rounded p-2">
                <p className="font-semibold">Anderson-Darling (weighted <Latex math="L^2" />)</p>
                <p>
                  Up-weights the tails, where kurtosis and heavy-tail differences appear.
                  Better than KS for tail differences, but still limited by the fundamental
                  problem: few observations are in the tails regardless of weighting.
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

function FStep63({ number, children }) {
  return (
    <div className="flex gap-2 items-start">

function Slide63_RegressionTest() {
  return (
    <div className="flex flex-col p-6 gap-3">
          <div className="flex-shrink-0">
            <h1 className="text-2xl font-bold text-gray-800">
              Bootstrap Tests for Regression Coefficients
            </h1>
            <p className="text-gray-600 text-sm">
              Build data where the tested predictors have no effect, fit the full
              model, see how extreme the test statistic gets by chance
            </p>
          </div>
    
          {/* Why not permute */}
          <div className="bg-red-50 border border-red-200 rounded-lg px-3 py-2">
            <p className="text-sm text-red-700">
              <strong>Why not permute?</strong>{' '}
              Testing <Latex math="H_0\!: \beta_j = 0" /> does not make
              observations exchangeable. Under <Latex math="H_0" />,{' '}
              <Latex math="Y_i" /> still depends on the other predictors{' '}
              <Latex math="X_{-j}" /> through their coefficients.
              Permuting <Latex math="Y" /> across observations with different{' '}
              <Latex math="X_{-j}" /> values destroys the structure
              that <Latex math="H_0" /> preserves.
            </p>
          </div>
    
          {/* Two procedures side by side */}
          <div className="grid grid-cols-2 gap-3">
    
            {/* Procedure 1: Single coefficient */}
            <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
              <h3 className="font-bold text-emerald-800 text-sm mb-2">
                Testing <Latex math="H_0\!: \beta_j = 0" /> (single coefficient)
              </h3>
              <div className="space-y-2">
                <Step63 number="1">
                  Fit the <strong>full</strong> model to <Latex math="(X, Y)" />.
                  Compute the observed test statistic:{' '}
                  <Latex math="t_{\text{obs}} = \hat{\beta}_j \,/\, \text{SE}(\hat{\beta}_j)" />.
                </Step63>
                <Step63 number="2">
                  Fit the <strong>restricted</strong> model (drop column{' '}
                  <Latex math="j" /> from <Latex math="X" />).
                  Record fitted values <Latex math="\hat{Y}_{-j} = X_{-j}\hat{\boldsymbol{\beta}}_{-j}" />{' '}
                  and restricted residuals{' '}
                  <Latex math="\tilde{e}_i = Y_i - \hat{Y}_{-j,i}" />.
                </Step63>
                <Step63 number="3">
                  Resample <Latex math="\tilde{e}^*_1, \ldots, \tilde{e}^*_n" />{' '}
                  from the restricted residuals (with replacement, or wild multiply).
                </Step63>
                <Step63 number="4">
                  Construct <Latex math="Y^*_i = \hat{Y}_{-j,i} + \tilde{e}^*_i" />.
                  Predictor <Latex math="j" /> had no influence
                  on <Latex math="Y^*" />.
                </Step63>
                <Step63 number="5">
                  Fit the <strong>full</strong> model
                  to <Latex math="(X, Y^*)" />.
                  Compute <Latex math="t^*_b = \hat{\beta}^*_j \,/\, \text{SE}(\hat{\beta}^*_j)" />.
                </Step63>
                <Step63 number="6">
                  Repeat steps 3{"\u2013"}5 for <Latex math="b = 1, \ldots, B" />.
                </Step63>
                <Step63 number="7">
                  <Latex math="\hat{p} = \dfrac{\#\{|t^*_b| \geq |t_{\text{obs}}|\}+1}{B+1}" display={true} />
                  Two-sided because <Latex math="t" /> can be positive or negative.
                </Step63>
              </div>
            </div>
    
            {/* Procedure 2: Multiple coefficients */}
            <div className="bg-violet-50 border-2 border-violet-300 rounded-lg p-3">
              <h3 className="font-bold text-violet-800 text-sm mb-2">
                Testing <Latex math="H_0\!: \beta_{j_1} = \cdots = \beta_{j_q} = 0" />{' '}
                (<Latex math="q" /> coefficients)
              </h3>
              <div className="space-y-2">
                <FStep63 number="1">
                  Fit the <strong>full</strong> model to <Latex math="(X, Y)" />.
                  Record <Latex math="\text{RSS}_f = \|Y - X\hat{\boldsymbol{\beta}}\|^2" />.
                </FStep63>
                <FStep63 number="2">
                  Fit the <strong>restricted</strong> model (drop all{' '}
                  <Latex math="q" /> columns from <Latex math="X" />).
                  Record <Latex math="\text{RSS}_r = \|Y - X_{-S}\hat{\boldsymbol{\beta}}_{-S}\|^2" />,
                  fitted values <Latex math="\hat{Y}_{-S}" />,
                  and restricted residuals{' '}
                  <Latex math="\tilde{e}_i = Y_i - \hat{Y}_{-S,i}" />.
                </FStep63>
                <FStep63 number="3">
                  Compute the observed F-statistic:{' '}
                  <Latex math="F_{\text{obs}} = \dfrac{(\text{RSS}_r - \text{RSS}_f)/q}{\text{RSS}_f/(n-p)}" display={true} />
                </FStep63>
                <FStep63 number="4">
                  Resample <Latex math="\tilde{e}^*_1, \ldots, \tilde{e}^*_n" />{' '}
                  from the restricted residuals.
                </FStep63>
                <FStep63 number="5">
                  Construct <Latex math="Y^*_i = \hat{Y}_{-S,i} + \tilde{e}^*_i" />.
                  None of the <Latex math="q" /> predictors
                  influenced <Latex math="Y^*" />.
                </FStep63>
                <FStep63 number="6">
                  Fit <strong>both</strong> models to <Latex math="Y^*" />.
                  Compute{' '}
                  <Latex math="\text{RSS}^*_f = \|Y^* - X\hat{\boldsymbol{\beta}}^*\|^2" />{' '}
                  and{' '}
                  <Latex math="\text{RSS}^*_r = \|Y^* - X_{-S}\hat{\boldsymbol{\beta}}^*_{-S}\|^2" />.
                  Then <Latex math="F^*_b = \dfrac{(\text{RSS}^*_r - \text{RSS}^*_f)/q}{\text{RSS}^*_f/(n-p)}" />.
                </FStep63>
                <FStep63 number="7">
                  Repeat steps 4{"\u2013"}6 for <Latex math="b = 1, \ldots, B" />.
                </FStep63>
                <FStep63 number="8">
                  <Latex math="\hat{p} = \dfrac{\#\{F^*_b \geq F_{\text{obs}}\}+1}{B+1}" display={true} />
                  One-sided because <Latex math="F \geq 0" />.
                </FStep63>
              </div>
            </div>
          </div>
    
          {/* Connection + constrained form + resampling */}
          <div className="grid grid-cols-3 gap-2.5">
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-2.5">
              <p className="font-bold text-blue-800 text-sm mb-1">Connection</p>
              <p className="text-xs text-blue-700">
                For <Latex math="q = 1" />,{' '}
                <Latex math="F = t^2" /> and the two procedures give identical{' '}
                <Latex math="p" />-values. The single-coefficient version avoids
                the restricted fit inside the loop because{' '}
                <Latex math="t^*_b" /> comes from the full model alone.
              </p>
            </div>
    
            <div className="bg-teal-50 border border-teal-200 rounded-lg p-2.5">
              <p className="font-bold text-teal-800 text-sm mb-1">
                General linear constraints
              </p>
              <p className="text-xs text-teal-700 mb-1">
                Both procedures extend to <Latex math="H_0\!: C\boldsymbol{\beta} = d" />{' '}
                by replacing the restricted model with:
              </p>
              <Latex math="\tilde{\boldsymbol{\beta}} = \hat{\boldsymbol{\beta}} - (X^\top X)^{-1}C^\top\![C(X^\top X)^{-1}C^\top]^{-1}(C\hat{\boldsymbol{\beta}} - d)" display={true} />
              <p className="text-xs text-teal-600 mt-1">
                Dropping column <Latex math="j" /> is the special
                case <Latex math="C = e_j^\top" />, <Latex math="d = 0" />.
                For nonlinear constraints <Latex math="g(\boldsymbol{\beta}) = 0" />,
                the restricted fit requires constrained nonlinear least squares
                (e.g., sequential quadratic programming); the bootstrap procedure
                itself is unchanged.
              </p>
            </div>
    
            <div className="bg-amber-50 border border-amber-200 rounded-lg p-2.5">
              <p className="font-bold text-amber-800 text-sm mb-1">
                How to resample <Latex math="\tilde{e}^*" />
              </p>
              <p className="text-xs text-amber-700 mb-1">
                <strong>Residual bootstrap</strong> (homoscedastic):
                draw with replacement
                from <Latex math="\{\tilde{e}_1, \ldots, \tilde{e}_n\}" />.
              </p>
              <p className="text-xs text-amber-700">
                <strong>Wild bootstrap</strong> (heteroscedastic):{' '}
                <Latex math="\tilde{e}^*_i = v_i \tilde{e}_i" />,{' '}
                <Latex math="v_i \in \{-1,+1\}" /> equally likely (Rademacher).
                Preserves variance pattern at each <Latex math="x_i" />.
              </p>
            </div>
          </div>
    
          {/* Example */}
          <div className="bg-gray-50 border border-gray-200 rounded-lg p-2.5">
            <div className="grid grid-cols-2 gap-4">
              <div>
                <p className="font-bold text-gray-800 text-sm mb-1">
                  Example: Advertising data (<Latex math="n = 200" />) — does newspaper spend matter?
                </p>
                <p className="text-xs text-gray-600 mb-1">
                  <Latex math="\text{Sales} = \beta_0 + \beta_1\text{TV} + \beta_2\text{Radio} + \beta_3\text{News} + \varepsilon" />.{' '}
                  Test <Latex math="H_0\!: \beta_3 = 0" />.
                </p>
                <table className="w-full text-xs">
                  <thead>
                    <tr className="border-b border-gray-300">
                      <th className="text-left p-1"></th>
                      <th className="text-left p-1"><Latex math="\hat{\beta}" /></th>
                      <th className="text-left p-1">SE</th>
                      <th className="text-left p-1"><Latex math="t" /></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr className="border-t border-gray-200">
                      <td className="p-1">Intercept</td>
                      <td className="p-1 font-mono">2.939</td>
                      <td className="p-1 font-mono">0.312</td>
                      <td className="p-1 font-mono">9.42</td>
                    </tr>
                    <tr className="border-t border-gray-200">
                      <td className="p-1">TV</td>
                      <td className="p-1 font-mono">0.0458</td>
                      <td className="p-1 font-mono">0.0014</td>
                      <td className="p-1 font-mono">32.81</td>
                    </tr>
                    <tr className="border-t border-gray-200">
                      <td className="p-1">Radio</td>
                      <td className="p-1 font-mono">0.1885</td>
                      <td className="p-1 font-mono">0.0086</td>
                      <td className="p-1 font-mono">21.89</td>
                    </tr>
                    <tr className="border-t border-gray-200 bg-blue-50">
                      <td className="p-1 font-semibold">Newspaper</td>
                      <td className="p-1 font-mono">{"−"}0.0010</td>
                      <td className="p-1 font-mono">0.0059</td>
                      <td className="p-1 font-mono font-bold">{"−"}0.18</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div className="flex flex-col justify-center">
                <div className="grid grid-cols-2 gap-2 text-sm mb-2">
                  <div className="bg-white rounded p-2 text-center">
                    <p className="text-gray-500 text-xs">Classical</p>
                    <p className="font-mono font-bold text-gray-700">p = 0.86</p>
                  </div>
                  <div className="bg-white rounded p-2 text-center">
                    <p className="text-gray-500 text-xs">
                      Wild bootstrap (<Latex math="B = 10{,}000" />)
                    </p>
                    <p className="font-mono font-bold text-gray-700">p = 0.88</p>
                  </div>
                </div>
                <p className="text-xs text-gray-500">
                  Newspaper adds nothing once TV and Radio are in. Here <Latex math="\text{corr}(|\hat e|,\text{TV}) = 0.48" /> —
                  genuinely heteroscedastic, so classical SEs are suspect. The wild bootstrap gives <strong>valid</strong>{' '}
                  inference <em>without</em> assuming homoscedasticity and reaches the same verdict: the bootstrap earns
                  its value by staying trustworthy under the assumption violation, not by flipping the answer.
                </p>
              </div>
            </div>
          </div>
    
          {/* Pairs resampling note */}
          <div className="bg-slate-100 border border-slate-300 rounded-lg px-3 py-2">
            <p className="text-xs text-slate-600">
              <strong>What about pairs resampling?</strong>{' '}
              The pairs bootstrap resamples <Latex math="(X_i, Y_i)" /> rows as a
              unit. Since the original <Latex math="Y" /> values already contain the
              effects of all predictors, there is no mechanism to remove the effect of
              specific predictors from the bootstrap data. The resulting distribution
              of <Latex math="\hat{\beta}^*_j" /> is centered
              at <Latex math="\hat{\beta}_j" />, not at zero, so the testing procedure
              differs: one must either recenter the test statistic or invert a
              confidence interval. See{' '}
              <a href="https://ideas.repec.org/p/qed/wpaper/1127.html"
                 className="underline text-slate-500"
                 target="_blank" rel="noopener noreferrer">
                MacKinnon (2007)
              </a>{' '}
              and{' '}
              <a href="http://qed.econ.queensu.ca/pub/faculty/mackinnon/rd-jgm-bootstrap-methods-2006.pdf"
                 className="underline text-slate-500"
                 target="_blank" rel="noopener noreferrer">
                Davidson and MacKinnon (2006)
              </a>{' '}
              for detailed treatment.
            </p>
          </div>
        </div>
  );
}

                  that incorporates prior knowledge. Different question, different answer.
                </p>
                <p className="text-[9px] text-teal-300 text-center mt-1 font-semibold">LO 2</p>
              </div>
    
            </div>
    
          </div>
        </div>
  );
}

    // ═══════════════════════════════════════════════════════════════════
    // HELPER FUNCTIONS
    // ═══════════════════════════════════════════════════════════════════
    const getSectionForSlide = (slideIndex) => {
      const slideId = slideIndex + 1;
      const sortedSections = [...sections].sort((a, b) => b.startSlide - a.startSlide);
      return sortedSections.find(s => slideId >= s.startSlide);
    };

    // ═══════════════════════════════════════════════════════════════════
    // ACCESSIBLE HELP MODAL
    // ═══════════════════════════════════════════════════════════════════

      const modalRef = useRef(null);
      useFocusTrap(true, modalRef);
      
      useEffect(() => {
        const handleEscape = (e) => {
          if (e.key === 'Escape') onClose();
        };
        window.addEventListener('keydown', handleEscape);
        return () => window.removeEventListener('keydown', handleEscape);
      }, [onClose]);
      
      return (
        <div 
          className="help-overlay" 
          onClick={onClose}
          role="dialog"
          aria-modal="true"
          aria-labelledby="help-title"
        >
          <div 
            ref={modalRef}
            className="help-content" 
            onClick={e => e.stopPropagation()}
            role="document"
          >
            <h2 id="help-title" className="text-2xl font-bold">Keyboard Shortcuts</h2>
            <div className="help-grid" role="list">
              <div role="listitem" className="contents">
                <kbd className="help-key">→ / Space / N</kbd>
                <span>Next slide</span>
              </div>
              <div role="listitem" className="contents">
                <kbd className="help-key">← / Backspace / P</kbd>
                <span>Previous slide</span>
              </div>
              <div role="listitem" className="contents">
                <kbd className="help-key">Home</kbd>
                <span>First slide</span>
              </div>
              <div role="listitem" className="contents">
                <kbd className="help-key">End</kbd>
                <span>Last slide</span>
              </div>
              <div role="listitem" className="contents">
                <kbd className="help-key">O</kbd>
                <span>Overview mode</span>
              </div>
              <div role="listitem" className="contents">
                <kbd className="help-key">F</kbd>
                <span>Fullscreen</span>
              </div>
              <div role="listitem" className="contents">
                <kbd className="help-key">?</kbd>
                <span>Show help</span>
              </div>
              <div role="listitem" className="contents">
                <kbd className="help-key">Esc</kbd>
                <span>Close overlay</span>
              </div>
            </div>
            <button

              Close (Escape)
