       ═══════════════════════════════════════════════════════════════════ */

      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);

      color: var(--purdue-black);
      padding: 0.75rem 1.5rem;

      text-decoration: none;
      transition: top 0.2s;

      top: 0;
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    /* ═══════════════════════════════════════════════════════════════════

    .border-red-300 { border-color: var(--red-300); }
    .border-red-400 { border-color: var(--red-400); }
    .border-rose-200 { border-color: var(--rose-200); }
    .border-rose-300 { border-color: var(--rose-300); }
    .border-pink-200 { border-color: var(--pink-200); }
    .border-pink-300 { border-color: var(--pink-300); }

    /* Semi-transparent borders */
    .border-white\/10 { border-color: rgb(255 255 255 / 0.1); }
    .border-white\/20 { border-color: rgb(255 255 255 / 0.2); }
    .border-white\/30 { border-color: rgb(255 255 255 / 0.3); }
    .border-blue-400\/30 { border-color: rgb(96 165 250 / 0.3); }
    .border-purple-400\/30 { border-color: rgb(192 132 252 / 0.3); }
    .border-purple-300\/30 { border-color: rgb(216 180 254 / 0.3); }
    .border-green-400\/30 { border-color: rgb(74 222 128 / 0.3); }
    .border-green-400\/50 { border-color: rgb(74 222 128 / 0.5); }
    .border-amber-400\/30 { border-color: rgb(251 191 36 / 0.3); }
    .border-pink-400\/30 { border-color: rgb(244 114 182 / 0.3); }
    .border-emerald-400\/30 { border-color: rgb(52 211 153 / 0.3); }
    .border-red-400\/30 { border-color: rgb(248 113 113 / 0.3); }
    .border-indigo-400\/30 { border-color: rgb(129 140 248 / 0.3); }
    .border-teal-400\/30 { border-color: rgb(45 212 191 / 0.3); }
    .border-violet-400\/30 { border-color: rgb(167 139 250 / 0.3); }
    .border-cyan-400\/30 { border-color: rgb(34 211 238 / 0.3); }

    /* ═══════════════════════════════════════════════════════════════════
       BORDER RADIUS
       ═══════════════════════════════════════════════════════════════════ */
    .rounded-none { border-radius: 0; }
    .rounded-sm { border-radius: 0.125rem; }
    .rounded { border-radius: 0.25rem; }
    .rounded-md { border-radius: 0.375rem; }
    .rounded-lg { border-radius: 0.5rem; }
    .rounded-xl { border-radius: 0.75rem; }
    .rounded-2xl { border-radius: 1rem; }
    .rounded-3xl { border-radius: 1.5rem; }
    .rounded-full { border-radius: 9999px; }
    .rounded-t { border-radius: 0.25rem 0.25rem 0 0; }
    .rounded-t-lg { border-radius: 0.5rem 0.5rem 0 0; }
    .rounded-t-xl { border-radius: 0.75rem 0.75rem 0 0; }
    .rounded-b { border-radius: 0 0 0.25rem 0.25rem; }
    .rounded-b-lg { border-radius: 0 0 0.5rem 0.5rem; }
    .rounded-b-xl { border-radius: 0 0 0.75rem 0.75rem; }
    .rounded-l { border-radius: 0.25rem 0 0 0.25rem; }
    .rounded-l-lg { border-radius: 0.5rem 0 0 0.5rem; }
    .rounded-r { border-radius: 0 0.25rem 0.25rem 0; }
    .rounded-r-lg { border-radius: 0 0.5rem 0.5rem 0; }

    /* ═══════════════════════════════════════════════════════════════════
       SHADOWS
       ═══════════════════════════════════════════════════════════════════ */
    .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .shadow { box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1); }
    .shadow-md { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
    .shadow-lg { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }
    .shadow-xl { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    .shadow-2xl { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
    .shadow-inner { box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05); }
    .shadow-none { box-shadow: none; }

    /* ═══════════════════════════════════════════════════════════════════
       OPACITY
       ═══════════════════════════════════════════════════════════════════ */
    .opacity-0 { opacity: 0; }
    .opacity-5 { opacity: 0.05; }
    .opacity-10 { opacity: 0.1; }
    .opacity-20 { opacity: 0.2; }
    .opacity-25 { opacity: 0.25; }
    .opacity-30 { opacity: 0.3; }
    .opacity-40 { opacity: 0.4; }
    .opacity-50 { opacity: 0.5; }
    .opacity-60 { opacity: 0.6; }
    .opacity-70 { opacity: 0.7; }
    .opacity-75 { opacity: 0.75; }
    .opacity-80 { opacity: 0.8; }
    .opacity-90 { opacity: 0.9; }
    .opacity-95 { opacity: 0.95; }
    .opacity-100 { opacity: 1; }

    /* ═══════════════════════════════════════════════════════════════════
       TRANSFORMS
       ═══════════════════════════════════════════════════════════════════ */
    .transform { transform: var(--tw-transform); }
    .translate-x-0 { transform: translateX(0); }
    .translate-y-0 { transform: translateY(0); }
    .-translate-x-1\/2 { transform: translateX(-50%); }
    .-translate-y-1\/2 { transform: translateY(-50%); }
    .translate-x-1\/2 { transform: translateX(50%); }
    .rotate-0 { transform: rotate(0deg); }
    .rotate-45 { transform: rotate(45deg); }
    .rotate-90 { transform: rotate(90deg); }
    .rotate-180 { transform: rotate(180deg); }
    .-rotate-45 { transform: rotate(-45deg); }
    .-rotate-90 { transform: rotate(-90deg); }
    .scale-75 { transform: scale(0.75); }
    .scale-90 { transform: scale(0.9); }
    .scale-95 { transform: scale(0.95); }
    .scale-100 { transform: scale(1); }
    .scale-105 { transform: scale(1.05); }
    .scale-110 { transform: scale(1.1); }
    .scale-125 { transform: scale(1.25); }
    .scale-150 { transform: scale(1.5); }

    /* ═══════════════════════════════════════════════════════════════════
       TRANSITIONS & ANIMATIONS
       ═══════════════════════════════════════════════════════════════════ */
    .transition-none { transition-property: none; }
    .transition-all { transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .transition-colors { transition: color 150ms, background-color 150ms, border-color 150ms, fill 150ms, stroke 150ms; }
    .transition-opacity { transition: opacity 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .transition-shadow { transition: box-shadow 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .transition-transform { transition: transform 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .duration-75 { transition-duration: 75ms; }
    .duration-100 { transition-duration: 100ms; }
    .duration-150 { transition-duration: 150ms; }
    .duration-200 { transition-duration: 200ms; }
    .duration-300 { transition-duration: 300ms; }
    .duration-500 { transition-duration: 500ms; }
    .ease-in { transition-timing-function: cubic-bezier(0.4, 0, 1, 1); }
    .ease-out { transition-timing-function: cubic-bezier(0, 0, 0.2, 1); }
    .ease-in-out { transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }

    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-bounce { animation: bounce-anim 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes bounce-anim { 0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); } 50% { transform: translateY(0); animation-timing-function: cubic-bezier(0,0,0.2,1); } }

    /* ═══════════════════════════════════════════════════════════════════
       FILTERS & EFFECTS
       ═══════════════════════════════════════════════════════════════════ */
    .backdrop-blur-sm { backdrop-filter: blur(4px); }
    .backdrop-blur { backdrop-filter: blur(8px); }
    .backdrop-blur-md { backdrop-filter: blur(12px); }
    .backdrop-blur-lg { backdrop-filter: blur(16px); }
    .blur-sm { filter: blur(4px); }
    .blur { filter: blur(8px); }
    .brightness-50 { filter: brightness(0.5); }
    .brightness-75 { filter: brightness(0.75); }
    .brightness-100 { filter: brightness(1); }
    .brightness-125 { filter: brightness(1.25); }
    .grayscale { filter: grayscale(100%); }
    .grayscale-0 { filter: grayscale(0); }

    /* ═══════════════════════════════════════════════════════════════════
       MISCELLANEOUS UTILITIES
       ═══════════════════════════════════════════════════════════════════ */
    .object-contain { object-fit: contain; }
    .object-cover { object-fit: cover; }
    .object-fill { object-fit: fill; }
    .object-center { object-position: center; }
    .cursor-pointer { cursor: pointer; }
    .cursor-default { cursor: default; }
    .cursor-not-allowed { cursor: not-allowed; }
    .select-none { user-select: none; }
    .select-text { user-select: text; }
    .select-all { user-select: all; }
    .pointer-events-none { pointer-events: none; }
    .pointer-events-auto { pointer-events: auto; }
    .resize-none { resize: none; }
    .list-none { list-style-type: none; }
    .list-disc { list-style-type: disc; }
    .list-decimal { list-style-type: decimal; }
    .list-inside { list-style-position: inside; }
    .list-outside { list-style-position: outside; }
    .appearance-none { appearance: none; }
    .outline-none { outline: 2px solid transparent; outline-offset: 2px; }

    /* ═══════════════════════════════════════════════════════════════════
       BUTTONS  --  Reset
       ═══════════════════════════════════════════════════════════════════ */
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }

    /* ═══════════════════════════════════════════════════════════════════
       CODE  --  Scoped to avoid bleeding into dark code blocks
       ═══════════════════════════════════════════════════════════════════ */
    code {
      font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
      background-color: #fef3c7;
      color: #92400e;
      padding: 0.125rem 0.25rem;
      border-radius: 0.25rem;
      font-size: 0.875em;
    }

    /* Reset code styling inside dark code block containers */
    [class*="bg-gray-900"] code,
    [class*="bg-gray-800"] code,
    [class*="bg-slate-900"] code,
    [class*="bg-slate-800"] code,
    [class*="bg-slate-700"] code,
    [class*="bg-black"] code {
      background-color: transparent;
      color: inherit;
      padding: 0;
      font-size: inherit;
    }

    pre { margin: 0; white-space: pre-wrap; word-break: break-word; }

    /* -- Image containment (prevents oversized images) -- */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* Inside flex containers, images must respect parent bounds */
    .flex-1 > img,
    .flex-1 img {
      max-height: 100%;
      object-fit: contain;
    }

    /* ═══════════════════════════════════════════════════════════════════
       TABLE DEFAULTS
       ═══════════════════════════════════════════════════════════════════ */
    table { border-collapse: collapse; }
    .table-auto { table-layout: auto; }
    .table-fixed { table-layout: fixed; }
    .border-collapse { border-collapse: collapse; }
    .border-separate { border-collapse: separate; }
    .border-spacing-0 { border-spacing: 0; }
    td, th { vertical-align: middle; }

    /* ═══════════════════════════════════════════════════════════════════
       HOVER / GROUP UTILITIES
       ═══════════════════════════════════════════════════════════════════ */
    .group:hover .group-hover\:opacity-100 { opacity: 1; }
    .group:hover .group-hover\:visible { visibility: visible; }
    .group:hover .group-hover\:text-white { color: #ffffff; }
    .group:hover .group-hover\:bg-white\/20 { background-color: rgb(255 255 255 / 0.2); }
    .hover\:bg-gray-100:hover { background-color: var(--gray-100); }
    .hover\:bg-gray-200:hover { background-color: var(--gray-200); }
    .hover\:bg-gray-700:hover { background-color: var(--gray-700); }
    .hover\:bg-blue-100:hover { background-color: var(--blue-100); }
    .hover\:bg-white\/10:hover { background-color: rgb(255 255 255 / 0.1); }
    .hover\:bg-white\/20:hover { background-color: rgb(255 255 255 / 0.2); }
    .hover\:text-blue-700:hover { color: var(--blue-700); }
    .hover\:text-white:hover { color: #ffffff; }
    .hover\:shadow-lg:hover { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .hover\:shadow-xl:hover { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .hover\:scale-105:hover { transform: scale(1.05); }
    .hover\:scale-102:hover { transform: scale(1.02); }
    .hover\:opacity-80:hover { opacity: 0.8; }
    .hover\:underline:hover { text-decoration: underline; }
    .hover\:no-underline:hover { text-decoration: none; }

    /* ═══════════════════════════════════════════════════════════════════
       SLIDE CONTAINER
       ═══════════════════════════════════════════════════════════════════ */
    .slide-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--gray-100);
    }

    .slide-header {
      background: var(--purdue-black);
      color: white;
      padding: 0.5rem 1rem;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-title .purdue { font-weight: 700; font-size: 1.125rem; }
    .header-title .course { color: var(--purdue-gold); font-size: 1rem; }

    .header-slide-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .slide-counter {
      color: var(--purdue-gold);
      font-family: monospace;
      font-size: 1rem;
    }

    .current-section {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(206, 184, 136, 0.2);
      padding: 0.25rem 0.75rem;
      border-radius: 0.375rem;
    }

    .current-section .icon { font-size: 1rem; }
    .current-section .name { color: var(--purdue-gold); font-size: 0.875rem; }

    /* ═══════════════════════════════════════════════════════════════════
       PROGRESS BAR  --  ACCESSIBLE
       ═══════════════════════════════════════════════════════════════════ */
    .progress-container {
      position: relative;
      width: 100%;
      padding: 0.5rem 0;
    }

    .section-labels {
      display: flex;
      margin-bottom: 0.5rem;
    }

    .section-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: all 0.3s ease;
      cursor: pointer;
      border-radius: 0.25rem;
    }

    .section-label.active { color: #fcd34d; }
    .section-label.completed { color: #86efac; }
    .section-label.future { color: #94a3b8; }
    .section-label:hover {
      color: var(--purdue-gold);
      background: rgba(255,255,255,0.1);
    }

    .progress-sections {
      display: flex;
      gap: 4px;
      height: 20px;
      align-items: flex-end;
    }

    .section-group {
      display: flex;
      gap: 1px;
      border-radius: 3px;
      overflow: hidden;
      transition: all 0.3s ease;
      position: relative;
    }

    .section-group.active {
      box-shadow: 0 0 0 2px var(--amber-400), 0 0 12px rgba(251, 191, 36, 0.4);
    }

    .slide-bar {
      min-width: 6px;
      flex: 1;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .slide-bar.current {
      height: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #e2e8f0 100%);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 20px rgba(251, 191, 36, 0.5);
      border-radius: 2px;
      z-index: 5;
    }

    .slide-bar.active-past { height: 14px; background: linear-gradient(180deg, var(--amber-400) 0%, var(--amber-600) 100%); }
    .slide-bar.active-past:hover, .slide-bar.active-past:focus-visible { height: 16px; background: linear-gradient(180deg, #fcd34d 0%, var(--amber-500) 100%); }
    .slide-bar.active-future { height: 10px; background: linear-gradient(180deg, var(--amber-700) 0%, var(--amber-800) 100%); }
    .slide-bar.active-future:hover, .slide-bar.active-future:focus-visible { height: 14px; background: linear-gradient(180deg, var(--amber-500) 0%, var(--amber-600) 100%); }
    .slide-bar.completed { height: 12px; background: linear-gradient(180deg, var(--green-400) 0%, var(--emerald-600) 100%); }
    .slide-bar.completed:hover, .slide-bar.completed:focus-visible { height: 14px; background: linear-gradient(180deg, #86efac 0%, var(--emerald-500) 100%); }
    .slide-bar.future { height: 8px; background: linear-gradient(180deg, var(--slate-500) 0%, var(--slate-600) 100%); }
    .slide-bar.future:hover, .slide-bar.future:focus-visible { height: 12px; background: linear-gradient(180deg, var(--slate-400) 0%, var(--slate-500) 100%); }

    .slide-bar::before {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: var(--slate-900);
      color: white;
      padding: 0.375rem 0.625rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.15s ease;
      pointer-events: none;
      z-index: 30;
    }

    .slide-bar:hover::before, .slide-bar:focus-visible::before {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .current-indicator {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: var(--amber-400);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--amber-400);
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-3px); }
    }

    .section-progress-text {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 700;
      color: #fcd34d;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .section-group.active .section-progress-text { opacity: 1; }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      font-size: 0.75rem;
    }

    .progress-counter {
      font-family: monospace;
      font-weight: 700;
      color: #fcd34d;
      background: var(--slate-800);
      padding: 0.25rem 0.625rem;
      border-radius: 0.25rem;
    }

    .progress-legend {
      display: flex;
      gap: 1rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: #cbd5e1;
      font-size: 0.75rem;
    }

    .legend-bar { width: 12px; border-radius: 2px; }
    .legend-bar.completed { height: 10px; background: var(--green-400); }
    .legend-bar.active { height: 12px; background: var(--amber-400); }
    .legend-bar.current { height: 14px; background: white; box-shadow: 0 0 4px rgba(255,255,255,0.5); }
    .legend-bar.future { height: 6px; background: var(--slate-500); }

    /* ═══════════════════════════════════════════════════════════════════
       SLIDE CONTENT
       ═══════════════════════════════════════════════════════════════════ */
    .slide-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      justify-content: center;
    }

    .slide-wrapper {
      width: 100%;
      max-width: 1400px;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      padding: 2rem 2.5rem;
      min-height: calc(100vh - 180px);
      display: flex;
      flex-direction: column;
    }

    .slide-wrapper > *:first-child { background-color: white; }

    .slide-wrapper > *:first-child[class*="bg-gradient"],
    .slide-wrapper > *:first-child[class*="bg-gray-900"],
    .slide-wrapper > *:first-child[class*="bg-slate-900"],
    .slide-wrapper > *:first-child[class*="bg-slate-800"],
    .slide-wrapper > *:first-child[class*="bg-black"] {
      background-color: transparent;
    }

    /* ═══════════════════════════════════════════════════════════════════
       NAVIGATION  --  ACCESSIBLE
       ═══════════════════════════════════════════════════════════════════ */
    .slide-nav {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.95);
      padding: 0.75rem;
      border-radius: 0.75rem;
      z-index: 100;
    }

    .slide-nav button {
      width: 3rem;
      height: 3rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.25rem;
      transition: background 0.2s;
      min-width: 44px;  /* WCAG touch target */
      min-height: 44px;
    }

    .slide-nav button:hover:not(:disabled),
    .slide-nav button:focus-visible:not(:disabled) {
      background: var(--gray-700);
    }

    .nav-divider {
      width: 1px;
      height: 2.5rem;
      background: var(--gray-600);
      align-self: center;
    }

    /* ═══════════════════════════════════════════════════════════════════
       HELP MODAL
       ═══════════════════════════════════════════════════════════════════ */
    .help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .help-content {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .help-content h2 { margin-bottom: 1.5rem; }

    .help-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.75rem 1rem;
      font-size: 1rem;
      align-items: center;
    }

    .help-key {
      font-family: monospace;
      background: var(--gray-100);

    function useFocusTrap(isActive, containerRef) {
      useEffect(() => {
        if (!isActive || !containerRef.current) return;
        
        const container = containerRef.current;
        const focusableElements = container.querySelectorAll(
          'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
        );
        const firstElement = focusableElements[0];
        const lastElement = focusableElements[focusableElements.length - 1];
        
        firstElement?.focus();
        
        const handleKeyDown = (e) => {
          if (e.key !== 'Tab') return;
          
          if (e.shiftKey) {
            if (document.activeElement === firstElement) {
              e.preventDefault();
              lastElement?.focus();
            }
          } else {
            if (document.activeElement === lastElement) {
              e.preventDefault();
              firstElement?.focus();
            }
          }
        };
        
        container.addEventListener('keydown', handleKeyDown);
        return () => container.removeEventListener('keydown', handleKeyDown);
      }, [isActive, containerRef]);
    }

        </div>
  );
}

                    <td className="p-2.5 text-center"><span className="text-red-600 font-bold">ID</span></td>
                    <td className="p-2.5">Penalize to make MLE finite (Firth correction, ridge); can then bootstrap the penalized estimator</td>

                    <td className="p-2.5">Smoothed bootstrap (add small random noise to each resampled value to break ties); or target the median instead</td>

                    <td className="p-2.5">The ECDF is flat beyond <Latex math="X_{(1)}" /> and <Latex math="X_{(n)}" />, so its inverse cannot produce quantiles outside the observed range; the 99.9th percentile with <Latex math="n = 100" /> has no data to estimate it</td>
                    <td className="p-2.5 text-center"><span className="text-amber-600 font-bold">Reg</span></td>
                    <td className="p-2.5">Fit a parametric tail model (e.g., generalized Pareto) and bootstrap from that; or use extreme value theory directly</td>
                  </tr>
                </tbody>
              </table>
            </div>
    
            {/* Bottom: Key principle */}
            <div className="bg-red-50 border-2 border-red-300 rounded-lg p-3 flex items-start gap-3">

                not well-defined, no amount of resampling helps. Fix the identifiability problem first,

              </p>
            </div>
          </div>
        </div>
  );
}

        for b in range(B):         # Phase 2

}

                  samples, it systematically over- or under-shoots the true parameter:
                </p>
                <div className="bg-white/70 rounded p-2">
                  <Latex math="\text{Bias}_F(\hat{\theta}) = \mathbb{E}_F[\hat{\theta}] - \theta" display={true} />

                <p className="text-sm text-emerald-700 mb-2">
                  Apply the plug-in principle: replace <Latex math="F" /> with <Latex math="\hat{F}_n" />,
                  <Latex math="\theta" /> with <Latex math="\hat{\theta}" />, and <Latex math="\mathbb{E}_F" /> with the bootstrap mean:

                </p>
                <div className="bg-white/70 rounded p-2 mb-2">

                Since <Latex math="\hat{\theta}" /> is a constant (fixed from the original sample), subtracting it shifts every{' '}

                    </tr>
                  </tbody>
                </table>
                <p className="text-xs text-gray-500 p-2.5">
                  Symmetric: all three agree exactly. Skewed: percentile extends further right (captures long tail),
                  basic shifts left (corrects bias), normal splits the difference (ignores skewness).
                </p>
              </div>
    
              <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 flex flex-col justify-center">
                <h3 className="font-bold text-amber-800 text-sm mb-3">Which method to use?</h3>
                <div className="text-sm text-amber-700 space-y-2">

                    <strong>Default:</strong>{' '}

                </div>
              </div>
            </div>
          </div>
        </div>
  );
}

function Slide34_CIExample() {
  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">

          <div className="flex-1 grid grid-cols-2 gap-4 min-h-0">

    from scipy import stats
    
    rng = np.random.default_rng(123)
    n, rho = 100, 0.6
    cov = np.array([[1, rho], [rho, 1]])
    xy = rng.multivariate_normal([0,0], cov, n)
    
    r_hat = np.corrcoef(xy[:,0], xy[:,1])[0,1]
    
    # Bootstrap
    B = 10000
    r_star = np.empty(B)
    for b in range(B):
        idx = rng.integers(0, n, size=n)
        r_star[b] = np.corrcoef(
            xy[idx,0], xy[idx,1])[0,1]
    
    se = np.std(r_star, ddof=1)
    
    # Three CI methods
    Q = np.quantile(r_star, [0.025, 0.975])
    ci_perc  = (Q[0], Q[1])
    ci_basic = (2*r_hat - Q[1], 2*r_hat - Q[0])
    z = stats.norm.ppf(0.975)
    ci_norm  = (r_hat - z*se, r_hat + z*se)`}</pre>
            </div>
    
            {/* Right: Results + interpretation */}
            <div className="flex flex-col gap-3 min-h-0">
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">

                  <p><span className="text-gray-400">r_hat =</span> <span className="text-green-300">0.5416</span></p>
                  <p><span className="text-gray-400">SE    =</span> <span className="text-green-300">0.0745</span></p>
                  <p><span className="text-gray-400">Percentile:</span> <span className="text-blue-300">[0.3797, 0.6737]</span></p>
                  <p><span className="text-gray-400">Basic:     </span> <span className="text-purple-300">[0.4095, 0.7035]</span></p>
                  <p><span className="text-gray-400">Normal:    </span> <span className="text-yellow-300">[0.3955, 0.6877]</span></p>
                </div>
              </div>
    
              <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                <h3 className="font-semibold text-blue-800 text-sm mb-2">Interpretation</h3>
                <div className="text-sm text-blue-700 space-y-1.5">
                  <p>All three methods agree closely here -- the bootstrap distribution is only mildly skewed
                    at <Latex math="\rho = 0.6" /> with <Latex math="n = 100" />.</p>
                  <p>The basic interval shifts slightly right relative to percentile (the reflection corrects
                    for the mild downward bias of <Latex math="r" />).</p>
                </div>
              </div>
    
              <div className="bg-red-50 border-2 border-red-300 rounded-lg p-3">
                <h3 className="font-semibold text-red-800 text-sm mb-2">When they diverge: <Latex math="\rho = 0.9" />, <Latex math="n = 15" /></h3>
                <div className="text-sm text-red-700 space-y-1.5">
                  <p>With small <Latex math="n" /> and <Latex math="\rho" /> near the boundary:</p>
                  <div className="bg-white/70 rounded p-2 font-mono text-xs space-y-0.5">
                    <p>Percentile: [0.8762, <span className="text-green-700">0.9865</span>] <span className="text-gray-400"># respects boundary</span></p>
                    <p>Basic:      [0.9222, <span className="text-red-600 font-bold">1.0326</span>] <span className="text-gray-400"># impossible (worst)</span></p>
                    <p>Normal:     [0.8961, <span className="text-red-600 font-bold">1.0126</span>] <span className="text-gray-400"># impossible</span></p>
                  </div>
                  <p className="text-red-600 font-semibold mt-1">
                    Only percentile naturally respects parameter boundaries. Basic is worst here because <Latex math="2\hat{r} - Q_{0.025}" /> pushes the upper bound above <Latex math="\hat{r}" />, past 1.
                  </p>
                </div>
              </div>
    
              <div className="bg-gray-50 border border-gray-200 rounded-lg p-2">
                <p className="text-xs text-gray-600">
                  <strong>Diagnostic:</strong> plot the bootstrap histogram before choosing a CI method.{' '}

                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

    import statsmodels.api as sm
    
    # Fit original model

    e_tilde = model.resid - model.resid.mean()
    
    rng = np.random.default_rng(42)

    x0_hat = (50 - b[0]) / b[1]  # ~30.0
    
    B = 5000
    x0_star = np.empty(B)
    for bb in range(B):
        ys = y_hat + rng.normal(0, sig, 20)
        bs = np.linalg.lstsq(X, ys, rcond=None)[0]
        x0_star[bb] = (50 - bs[0]) / bs[1]`}</pre>
                </div>
                <div>
                  <p className="text-yellow-300 not-italic font-sans font-semibold text-xs mb-1">Delta Method (for comparison)</p>
                  <pre className="leading-relaxed text-gray-200">{`# Covariance of (b0, b1)
    V = sig**2 * np.linalg.inv(X.T @ X)
    
    # Gradient of g(b0,b1) = (c-b0)/b1
    #   dg/db0 = -1/b1
    #   dg/db1 = -(c-b0)/b1^2
    grad = np.array([
        -1 / b[1],
        -(50 - b[0]) / b[1]**2
    ])
    
    se_delta = np.sqrt(grad @ V @ grad)`}</pre>

        theta_hat = statistic(data)
        theta_loo = np.array([
            statistic(np.delete(data, i))
            for i in range(n)])
        theta_bar = theta_loo.mean()
        se = np.sqrt((n-1)/n
             * np.sum((theta_loo - theta_bar)**2))
        bias = (n-1) * (theta_bar - theta_hat)
        return theta_hat, se, bias`}</pre>

function Slide50_JackknifeBias() {
  return (
    <div className="h-full flex flex-col p-6">
          <div className="flex-shrink-0 mb-2">
            <h1 className="text-2xl font-bold text-gray-800">Why Jackknife Bias Correction Works</h1>
            <p className="text-gray-600 text-sm">
              Quenouille's original motivation: canceling the leading bias term via Richardson extrapolation
            </p>
          </div>
    
          <div className="flex-1 flex flex-col gap-3 min-h-0">
    
            {/* Derivation */}
            <div className="flex-shrink-0 bg-teal-50 border-2 border-teal-300 rounded-lg p-4">
              <h3 className="font-bold text-teal-800 text-sm mb-2">The Bias Expansion</h3>
              <div className="grid grid-cols-2 gap-4 text-sm text-teal-700">
                <div>
                  <p className="font-semibold mb-1">Assume bias has the form:</p>
                  <div className="bg-white/80 rounded p-3 space-y-2 text-base">
                    <Latex math="\mathbb{E}[\hat{\theta}_n] = \theta + \dfrac{a}{n} + O(n^{-2})" display={true} />
                    <Latex math="\mathbb{E}[\hat{\theta}_{n-1}] = \theta + \dfrac{a}{n{-}1} + O(n^{-2})" display={true} />
                  </div>
                </div>
                <div>
                  <p className="font-semibold mb-1">Multiply and subtract -- the <Latex math="a" /> cancels:</p>
                  <div className="bg-white/80 rounded p-3 space-y-2 text-base">
                    <Latex math="n\,\mathbb{E}[\hat{\theta}_n] = n\theta + a + O(n^{-1})" display={true} />
                    <Latex math="(n{-}1)\,\mathbb{E}[\hat{\theta}_{n-1}] = (n{-}1)\theta + a + O(n^{-1})" display={true} />
                  </div>
                  <div className="bg-emerald-100 rounded p-3 mt-2 text-base">
                    <Latex math="\mathbb{E}\bigl[n\hat{\theta}_n - (n{-}1)\hat{\theta}_{n-1}\bigr] = \theta + O(n^{-2})" display={true} />
                  </div>
                </div>
              </div>
              <p className="text-sm text-teal-600 mt-2">
                We do not observe <Latex math="\hat{\theta}_{n-1}" /> directly, but{' '}
                <Latex math="\bar{\theta}_{(\cdot)} = \frac{1}{n}\sum_i \hat{\theta}_{(-i)}" />{' '}

function Slide52_InfluenceFunction() {
  return (

            <h1 className="text-2xl font-bold text-gray-800">Influence Functions and the Jackknife</h1>

          </div>
    
          <div className="flex-1 flex flex-col gap-2 min-h-0">
    
            {/* What IF is + formal definition */}
            <div className="flex-shrink-0 bg-blue-50 border-2 border-blue-300 rounded-lg p-3">
              <h3 className="font-bold text-blue-800 text-sm mb-1">The Influence Function</h3>
              <p className="text-xs text-blue-700 mb-2">
                How sensitive is a statistic to a single observation? Contaminate <Latex math="F" />{' '}
                by mixing in a point mass <Latex math="\delta_x" /> at <Latex math="x" /> with
                weight <Latex math="\varepsilon" />, and measure the rate of change.
                Since <Latex math="F" /> is a distribution (not a number), we cannot take an
                ordinary derivative -- we specify how to perturb it and measure the response:
              </p>
              <div className="bg-white/80 rounded p-2 mb-2">
                <Latex math="\text{IF}(x;\, T, F) = \lim_{\varepsilon \to 0} \frac{T\!\big((1{-}\varepsilon)F + \varepsilon\,\delta_x\big) - T(F)}{\varepsilon}" display={true} />
              </div>
              <p className="text-xs text-blue-700 mb-2">
                Bounded IF = robust estimator, unbounded IF = sensitive to outliers.
                This is the foundation of <strong>robust statistics</strong> (Hampel, 1974):
              </p>
              <div className="grid grid-cols-3 gap-3 text-xs text-blue-700">
                <div className="bg-white/70 rounded p-2">
                  <p className="font-semibold">Mean: <Latex math="\text{IF} = x - \mu" /></p>
                  <p>Unbounded -- one extreme value moves the mean arbitrarily far.{' '}
                  <span className="text-red-600 font-semibold">Not robust.</span></p>
                </div>
                <div className="bg-white/70 rounded p-2">
                  <p className="font-semibold">Median: <Latex math="\text{IF} = \frac{\text{sign}(x - \mu)}{2f(\mu)}" /></p>
                  <p>Bounded -- no observation can have more than a fixed influence.{' '}
                  <span className="text-green-600 font-semibold">Robust.</span></p>
                </div>
                <div className="bg-white/70 rounded p-2">
                  <p className="font-semibold">Trimmed mean</p>
                  <p>Bounded (like median) but higher efficiency when data are clean. A compromise.</p>
                </div>
              </div>
            </div>
    
            {/* Jackknife residual + IF definition + Why SE works + Verification */}
            <div className="flex-1 min-h-0 grid grid-cols-2 gap-3">
    
              {/* Left: jackknife residual → IF definition → connection */}
              <div className="flex flex-col gap-2">
                <div className="bg-teal-50 border-2 border-teal-300 rounded-lg p-3">
                  <h3 className="font-bold text-teal-800 text-sm mb-1">The jackknife residual</h3>
                  <p className="text-xs text-teal-700 mb-1">
                    How much does <Latex math="\hat{\theta}" /> change when <Latex math="x_i" /> is removed?
                  </p>
                  <div className="bg-white/80 rounded p-2">
                    <Latex math="J_i = (n{-}1)\!\left(\hat{\theta} - \hat{\theta}_{(-i)}\right)" display={true} />
                  </div>
                  <p className="text-xs text-teal-600 mt-1">
                    Large <Latex math="|J_i|" /> = influential observation.
                  </p>
                </div>
    
                <div className="bg-purple-50 border-2 border-purple-300 rounded-lg p-3 flex-1">
                  <h3 className="font-bold text-purple-800 text-sm mb-1">The jackknife approximates IF</h3>
                  <p className="text-xs text-purple-700 mb-1">
                    Instead of the theoretical contamination, the jackknife uses a discrete
                    approximation: remove observation <Latex math="x_i" /> and measure how much{' '}
                    <Latex math="\hat{\theta}" /> changes:
                  </p>
                  <div className="bg-white/80 rounded p-2">
                    <Latex math="J_i = (n{-}1)\!\left(\hat{\theta} - \hat{\theta}_{(-i)}\right) \;\approx\; \text{IF}(x_i;\, T, \hat{F}_n)" display={true} />
                  </div>
                  <p className="text-xs text-purple-600 mt-2">
                    Large <Latex math="|J_i|" /> = influential observation (analog of Cook's
                    distance in regression). The pseudovalue plot (<Latex math="\widetilde{\theta}_i" />{' '}
                    vs <Latex math="i" />) visualizes this.
                  </p>
                </div>
              </div>
    
              {/* Right: why SE works + verification */}
              <div className="flex flex-col gap-2">
                <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
                  <h3 className="font-bold text-emerald-800 text-sm mb-1">Why the jackknife SE works</h3>
                  <p className="text-xs text-emerald-700 mb-1">
                    <Latex math="T(\hat{F}_n)" /> is approximately a sample mean of IF values:
                  </p>
                  <div className="bg-white/80 rounded p-1.5">
                    <Latex math="T(\hat{F}_n) - T(F) \;\approx\; \frac{1}{n}\sum_{i=1}^n \text{IF}(X_i;\, T, F)" display={true} />
                  </div>
                  <p className="text-xs text-emerald-700 mt-1">
                    Since <Latex math="\mathbb{E}[\text{IF}] = 0" />, the variance is:
                  </p>
                  <div className="bg-white/80 rounded p-1.5">
                    <Latex math="\text{Var}(\hat{\theta}) \;\approx\; \frac{1}{n}\int \text{IF}(x)^2\, dF(x)" display={true} />
                  </div>
                  <p className="text-xs text-emerald-700 mt-1">
                    Plug in <Latex math="J_i" /> for IF, <Latex math="\hat{F}_n" /> for{' '}
                    <Latex math="F" />: recovers the jackknife SE formula from Slide 50.
                  </p>
                </div>
    
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 flex-1">
                  <h3 className="font-bold text-amber-800 text-sm mb-1">
                    Check: <Latex math="T(F) = \int x\, dF = \mu" />
                  </h3>
                  <div className="text-xs text-amber-700 space-y-1">
                    <p><strong>Compute IF:</strong> the contaminated mean is</p>
                    <div className="bg-white/80 rounded p-1.5">
                      <Latex math="T\!\big((1{-}\varepsilon)F + \varepsilon\delta_x\big) = (1{-}\varepsilon)\mu + \varepsilon x" display={true} />
                    </div>
                    <p>Subtract <Latex math="T(F) = \mu" /> and divide by <Latex math="\varepsilon" />:</p>
                    <div className="bg-white/80 rounded p-1.5">
                      <Latex math="\text{IF}(x) = \frac{(1{-}\varepsilon)\mu + \varepsilon x - \mu}{\varepsilon} = \frac{\varepsilon(x - \mu)}{\varepsilon} = x - \mu" display={true} />
                    </div>
                    <p><strong>Jackknife:</strong>{' '}
                      <Latex math="J_i = (n{-}1)(\bar{x} - \bar{x}_{(-i)}) = x_i - \bar{x} \approx x_i - \mu" />
                    </p>
                    <p><strong>SE:</strong>{' '}
                      <Latex math="\sqrt{\frac{1}{n^2}\sum(x_i - \bar{x})^2} = s/\sqrt{n}" />{' '}
                      -- exact, no approximation.
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
  );
}

        </div>
  );
}

function Slide62_KSTest() {
  return (
    <div className="flex flex-col p-6 gap-3">
          <div className="flex-shrink-0">
            <h1 className="text-2xl font-bold text-gray-800">Testing Equality of Distributions</h1>

          </div>
    
          {/* KS statistic definition */}
          <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-3">
            <h3 className="font-bold text-blue-800 text-sm mb-2">The KS Statistic</h3>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <p className="text-sm text-blue-700 mb-2">
                  Given samples <Latex math="X_1, \ldots, X_m \sim F_X" /> and{' '}
                  <Latex math="Y_1, \ldots, Y_n \sim F_Y" />, the <strong>Kolmogorov-Smirnov
                  statistic</strong> is the maximum vertical gap between the two empirical CDFs:
                </p>
                <div className="bg-white/80 rounded-lg p-2">
                  <Latex math="D_{m,n} = \sup_x \left|\hat{F}_m(x) - \hat{F}_n(x)\right|" display={true} />
                </div>
              </div>
              <div>
                <p className="text-sm text-blue-700 mb-2">
                  <strong>Connection to Section 4.1:</strong> the DKW inequality and Glivenko-Cantelli
                  theorem used this same sup-norm distance between <em>one</em> ECDF and the true CDF.
                  Here we compare <em>two</em> ECDFs:
                </p>
                <div className="bg-white/80 rounded-lg p-2">
                  <Latex math="H_0\!: F_X = F_Y \quad \text{vs} \quad H_1\!: F_X \neq F_Y" display={true} />
                </div>
                <p className="text-sm text-blue-700 mt-2">

            <h3 className="font-bold text-emerald-800 text-sm mb-2">Permutation procedure</h3>

              Under <Latex math="H_0\!: F_X = F_Y" />, all <Latex math="m + n" /> observations are

              KS statistic on the relabeled groups:
            </p>
            <div className="bg-white/80 rounded p-2 mb-2">

            </div>

                <p className="text-xs text-gray-500">Group Y (n=60)</p>

            </h3>

                  <p className="text-yellow-300 font-bold">P99.6 = 0.317  {"<-- D_obs"}</p>

                  <p className="text-green-300 font-bold mt-0.5">p = (38+1)/(10000+1) = 0.004</p>
                </div>
              </div>
            </div>
          </div>
    
          {/* Lesson */}
          <div className="bg-purple-50 border-2 border-purple-300 rounded-lg p-3">
            <p className="text-sm text-purple-700">
              <strong>Lesson:</strong> the t-test and KS test answer different questions.
              The t-test correctly finds no mean difference. The KS test correctly finds a
              distributional difference. Neither test is wrong -- they are testing different
              hypotheses. The question "are these distributions the same?" cannot be answered
              by any test that only examines means.
            </p>
          </div>
    
          {/* Alternative statistics + power caveat */}
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
            <h3 className="font-bold text-blue-800 text-sm mb-2">Alternative distributional test statistics</h3>
            <p className="text-sm text-blue-700 mb-2">

              all alternatives":
            </p>

              <div className="bg-white/70 rounded p-2">
                <p className="font-semibold">KS (<Latex math="\sup" /> norm)</p>
                <p>
                  Maximum gap between ECDFs. Strong for location and spread shifts where ECDFs
                  separate over a wide range. <strong>Weak for pure tail/kurtosis differences</strong>{' '}
                  -- few observations in the tails make the gap small and noisy
                  (needs <Latex math="n \approx 1{,}000" /> to detect a 3:1 kurtosis ratio).
                </p>
              </div>
              <div className="bg-white/70 rounded p-2">
                <p className="font-semibold">Cramer-von Mises (<Latex math="L^2" /> norm)</p>
                <p>
                  <Latex math="\int(\hat{F}_m - \hat{F}_n)^2" />. Integrates the squared gap

                  than KS when ECDFs differ slightly everywhere rather than strongly at one point.

                <p>

                  problem: few observations are in the tails regardless of weighting.
                </p>
              </div>
            </div>
          </div>
        </div>
  );
}

    # --- Bootstrap distribution ---
    boot = np.array([
        np.var(data[rng.integers(0, n, n)])
        for _ in range(B)])
    
    # --- z0: displacement correction ---
    prop = (np.sum(boot < theta_hat)

    prop = np.clip(prop, 1/(2*B), 1-1/(2*B))
    z0 = stats.norm.ppf(prop)

    a = np.sum(d**3)/denom if denom > 1e-10 else 0.0
    
    # --- Adjusted percentile levels ---
    def adj(z_a):
        num = z0 + z_a
        den = 1 - a * num

function Slide80_CoreFormulas() {

    <div className="h-full flex flex-col p-6">

            <h1 className="text-2xl font-bold text-gray-800">Chapter 4 Core Formulas</h1>

              <div className="divide-y divide-gray-100">
                <Row80 label="Bootstrap SE" formula="\widehat{\text{SE}} = \sqrt{\tfrac{1}{B-1}\textstyle\sum_b (\hat{\theta}^*_b - \bar{\theta}^*)^2}" note="B = 1,000+ for SE; 10,000+ for CIs" />
                <Row80 label="Bootstrap bias" formula="\widehat{\text{Bias}} = \bar{\theta}^* - \hat{\theta}" note="BC estimator: 2\hat{\theta} - \bar{\theta}^*" bg="bg-gray-50" />
                <Row80 label="Jackknife SE" formula="\widehat{\text{SE}}_{\text{jack}} = \sqrt{\tfrac{n-1}{n}\textstyle\sum_i (\hat{\theta}_{(-i)} - \bar{\theta}_{(\cdot)})^2}" note="Exact for smooth stats; fails for median" />
              </div>
            </div>
    
            {/* Confidence Intervals */}
            <div className="bg-white border-2 border-teal-200 rounded-xl overflow-hidden">

              <div className="divide-y divide-gray-100">
                <Row80 label="Percentile" formula="[Q_{\alpha/2}(\hat{\theta}^*),\; Q_{1-\alpha/2}(\hat{\theta}^*)]" note="1st-order; transformation-invariant" />
                <Row80 label="Studentized" formula="[\hat{\theta} - \hat{\sigma}\, q^*_{1-\alpha/2},\;\, \hat{\theta} - \hat{\sigma}\, q^*_{\alpha/2}]" note="2nd-order; quantiles reverse; needs SE per resample" bg="bg-gray-50" />
                <Row80 label="BCa levels" formula="\alpha_j^{\text{BCa}} = \Phi\!\left(z_0 + \frac{z_0 + z_{\alpha_j}}{1 - a(z_0 + z_{\alpha_j})}\right)" note="z_0: displacement; a: shape distortion; 2nd-order" />
                <Row80 label="BCa: z_0" formula="z_0 = \Phi^{-1}\!\bigl(\tfrac{\#\{\hat{\theta}^* < \hat{\theta}\} + \frac{1}{2}\#\{=\}}{B}\bigr)" note="Median bias in normal units; mid-rank ties" bg="bg-gray-50" />
                <Row80 label="BCa: a" formula="a = \tfrac{\sum_i (\bar{\theta}_{(\cdot)} - \hat{\theta}_{(-i)})^3}{6[\sum_i(\bar{\theta}_{(\cdot)}-\hat{\theta}_{(-i)})^2]^{3/2}}" note="Skewness of jackknife influence values" />

                <Row80 label="Bootstrap p-value" formula="\hat{p} = \tfrac{\#\{|T^*_b| \geq |T_{\text{obs}}|\} + 1}{B + 1}" note="Phipson-Smyth +1; enforce H_0 before resampling" />
                <Row80 label="LOOCV (OLS)" formula="\text{CV}_{(n)} = \tfrac{1}{n}\textstyle\sum_i \left(\tfrac{e_i}{1-h_{ii}}\right)^2" note="Hat matrix shortcut; same h_ii as Cook's distance" bg="bg-gray-50" />
                <Row80 label="K-fold CV" formula="\text{CV}_K = \tfrac{1}{K}\textstyle\sum_{k=1}^K \tfrac{1}{|S_k|}\sum_{i \in S_k} L(y_i, \hat{f}_{(-k)}(x_i))" note="K=10 default (Kohavi, 1995); use Pipeline" />
              </div>
            </div>
    
          </div>
        </div>
  );
}

    // ACCESSIBLE OVERVIEW MODE
    // ═══════════════════════════════════════════════════════════════════
    function OverviewMode({ slides, currentSlide, onSelectSlide, onClose }) {
      const containerRef = useRef(null);
      const currentCardRef = useRef(null);
      
      useEffect(() => {
        currentCardRef.current?.focus();
      }, []);
      
      const handleKeyDown = useCallback((e, index) => {
        const cols = Math.floor(containerRef.current?.clientWidth / 316) || 3;
        let newIndex = index;
        
        switch (e.key) {
          case 'ArrowRight': newIndex = Math.min(index + 1, slides.length - 1); break;
          case 'ArrowLeft': newIndex = Math.max(index - 1, 0); break;
          case 'ArrowDown': newIndex = Math.min(index + cols, slides.length - 1); break;
          case 'ArrowUp': newIndex = Math.max(index - cols, 0); break;
          case 'Enter':
          case ' ':
            e.preventDefault();
            onSelectSlide(index);
            return;
          case 'Escape':
            onClose();
            return;
          default: return;
        }
        
        if (newIndex !== index) {
          e.preventDefault();
          const cards = containerRef.current?.querySelectorAll('[role="gridcell"] button');
          cards?.[newIndex]?.focus();
        }
      }, [slides.length, onSelectSlide, onClose]);
      
      return (
        <div 
          ref={containerRef}
          className="overview-grid"
          role="grid"
          aria-label="Slide overview"
        >
          <div className="overview-header" role="row">
            <h2 id="overview-title" className="text-2xl font-bold">Slide Overview</h2>
            <button 
              onClick={onClose} 
              className="overview-close-btn"
              aria-label="Close overview (Escape)"
            >
              Close (Esc)
            </button>
          </div>
          <div role="row" style={{display: 'contents'}}>
            {slides.map((slide, index) => {
              const SlideComponent = slide.component;
              const isCurrent = index === currentSlide;
              
              return (
                <div key={slide.id} role="gridcell">
                  <button
                    ref={isCurrent ? currentCardRef : null}
                    onClick={() => onSelectSlide(index)}
                    onKeyDown={(e) => handleKeyDown(e, index)}
                    className={`overview-card ${isCurrent ? 'current' : ''}`}
                    aria-label={`Slide ${index + 1}: ${slide.title}${isCurrent ? ' (current)' : ''}`}
                    aria-current={isCurrent ? 'true' : undefined}
                  >
                    <div className="overview-card-content" aria-hidden="true">
                      <SlideComponent />
                    </div>
                    <div className="overview-label">
                      <span className="num" aria-hidden="true">{index + 1}</span>
                      <span>{slide.title}</span>
                    </div>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function ProgressBar({ currentSlide, slides, sections, currentSection, goToSlide, goToSection }) {
      return (
        <nav className="progress-container" aria-label="Slide progress">
          <div className="section-labels" role="tablist" aria-label="Presentation sections">
            {sections.map((section) => {
              const sectionIndex = sections.indexOf(section);
              const nextSection = sections[sectionIndex + 1];
              const sectionEnd = nextSection ? nextSection.startSlide - 1 : slides.length;
              const width = ((sectionEnd - section.startSlide + 1) / slides.length) * 100;
              const isActive = currentSection?.id === section.id;
              const isCompleted = (currentSlide + 1) > sectionEnd;
              
              return (
                <button 
                  key={section.id}
                  role="tab"
                  aria-selected={isActive}
                  className={`section-label ${isActive ? 'active' : isCompleted ? 'completed' : 'future'}`}
                  style={{width: `${width}%`}}
                  onClick={() => goToSection(section.id)}
                  title={`Go to ${section.name}`}
                  aria-label={`${section.name} section${isActive ? ' (current)' : isCompleted ? ' (completed)' : ''}`}
                >
                  <span aria-hidden="true">{section.icon}</span> {section.shortName}
                </button>
              );
            })}
          </div>
          
          <div 
            className="progress-sections" 
            role="progressbar" 
            aria-valuenow={currentSlide + 1}
            aria-valuemin={1}
            aria-valuemax={slides.length}
            aria-label={`Slide ${currentSlide + 1} of ${slides.length}`}
          >
            {sections.map((section) => {
              const sectionIndex = sections.indexOf(section);
              const nextSection = sections[sectionIndex + 1];
              const sectionStart = section.startSlide;
              const sectionEnd = nextSection ? nextSection.startSlide - 1 : slides.length;
              const slidesInSection = sectionEnd - sectionStart + 1;
              const isActiveSection = currentSection?.id === section.id;
              const isPastSection = (currentSlide + 1) > sectionEnd;
              
              const currentSlideId = currentSlide + 1;
              const slidesCompletedInSection = isActiveSection 
                ? Math.max(0, currentSlideId - sectionStart + 1)
                : isPastSection ? slidesInSection : 0;
              const sectionProgress = Math.round((slidesCompletedInSection / slidesInSection) * 100);
              
              return (
                <div 
                  key={section.id}
                  className={`section-group ${isActiveSection ? 'active' : ''}`}
                  style={{flex: slidesInSection}}
                  role="group"
                  aria-label={`${section.name}: ${slidesCompletedInSection} of ${slidesInSection} slides`}
                >
                  {isActiveSection && (
                    <div className="section-progress-text" aria-hidden="true">
                      {slidesCompletedInSection}/{slidesInSection} ({sectionProgress}%)
                    </div>
                  )}
                  
                  {Array.from({length: slidesInSection}, (_, i) => {
                    const slideNum = sectionStart + i;
                    const slideIdx = slideNum - 1;
                    const isCurrentSlide = slideNum === currentSlideId;
                    const isPastSlide = slideNum < currentSlideId;
                    
                    let barClass = 'slide-bar';
                    let status = '';
                    if (isCurrentSlide) {
                      barClass += ' current';
                      status = 'current';
                    } else if (isActiveSection) {
                      barClass += isPastSlide ? ' active-past' : ' active-future';
                      status = isPastSlide ? 'viewed' : 'upcoming in section';
                    } else if (isPastSection) {
                      barClass += ' completed';
                      status = 'completed';
                    } else {
                      barClass += ' future';
                      status = 'upcoming';
                    }
                    
                    const slideTitle = slides[slideIdx]?.title || `Slide ${slideNum}`;
                    
                    return (
                      <button
                        key={slideNum}
                        className={barClass}
                        data-tooltip={`${slideNum}: ${slideTitle}`}
                        onClick={() => goToSlide(slideIdx)}
                        aria-label={`Go to slide ${slideNum}: ${slideTitle} (${status})`}
                        aria-current={isCurrentSlide ? 'step' : undefined}
                        tabIndex={isCurrentSlide ? 0 : -1}
                      >
                        {isCurrentSlide && <div className="current-indicator" aria-hidden="true"></div>}
                      </button>
                    );
                  })}
                </div>
              );
            })}
          </div>
          
          <div className="progress-info">
            <div className="progress-counter" aria-hidden="true">
              Slide {currentSlide + 1} / {slides.length}
            </div>
            <div className="progress-legend" aria-hidden="true">
              <div className="legend-item"><div className="legend-bar completed"></div><span>Done</span></div>
              <div className="legend-item"><div className="legend-bar active"></div><span>Section</span></div>
              <div className="legend-item"><div className="legend-bar current"></div><span>Current</span></div>
              <div className="legend-item"><div className="legend-bar future"></div><span>Upcoming</span></div>
            </div>
          </div>
        </nav>
      );
    }


    // ═══════════════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════════════
    function App() {
      const [currentSlide, setCurrentSlide] = useState(0);
      const [overviewMode, setOverviewMode] = useState(false);
      const [showHelp, setShowHelp] = useState(false);
      const [announcement, setAnnouncement] = useState('');
      const mainContentRef = useRef(null);

      const CurrentSlideComponent = slides[currentSlide]?.component;
      const currentSection = getSectionForSlide(currentSlide);

      const announceSlide = useCallback((slideIndex) => {
        const slide = slides[slideIndex];
        const section = getSectionForSlide(slideIndex);
        setAnnouncement(`Slide ${slideIndex + 1} of ${slides.length}: ${slide.title}. Section: ${section?.name || 'Unknown'}`);
      }, []);

      const nextSlide = useCallback(() => {
        if (currentSlide < slides.length - 1) {
          const newSlide = currentSlide + 1;
          setCurrentSlide(newSlide);
          announceSlide(newSlide);
        }
      }, [currentSlide, announceSlide]);

      const prevSlide = useCallback(() => {
        if (currentSlide > 0) {
          const newSlide = currentSlide - 1;
          setCurrentSlide(newSlide);
          announceSlide(newSlide);
        }
      }, [currentSlide, announceSlide]);

      const goToSlide = useCallback((index) => {
        if (index >= 0 && index < slides.length) {
          setCurrentSlide(index);
          setOverviewMode(false);
          announceSlide(index);
          setTimeout(() => mainContentRef.current?.focus(), 100);
        }
      }, [announceSlide]);

      const goToSection = useCallback((sectionId) => {
        const section = sections.find(s => s.id === sectionId);
        if (section) {
          const newSlide = section.startSlide - 1;
          setCurrentSlide(newSlide);
          announceSlide(newSlide);
        }
      }, [announceSlide]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          
          switch (e.key) {
            case 'ArrowRight': case ' ': case 'n': case 'N':
              if (!overviewMode && !showHelp) { e.preventDefault(); nextSlide(); }
              break;
            case 'ArrowLeft': case 'Backspace': case 'p': case 'P':
              if (!overviewMode && !showHelp) { e.preventDefault(); prevSlide(); }
              break;
            case 'Home': 
              if (!overviewMode && !showHelp) { e.preventDefault(); goToSlide(0); }
              break;
            case 'End': 
              if (!overviewMode && !showHelp) { e.preventDefault(); goToSlide(slides.length - 1); }
              break;
            case 'o': case 'O': 
              if (!showHelp) { e.preventDefault(); setOverviewMode(prev => !prev); }
              break;
            case 'f': case 'F':
              e.preventDefault();
              document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
              break;
            case '?': e.preventDefault(); setShowHelp(prev => !prev); break;
            case 'Escape': e.preventDefault(); setOverviewMode(false); setShowHelp(false); break;
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [nextSlide, prevSlide, goToSlide, overviewMode, showHelp]);

      if (showHelp) {
        return (
          <>
            <LiveAnnouncer message="Help dialog opened" priority="assertive" />
            <HelpModal onClose={() => setShowHelp(false)} />
          </>
        );
      }

      if (overviewMode) {
        return (
          <>
            <LiveAnnouncer message="Overview mode. Use arrow keys to navigate, Enter to select." priority="assertive" />
            <OverviewMode 
              slides={slides}
              currentSlide={currentSlide}
              onSelectSlide={goToSlide}
              onClose={() => setOverviewMode(false)}
            />
          </>
        );
      }

      return (
        <>
          <a href="#slide-content" className="skip-link">
            Skip to slide content
          </a>
          
          <LiveAnnouncer message={announcement} />
          
          <div className="slide-container">
            <header className="slide-header" role="banner">
              <div className="header-top">
                <div className="header-title">
                  <span className="purdue">PURDUE</span>
                  <span className="course">STAT 418 - Computational Methods</span>
                </div>
                <div className="header-slide-info">
                  {currentSection && (
                    <div className="current-section" aria-label={`Current section: ${currentSection.name}`}>
                      <span className="icon" aria-hidden="true">{currentSection.icon}</span>
                      <span className="name">{currentSection.name}</span>
                    </div>
                  )}
                  <div className="slide-counter" aria-hidden="true">
                    {currentSlide + 1} / {slides.length}
                  </div>
                </div>
              </div>
              
              <ProgressBar 
                currentSlide={currentSlide}
                slides={slides}
                sections={sections}
                currentSection={currentSection}
                goToSlide={goToSlide}
                goToSection={goToSection}
              />
            </header>

            <main 
              id="slide-content"
              ref={mainContentRef}
              className="slide-content"
              role="main"
              aria-label={`Slide ${currentSlide + 1}: ${slides[currentSlide]?.title}`}
              tabIndex={-1}
            >
              <article className="slide-wrapper">
                {CurrentSlideComponent && <CurrentSlideComponent />}
              </article>
            </main>

            <nav className="slide-nav" aria-label="Slide navigation">
              <button 
                onClick={prevSlide} 
                disabled={currentSlide === 0} 
                aria-label="Previous slide (Left Arrow)"
                title="Previous slide"
              >
                <span aria-hidden="true">◀</span>
              </button>
              <button 
                onClick={nextSlide} 
                disabled={currentSlide === slides.length - 1} 
                aria-label="Next slide (Right Arrow)"
                title="Next slide"
              >
                <span aria-hidden="true">▶</span>
              </button>
              <div className="nav-divider" role="separator"></div>
              <button 
                onClick={() => setOverviewMode(true)} 
                aria-label="Open slide overview (O)"
                title="Slide overview"
              >
                <span aria-hidden="true">⊞</span>
              </button>
              <button 
                onClick={() => setShowHelp(true)} 
                aria-label="Show keyboard shortcuts (?)"
                title="Keyboard shortcuts"
              >
                <span aria-hidden="true">?</span>
              </button>
            </nav>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
